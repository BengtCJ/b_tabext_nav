<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BP Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Light-theme tokens (STYLE_SPEC § Solutions surface) ─────────────────
       Values marked confirm-against-Figma are indicative; finalise on first
       Figma cross-check.                                                       */
    :root {
      --card-bg:       #FFFFFF;
      --card-border:   #CCCCCC;   /* indicative — confirm-against-Figma */
      --title-color:   #1A1A1A;   /* near-black — confirm-against-Figma */
      --body-color:    #4A4A4A;   /* dark-grey — confirm-against-Figma */
      --t3-color:      #8A8A8A;   /* tier-3 / muted — confirm-against-Figma */
      --panel-bg:      #F5F5F5;
      /* Solution-pill RAG — light theme. Red (#E42F4D) defined but not used. */
      --pill-t1:       #4ADE80;   /* tier 1 — green */
      --pill-t2:       #F5AF00;   /* tier 2 — amber */
      --pill-t3:       #8A8A8A;   /* tier 3 — grey  */
      /* Spacing: 4px base unit */
      --sp-tight:    4px;
      --sp-default:  8px;
      --sp-section: 16px;
      --sp-loose:   24px;
      /* Named override — 2px hairline cell gutter (§ Spacing) */
      --gutter:      2px;
      /* Light-grey frame background — confirm-against-Figma */
      --frame-bg:    #E0E0E0;
      /* Empty scaffold slot — faint fill lighter than frame, darker than white */
      --empty:       #F5F5F5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    #root {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      padding: var(--sp-section);
      overflow: hidden;
    }

    /* ── State panels (too-small / no-data) ─────────────────────────────── */
    .state-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 11px;   /* Caption */
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      color: var(--t3-color);
    }

    /* ── Page header (Display title) ────────────────────────────────────── */
    .page-header {
      flex-shrink: 0;
      margin-bottom: var(--sp-section);
    }
    .construct-title {
      font-family: 'Baskerville', 'Libre Baskerville', Georgia, serif;
      font-style: italic;
      font-size: 56px;   /* Display — v8 re-decision, was 40 */
      color: var(--title-color);
    }

    /* ── Solution frame — fixed 3-col × 2-row + anchor col (STYLE_SPEC § Card-frame) */
    .sol-frame {
      flex: 1;
      min-height: 0;
      background: var(--frame-bg);
      border-radius: 10px;             /* frame-radius = cell-radius 8 + gutter 2 */
      padding: var(--gutter);
      display: grid;
      grid-template-columns: repeat(3, 1fr) minmax(0, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: var(--gutter);
    }

    /* ── Solution card — white cell, NO own border (frame gap IS the separation) */
    .sol-card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: var(--sp-section);
      display: flex;
      flex-direction: column;
    }

    /* header row: name left, pill right */
    .sol-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-tight);
      margin-bottom: var(--sp-default);
    }

    .sol-name {
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;   /* Heading — v8 sanctioned bump, was 16 */
      color: var(--title-color);
      line-height: 1.3;
      text-transform: uppercase;
    }

    /* ── Empty holding cell ────────────────────────────────────────────────── */
    .sol-empty {
      background: var(--empty);
      border-radius: 8px;
    }

    .sol-desc {
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;   /* Label */
      color: var(--body-color);
      line-height: 1.5;
      margin-top: auto;  /* bottom-pin in the flex card */
      /* clamp — verified in Blink preview (TABLEAU_API_REALITY 2026-06-09) */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Solution pill — outlined, no fill, no red (STYLE_SPEC § Pill) ──── */
    .sol-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
      border: 1px solid;
      padding: 2px 8px;
      font-size: 11px;   /* Caption */
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.05em;
      background: transparent;
      text-transform: uppercase;
    }
    .sol-pill-t1 { border-color: var(--pill-t1); color: var(--pill-t1); }
    .sol-pill-t2 { border-color: var(--pill-t2); color: var(--pill-t2); }
    .sol-pill-t3 { border-color: var(--pill-t3); color: var(--pill-t3); }

    /* ── In Practice anchor — col 4, spans both rows (STYLE_SPEC § Card-frame) ── */
    .in-practice-anchor {
      background: var(--card-bg);
      border-radius: 8px;
      grid-column: 4;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    /* Image wrapper: 2px inset from card edge; height = one solution-card row */
    .ip-img-wrap {
      padding: var(--gutter);      /* 2px inset all sides */
      flex-shrink: 0;
      height: calc((100% - var(--gutter)) / 2);
    }
    .ip-img {
      width: 100%;
      height: 100%;
      border-radius: 6px;          /* card 8 − gutter 2 = nested radius */
      object-fit: cover;
      display: block;
    }
    /* Text fills the rest below the image (or the whole card when no image) */
    .ip-text {
      flex: 1;
      padding: var(--sp-section);
      display: flex;
      flex-direction: column;
      gap: var(--sp-default);
      overflow: hidden;
      min-height: 0;
    }
    .ip-label {
      font-size: 11px;   /* Caption */
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      color: var(--t3-color);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    .ip-verdict {
      font-family: 'Baskerville', 'Libre Baskerville', Georgia, serif;
      font-style: italic;
      font-size: 24px;   /* ban-shell verdict size — sanctioned on this surface */
      color: var(--title-color);
      line-height: 1.3;
      flex-shrink: 0;
    }
    .ip-reading {
      font-size: 13px;   /* Label */
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      color: var(--body-color);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Insight lead paragraph (STYLE_SPEC § Insight lead paragraph) ──── */
    .insight-lead {
      flex-shrink: 0;
      margin-bottom: var(--sp-section);
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;   /* Label role */
      color: #3C3C3C;    /* body grey — STYLE_SPEC § Solutions surface light tokens */
      line-height: 1.5;
    }
    .insight-lead--diag {
      color: var(--t3-color);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
  <script>
  // ─── VERSION ──────────────────────────────────────────────────────────────
  var VERSION = '2026-06-15.3';

  // ─── FONTS ────────────────────────────────────────────────────────────────
  var FONT_TITLE = "'Baskerville', 'Libre Baskerville', Georgia, serif";
  var FONT_LIGHT = "'Tableau Light', 'Helvetica Neue', Arial, sans-serif";
  var FONT_BODY  = "'Tableau Regular', 'Helvetica Neue', Arial, sans-serif";

  // ─── CONSTRUCT TOKENS ────────────────────────────────────────────────────
  // The three canonical construct ids. All construct resolution draws from this
  // one constant — do not hardcode tokens anywhere else.
  var CONSTRUCT_TOKENS = ['growth', 'standout', 'fandom'];

  // ─── TITLE MAP ────────────────────────────────────────────────────────────
  // Per-construct editorial title (Display role, verbatim authored case).
  // {{client}}-interpolable; fallback → construct word (prior behaviour).
  var TITLE_MAP = {
    growth:   'Capitalise on the market',
    standout: 'Extend the advantage',
    fandom:   'Build what lasts',
  };

  // ─── INSIGHTS ────────────────────────────────────────────────────────────
  // Hardcoded — no settings cog (CLAUDE.md § Sibling extensions, spec_026).
  var INSIGHTS_SHEET  = 'insights';
  var INSIGHT_COL_MAP = { growth: 'opps_growth', standout: 'opps_standout', fandom: 'opps_fandom' };
  // Sample sentences for preview mode (typeof tableau === 'undefined').
  var SAMPLE_INSIGHTS = {
    growth:   'In a crowded market, targeted action on the right growth lever outperforms broad investment — the key is identifying which opportunity is ripe for this brand today.',
    standout: 'Distinctive signal is the fastest route to recognition — brands that invest in their most ownable assets see compounding returns in salience and consideration.',
    fandom:   'Advocacy compounds over time: brands with the strongest community rituals see lower acquisition costs and higher lifetime value across the customer base.',
  };

  // ─── CONFIG ──────────────────────────────────────────────────────────────
  // No settings cog; all values are constants here or resolved from parameters.
  var CONFIG = {
    clientBrand: '',               // resolved from 'Select Client Brand' parameter
    parameter:   'Select Client Brand',
  };

  // ─── STATE ────────────────────────────────────────────────────────────────
  var _dashboard     = null;
  var _construct     = null;   // 'growth' | 'standout' | 'fandom' | null
  var _solutions     = null;   // current solution list (render model)
  var _insightResult          = null;   // { type: 'bespoke'|'empty'|'structural', text?, col?, sheet? }
  var _insightFieldNamesLogged = false; // log actual fieldNames once on first live read
  var _resizeTimer             = null;

  // ─── SAMPLE FIXTURE ───────────────────────────────────────────────────────
  // PROVISIONAL — five solutions across three constructs for one run/client.
  // The read-adapter (adaptSolutionsView) is the ONLY place §4 column names appear.
  var SAMPLE_SOLUTIONS = [
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_001',
      name: 'Insight',
      description: 'Research and audience understanding that grounds strategy in real market and consumer data.',
      display_order: 1, tier: 1, source: 'bp_engine', menu_version: '2.0', construct: 'growth'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_002',
      name: 'Innovation',
      description: 'Identifying and developing new product, service, or category opportunities.',
      display_order: 2, tier: 1, source: 'bp_engine', menu_version: '2.0', construct: 'growth'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_003',
      name: 'Employer Brand',
      description: 'Shaping how a company presents itself to talent, from EVP through to recruitment and culture.',
      display_order: 3, tier: 3, source: 'bp_engine', menu_version: '2.0', construct: 'growth'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_004',
      name: 'Architecture / Portfolio Strategy',
      description: 'Structuring how a brand\'s products and sub-brands relate, compete, and grow together.',
      display_order: 4, tier: 2, source: 'bp_engine', menu_version: '2.0', construct: 'growth'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_005',
      name: 'Positioning',
      description: 'Defining the single territory a brand owns in the market — what it stands for and why it\'s chosen.',
      display_order: 5, tier: 3, source: 'bp_engine', menu_version: '2.0', construct: 'growth'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_006',
      name: 'Distinctive Asset Investment',
      description: 'Strengthen visual and verbal identifiers that drive brand recognition in crowded shelf and social environments.',
      display_order: 1, tier: 1, source: 'bp_engine', menu_version: '2.0', construct: 'standout'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_007',
      name: 'Tone Sharpening',
      description: 'Tighten verbal distinctiveness across key touchpoints to improve recognisability and reduce tonal drift.',
      display_order: 2, tier: 3, source: 'bp_engine', menu_version: '2.0', construct: 'standout'
    },
    {
      run_id: 'run_001', business_id: 'biz_001', brand_name: 'Demo Brand',
      solution_id: 'sol_008',
      name: 'Advocacy Activation',
      description: 'Convert high-preference buyers into active brand advocates through targeted community and referral mechanics.',
      display_order: 1, tier: 2, source: 'bp_engine', menu_version: '2.0', construct: 'fandom'
    },
  ];

  // ─── READ ADAPTER ─────────────────────────────────────────────────────────
  // PROVISIONAL §4 column names — engine owns final names.
  // This is the ONLY function that knows the §4 view's column names.
  // Live-view swap = point getSummaryDataAsync rows at this function (one line).
  function adaptSolutionsView(rows) {
    return rows.map(function(r) {
      return {
        run_id:        String(r['run_id']        || ''),
        business_id:   String(r['business_id']   || ''),
        brand_name:    String(r['brand_name']     || ''),
        solution_id:   String(r['solution_id']   || ''),
        name:          String(r['name']           || ''),
        description:   String(r['description']   || ''),
        display_order: Number(r['display_order']) || 0,
        tier:          Number(r['tier'])          || 3,
        source:        String(r['source']         || ''),
        menu_version:  String(r['menu_version']  || ''),
        construct:     String(r['construct']      || ''),
        image_url:     r['image_url'] ? String(r['image_url']) : '',
      };
    });
  }

  // ─── CONSTRUCT RESOLUTION ─────────────────────────────────────────────────
  // Single function, documented precedence — future branches are additive.
  // Scans dashboard.name for CONSTRUCT_TOKENS (case-insensitive, substring).
  // Exactly one token present → that construct.
  // Zero or two+ tokens → null (unresolved; graceful no-op).
  // This means "Brand Growth — Opportunities" → growth, "FANDOM" → fandom,
  // "Growth vs Standout" → null (ambiguous; fail-safe).
  function resolveConstruct() {
    // Branch 1: in-extension selection (future) — not wired
    // Branch 2: parameter (future) — not wired
    // Branch 3: dashboard.name (live, confirmed [tested] 2026-05-29 b_tabext_nav)
    var name = _dashboard && _dashboard.name ? _dashboard.name.trim().toLowerCase() : null;
    if (!name) return null;
    var hits = CONSTRUCT_TOKENS.filter(function(t) { return name.indexOf(t) !== -1; });
    return hits.length === 1 ? hits[0] : null;
  }

  // ─── IN PRACTICE RESOLVER ─────────────────────────────────────────────────
  // Static interim copy — brand-interpolated. One function = one swap to a real source.
  function resolveInPractice(brand, construct) {
    var b = brand || 'the brand';
    var copy = {
      growth:
        'Growth solutions for ' + b + ' target the levers that increase category ' +
        'participation and commercial return — from penetration and shelf presence to ' +
        'pricing architecture and occasion breadth.',
      standout:
        'Standout solutions for ' + b + ' strengthen the signals that drive ' +
        'differentiation — distinctive assets, tonal sharpness, and the consistency ' +
        'that turns recognition into recall.',
      fandom:
        'Fandom solutions for ' + b + ' convert brand preference into lasting advocacy — ' +
        'deepening the emotional contract and building the rituals and communities ' +
        'that keep buyers close.',
    };
    return (construct && copy[construct]) ||
      'Solutions for ' + b + ' provide a structured pathway to measurable brand ' +
      'improvement across the dimensions that matter most at this stage.';
  }

  // ─── IN PRACTICE VERDICT RESOLVER ────────────────────────────────────────
  // Short Baskerville lead sentence. One swap = real source. Brand-interpolated.
  function resolveInPracticeVerdict(brand, construct) {
    var b = brand || 'the brand';
    var copy = {
      growth:
        'The growth opportunity for ' + b + ' lies at the intersection of penetration ' +
        'and premium positioning.',
      standout:
        b + ' can sharpen its market edge through systematic investment in its most ' +
        'distinctive signals.',
      fandom:
        'The path to deeper advocacy for ' + b + ' begins with the rituals and ' +
        'communities that keep buyers close.',
    };
    return (construct && copy[construct]) ||
      'Solutions for ' + b + ' provide a structured pathway to measurable brand improvement.';
  }

  // ─── HELPERS ──────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── INSIGHT LEAD PARAGRAPH ───────────────────────────────────────────────

  // Generic fallback copy — {{client}} interpolated at render time.
  // Re-resolved on every render so ParameterChanged picks up a new clientBrand.
  var FALLBACK_INSIGHTS = {
    growth:   'This text is automatically replaced with the read on growth for {{client}} — where the brand can win share, which audiences and occasions are in reach, and which levers move category participation and commercial return.',
    standout: 'This text is automatically replaced with the read on standout for {{client}} — how distinctive the brand is in a crowded category, and where it can sharpen the difference that keeps it from being swapped for a rival.',
    fandom:   'This text is automatically replaced with the read on fandom for {{client}} — how loyal the brand\'s base really is, and where that loyalty can be turned into advocacy, repeat, and recommendation.',
  };

  function resolveInsightFallback(brand, construct) {
    var b   = brand || 'the brand';
    var tpl = (construct && FALLBACK_INSIGHTS[construct]) ||
      'For {{client}}, the data points to clear pathways for measurable brand improvement — the priority moves are identified.';
    return tpl.replace(/\{\{client\}\}/g, b);
  }

  // Normalise a Tableau fieldName for tolerant matching:
  //   lowercase; strip trailing " (...)" source qualifier; spaces/hyphens → underscores.
  // e.g. "Opps Growth (Insights1)" → "opps_growth"; "OPPS_GROWTH" → "opps_growth".
  function normaliseFieldName(s) {
    return s.toLowerCase()
      .replace(/\s*\([^)]*\)\s*$/, '')
      .replace(/[\s-]+/g, '_');
  }

  // Read the construct's insight column from the `insights` sheet.
  // Returns a Promise<{ type: 'bespoke'|'empty'|'structural', text?, col?, sheet? }>.
  // Per TABLEAU_API_REALITY: fields-on-shelf gotcha; null → '%null%' string sentinel.
  // Matches fieldName via normaliseFieldName so Tableau caption variants are tolerated.
  function readInsightAsync(dashboard, construct) {
    var col = INSIGHT_COL_MAP[construct];
    if (!col) {
      console.warn('[solutions_nav] unresolved construct — cannot read insight; construct:', construct);
      return Promise.resolve({ type: 'structural', col: null, sheet: INSIGHTS_SHEET });
    }
    var ws = null;
    var sheets = dashboard.worksheets;
    for (var i = 0; i < sheets.length; i++) {
      if (sheets[i].name === INSIGHTS_SHEET) { ws = sheets[i]; break; }
    }
    if (!ws) {
      console.warn('[solutions_nav] insight sheet "' + INSIGHTS_SHEET + '" not found on dashboard');
      return Promise.resolve({ type: 'structural', col: col, sheet: INSIGHTS_SHEET });
    }
    return ws.getSummaryDataAsync({ maxRows: 10 }).then(function(dt) {
      if (!dt.columns || dt.columns.length === 0) {
        console.warn('[solutions_nav] insight sheet "' + INSIGHTS_SHEET + '" returned 0 columns — add "' + col + '" to a Rows/Columns shelf');
        return { type: 'structural', col: col, sheet: INSIGHTS_SHEET };
      }
      // Log actual fieldNames once so the real Tableau caption is confirmed (spec_029).
      if (!_insightFieldNamesLogged) {
        _insightFieldNamesLogged = true;
        console.log('[solutions_nav] insight sheet fieldNames:', dt.columns.map(function(c) { return c.fieldName; }));
      }
      var colNorm = normaliseFieldName(col);
      var colIdx  = -1;
      for (var i = 0; i < dt.columns.length; i++) {
        if (normaliseFieldName(dt.columns[i].fieldName) === colNorm) {
          colIdx = i;
          break;
        }
      }
      if (colIdx === -1) {
        console.warn('[solutions_nav] insight column "' + col + '" (normalised: "' + colNorm + '") missing in sheet "' + INSIGHTS_SHEET +
          '" — add it to a Rows/Columns shelf. Available: ' +
          dt.columns.map(function(c) { return c.fieldName; }).join(', '));
        return { type: 'structural', col: col, sheet: INSIGHTS_SHEET };
      }
      if (!dt.data || dt.data.length === 0) {
        console.warn('[solutions_nav] insight sheet "' + INSIGHTS_SHEET + '" has columns but 0 rows');
        return { type: 'structural', col: col, sheet: INSIGHTS_SHEET };
      }
      var raw = dt.data[0][colIdx].value;
      var fmt = dt.data[0][colIdx].formattedValue;
      if (raw === '%null%' || raw === 'Null' || raw === '' || raw === null || raw === undefined ||
          fmt === 'Null' || fmt === '' || fmt === null) {
        return { type: 'empty' };
      }
      return { type: 'bespoke', text: String(raw) };
    }).catch(function(err) {
      console.warn('[solutions_nav] insight read error:', err);
      return { type: 'structural', col: col, sheet: INSIGHTS_SHEET };
    });
  }

  // Build the insight lead paragraph HTML for insertion between header and grid.
  function renderInsightHtml(construct) {
    if (typeof tableau === 'undefined') {
      // Preview mode — show sample sentence for layout checks.
      var sample = SAMPLE_INSIGHTS[construct] || SAMPLE_INSIGHTS.growth;
      return '<div class="insight-lead">' + escHtml(sample) + '</div>';
    }
    if (!_insightResult) return '';   // async read not yet complete; re-rendered on arrival
    if (_insightResult.type === 'bespoke') {
      return '<div class="insight-lead">' + escHtml(_insightResult.text) + '</div>';
    }
    if (_insightResult.type === 'empty') {
      return '<div class="insight-lead">' +
        escHtml(resolveInsightFallback(CONFIG.clientBrand, construct)) +
        '</div>';
    }
    // Structural failure — in-slot diagnostic (STYLE_SPEC § Insight lead paragraph).
    var col = _insightResult.col || (INSIGHT_COL_MAP[construct] || '(unknown)');
    var diag = 'Configuration: sheet "' + INSIGHTS_SHEET + '" · column "' + col +
      '" · add to a Rows/Columns shelf in that worksheet.';
    console.warn('[solutions_nav] insight diagnostic: ' + diag);
    return '<div class="insight-lead insight-lead--diag">' + escHtml(diag) + '</div>';
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  var MIN_W = 280;
  var MIN_H = 160;

  function render() {
    var root = document.getElementById('root');
    var w    = root.offsetWidth;
    var h    = root.offsetHeight;

    // Too-small state
    if (w < MIN_W || h < MIN_H) {
      root.innerHTML = '<div class="state-panel">Container too small</div>';
      return;
    }

    var solutions = _solutions || [];
    var construct = _construct;
    var brand     = CONFIG.clientBrand ||
      (solutions.length && solutions[0].brand_name ? solutions[0].brand_name : 'the brand');

    // Unresolved-construct: dashboard.name matched 0 or >=2 tokens → graceful neutral state.
    // Never guess; never show all constructs' cards as if they were one construct's.
    if (!construct) {
      root.innerHTML = '<div class="state-panel">Construct not identified from dashboard name</div>';
      return;
    }

    // Filter to current construct — carry-all-rows / filter-in-JS pattern (CHART_SPEC).
    var shown = solutions.filter(function(s) { return s.construct === construct; });

    // Fixed display_order sort (never re-sort by tier)
    shown = shown.slice().sort(function(a, b) { return a.display_order - b.display_order; });

    // No-data / empty-construct state
    if (!shown.length) {
      root.innerHTML = '<div class="state-panel">No solutions available' +
        (construct ? ' for ' + escHtml(construct) : '') + '</div>';
      return;
    }

    var rawTitle = (construct && TITLE_MAP[construct]) ||
      (construct ? construct.charAt(0).toUpperCase() + construct.slice(1) : 'Solutions');
    var constructLabel = rawTitle.replace(/\{\{client\}\}/g, CONFIG.clientBrand || 'the brand');

    // Page header — Display title
    var html = '<div class="page-header">' +
      '<div class="construct-title">' + escHtml(constructLabel) + '</div>' +
      '</div>';

    // Insight lead paragraph — below Display title, above grid (STYLE_SPEC § Insight lead paragraph)
    html += renderInsightHtml(construct);

    // Solution frame — fixed 3×2 scaffold + anchor col (STYLE_SPEC § Card-frame)
    html += '<div class="sol-frame">';

    // Fixed 6 solution holding cells — fill from shown, remainder = empty
    var SLOT_COUNT = 6;
    for (var i = 0; i < SLOT_COUNT; i++) {
      var sol = shown[i];
      if (sol) {
        var pillCls   = sol.tier === 1 ? 'sol-pill-t1' : sol.tier === 2 ? 'sol-pill-t2' : 'sol-pill-t3';
        var pillLabel = sol.tier === 1 ? 'Essential' : sol.tier === 2 ? 'Important' : 'Optional';
        html +=
          '<div class="sol-card" data-grouped-cell>' +
            '<div class="sol-card-header">' +
              '<div class="sol-name">' + escHtml(sol.name) + '</div>' +
              '<span class="sol-pill ' + pillCls + '" style="flex-shrink:0">' + escHtml(pillLabel) + '</span>' +
            '</div>' +
            '<div class="sol-desc">' + escHtml(sol.description) + '</div>' +
          '</div>';
      } else {
        html += '<div class="sol-empty" data-grouped-cell></div>';
      }
    }

    // In Practice anchor — col 4, spans both rows; image inset 2px when available
    var imageUrl = shown.length && shown[0] && shown[0].image_url ? shown[0].image_url : '';
    var verdict  = escHtml(resolveInPracticeVerdict(brand, construct));
    var reading  = escHtml(resolveInPractice(brand, construct));

    html += '<div class="in-practice-anchor" data-grouped-cell>';
    if (imageUrl) {
      html += '<div class="ip-img-wrap">' +
                '<img class="ip-img" src="' + escHtml(imageUrl) + '" alt="">' +
              '</div>';
    }
    html +=
      '<div class="ip-text">' +
        '<div class="ip-label">In Practice</div>' +
        '<div class="ip-verdict">' + verdict + '</div>' +
        '<div class="ip-reading">' + reading + '</div>' +
      '</div>';
    html += '</div>';   // end .in-practice-anchor

    html += '</div>';   // end .sol-frame

    root.innerHTML = html;
  }

  // ─── HARNESS ──────────────────────────────────────────────────────────────
  // Grouped-cell frame assertion — STYLE_SPEC § Enforcement → Visual fidelity.
  // Mirrors checkGroupedCellFrame() in index.html; uses [data-grouped-cell] convention.
  // Call runSolutionsHarness() from console after render; auto-runs in preview mode.
  function runSolutionsHarness() {
    var results = [];
    var pass    = true;

    function check(name, ok, detail) {
      results.push({ name: name, ok: ok, detail: detail || '' });
      if (!ok) pass = false;
      console.log('[harness] ' + (ok ? 'PASS' : 'FAIL') + '  ' + name +
        (detail ? '  (' + detail + ')' : ''));
    }

    // ── Live frame ─────────────────────────────────────────────────────────
    var frame = document.querySelector('.sol-frame');
    if (!frame) {
      console.warn('[harness] .sol-frame not found — render first');
      return { pass: false, results: results };
    }
    var cells = frame.querySelectorAll('[data-grouped-cell]');
    check('sol-gcf-has-cells', cells.length > 0, cells.length + ' cell(s)');

    var fs  = window.getComputedStyle(frame);
    var gapOk = (fs.gap === '2px' || fs.gap === '2px 2px' || fs.rowGap === '2px');
    check('sol-gcf-gutter-2px', gapOk, 'gap=' + fs.gap + ' rowGap=' + fs.rowGap);

    var frameR = parseFloat(fs.borderRadius) || parseFloat(fs.borderTopLeftRadius) || 0;
    var cellR  = cells.length
      ? (parseFloat(window.getComputedStyle(cells[0]).borderRadius) ||
         parseFloat(window.getComputedStyle(cells[0]).borderTopLeftRadius) || 0)
      : NaN;
    check('sol-gcf-radius-nested', frameR === cellR + 2,
      'frame-r=' + frameR + ' cell-r=' + cellR + ' expected=' + (cellR + 2));

    // ── v8: 6 solution slots + anchor ──────────────────────────────────────
    var solSlots = frame.querySelectorAll('.sol-card, .sol-empty');
    check('sol-v8-6-slots', solSlots.length === 6, solSlots.length + ' solution slot(s)');
    var anchor = frame.querySelector('.in-practice-anchor');
    check('sol-v8-anchor-exists', anchor !== null);

    // ── v8: type-role sizes ────────────────────────────────────────────────
    var titleEl = document.querySelector('.construct-title');
    if (titleEl) {
      check('sol-v8-display-56px', parseFloat(window.getComputedStyle(titleEl).fontSize) === 56,
        'fontSize=' + window.getComputedStyle(titleEl).fontSize);
    }
    var nameEl = frame.querySelector('.sol-name');
    if (nameEl) {
      check('sol-v8-heading-18px', parseFloat(window.getComputedStyle(nameEl).fontSize) === 18,
        'fontSize=' + window.getComputedStyle(nameEl).fontSize);
    }

    // ── insight lead paragraph ────────────────────────────────────────────
    var insightEl = document.querySelector('.insight-lead');
    if (insightEl) {
      var iFs = window.getComputedStyle(insightEl);
      check('sol-insight-13px', parseFloat(iFs.fontSize) === 13,
        'fontSize=' + iFs.fontSize);
      check('sol-insight-color', iFs.color.toLowerCase().indexOf('60') !== -1 ||
        iFs.color === 'rgb(60, 60, 60)',
        'color=' + iFs.color);
      check('sol-insight-no-pink', iFs.color.indexOf('233') === -1,
        'color should not be pink; color=' + iFs.color);
    } else {
      check('sol-insight-present', false, '.insight-lead not found');
    }

    // ── v8: clamp (overflow: hidden on clamped elements) ──────────────────
    var descEl = frame.querySelector('.sol-desc');
    if (descEl) {
      check('sol-v8-desc-clamped', window.getComputedStyle(descEl).overflow === 'hidden',
        'overflow=' + window.getComputedStyle(descEl).overflow);
    }
    var readingEl = frame.querySelector('.ip-reading');
    if (readingEl) {
      check('sol-v8-reading-clamped', window.getComputedStyle(readingEl).overflow === 'hidden',
        'overflow=' + window.getComputedStyle(readingEl).overflow);
    }

    // ── Synthetic fixture — must FAIL (gap 8px, non-nested radius) ─────────
    var fix = document.createElement('div');
    var kid = document.createElement('div');
    kid.setAttribute('data-grouped-cell', '');
    kid.style.cssText  = 'border-radius:8px;background:#fff;width:50px;height:50px;';
    fix.style.cssText  = 'position:absolute;visibility:hidden;display:grid;gap:8px;' +
      'border-radius:8px;width:120px;height:60px;';
    fix.appendChild(kid);
    document.body.appendChild(fix);
    var xf    = window.getComputedStyle(fix);
    var xGapOk = (xf.gap === '2px' || xf.gap === '2px 2px' || xf.rowGap === '2px');
    var xR    = parseFloat(xf.borderRadius) || 0;
    var xCR   = parseFloat(window.getComputedStyle(kid).borderRadius) || 0;
    var xRadOk = (xR === xCR + 2);
    document.body.removeChild(fix);
    // Both fixture checks should be false — the fixture is intentionally off-token
    check('sol-fixture-gutter-FAIL', !xGapOk,
      'gap=' + xf.gap + ' (non-2px → FAIL expected)');
    check('sol-fixture-radius-FAIL', !xRadOk,
      'frame-r=' + xR + ' cell-r=' + xCR + ' (non-nested → FAIL expected)');

    console.log('[harness] solutions frame: ' + (pass ? 'ALL PASS' : 'SOME FAIL'));
    return { pass: pass, results: results };
  }

  // ─── RESIZE ───────────────────────────────────────────────────────────────
  var resizeObserver = new ResizeObserver(function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(render, 150);
  });
  resizeObserver.observe(document.getElementById('root'));

  // ─── INIT ─────────────────────────────────────────────────────────────────
  if (typeof tableau === 'undefined') {
    // Preview / dev mode — no Tableau present; use sample fixture.
    // ?construct=<name> overrides which construct to display.
    var urlParams = new URLSearchParams(location.search);
    var urlConst  = urlParams.get('construct');
    if (urlConst) {
      var lower    = urlConst.trim().toLowerCase();
      var urlHits  = CONSTRUCT_TOKENS.filter(function(t) { return lower.indexOf(t) !== -1; });
      _construct   = urlHits.length === 1 ? urlHits[0] : null;
    } else {
      _construct = 'growth';   // default for plain ?chart= / no-param preview
    }
    _solutions    = SAMPLE_SOLUTIONS;
    render();
    runSolutionsHarness();
  } else {
    tableau.extensions.initializeAsync().then(function() {
      _dashboard = tableau.extensions.dashboardContent.dashboard;
      _construct = resolveConstruct();
      _solutions = SAMPLE_SOLUTIONS;

      // TODO §4 live-view wiring (HELD — pending engine §4 lock):
      // When ready, replace the SAMPLE_SOLUTIONS line above with:
      //   var ws = _dashboard.worksheets.find(function(w) {
      //     return w.name === PRIORITIES_SHEET;
      //   });
      //   if (ws) {
      //     ws.getSummaryDataAsync({ maxRows: 5000 }).then(function(dt) {
      //       _solutions = adaptSolutionsView(dt.data.map(function(row) {
      //         var obj = {};
      //         dt.columns.forEach(function(col, i) { obj[col.fieldName] = row[i].value; });
      //         return obj;
      //       }));
      //       render();
      //     });
      //   }

      // Initial render with what we have; async ops below trigger re-renders.
      render();

      // Resolve client brand from parameter; re-render on change.
      // getParametersAsync is on Sheet (Dashboard extends Sheet) — TABLEAU_API_REALITY [tested].
      _dashboard.getParametersAsync().then(function(params) {
        params.forEach(function(p) {
          if (p.name === CONFIG.parameter && p.currentValue && p.currentValue.value) {
            CONFIG.clientBrand = p.currentValue.value;
          }
          p.addEventListener(tableau.TableauEventType.ParameterChanged, function() {
            _dashboard.getParametersAsync().then(function(fresh) {
              fresh.forEach(function(fp) {
                if (fp.name === CONFIG.parameter && fp.currentValue && fp.currentValue.value) {
                  CONFIG.clientBrand = fp.currentValue.value;
                }
              });
              render();
            });
          });
        });
        render();
      }).catch(function(err) {
        console.warn('[solutions_nav] parameter read error:', err);
      });

      // Read per-construct insight from the `insights` sheet.
      if (_construct) {
        readInsightAsync(_dashboard, _construct).then(function(result) {
          _insightResult = result;
          render();
        });
      }
    }).catch(function(err) {
      console.error('[solutions_nav] initializeAsync failed:', err);
      // Outside Tableau — honour ?construct= URL param the same as the no-tableau path
      var urlParams = new URLSearchParams(location.search);
      var urlConst  = urlParams.get('construct');
      if (urlConst) {
        var lower   = urlConst.trim().toLowerCase();
        var urlHits = CONSTRUCT_TOKENS.filter(function(t) { return lower.indexOf(t) !== -1; });
        _construct  = urlHits.length === 1 ? urlHits[0] : null;
      } else {
        _construct = 'growth';
      }
      _solutions = SAMPLE_SOLUTIONS;
      render();
      runSolutionsHarness();
    });
  }
  </script>
</body>
</html>
