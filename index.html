<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BP Nav + Charts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"
          onerror="console.warn('Tableau Extensions API not available — running in preview mode')"></script>
  <script>
// ─── charts.js (inlined) ──────────────────────────────────────────────────
// charts.js — copied verbatim from b_tableau_extensions_2/index.html
// Source: https://raw.githubusercontent.com/BengtCJ/b_tableau_extensions_2/main/index.html

  // ─── METRIC → CHART MAPPING ───────────────────────────────────────────────
  // First entry = default. All entries = structurally compatible.
  // Snapshot charts: data reduced to latest period before rendering.
  // Trend charts: all periods passed through (monthly or quarterly per _viewMode).
  const METRIC_CHARTS = {
    tam:   ['ban'],
    cagr:  ['ban'],
    mcon:  ['ban'],

    // Ratio 0–1, per-brand per-month — supports snapshot + trend
    eqr:   ['vbar-stacked', 'hbar', 'scale-figma', 'inset-bubble', 'progress-ring',
            'waffle', 'bubbles', 'treemap', 'treemap-bar', 'donut', 'bans',
            'line-smooth', 'line-straight', 'area-100', 'stream', 'small-multiples', 'slope'],

    ebl:   ['vbar-stacked', 'hbar', 'scale-figma', 'inset-bubble', 'progress-ring',
            'waffle', 'bubbles', 'treemap', 'treemap-bar', 'donut', 'bans',
            'line-smooth', 'line-straight', 'area-100', 'stream', 'small-multiples', 'slope'],

    sstsr: ['vbar-stacked', 'hbar', 'scale-figma', 'inset-bubble', 'progress-ring', 'waffle',
            'bubbles', 'treemap', 'treemap-bar', 'donut', 'bans',
            'line-smooth', 'line-straight', 'area-100', 'stream', 'small-multiples', 'slope'],

    // Compositional share (brands sum ~100%), per-brand per-month
    sov:   ['inset-bubble', 'area-100', 'treemap-bar', 'stream', 'hbar', 'scale-figma', 'bubbles',
            'line-smooth', 'line-straight', 'small-multiples',
            'treemap', 'donut', 'bans'],

    bss:   ['treemap-bar', 'area-100', 'stream', 'hbar', 'scale-figma', 'bubbles',
            'inset-bubble', 'line-smooth', 'line-straight', 'small-multiples',
            'treemap', 'donut', 'bans'],

    // Signed float — trend charts only (negatives break snapshot bars)
    vom:   ['line-smooth', 'line-straight', 'small-multiples', 'slope'],
    svt:   ['line-smooth', 'line-straight', 'small-multiples', 'slope'],

    // Likert 1–5 snapshot — no waffle/arc/progress-ring (not true ratios)
    bt:    ['scale-figma', 'hbar', 'bans', 'slope', 'ban'],
    nps:   ['hbar', 'scale-figma', 'bans', 'slope', 'ban'],
    sop:   ['scale-figma', 'hbar', 'bans', 'slope', 'ban'],
    dvtr:  ['hbar', 'scale-figma', 'bans', 'slope', 'ban'],

    // Unbounded positive snapshot
    cra:   ['hbar', 'scale-figma', 'bans', 'bubbles', 'treemap', 'treemap-bar',
            'donut', 'inset-bubble', 'ban'],

    // Brand attributes — multiscale blocked until multi-attribute data confirmed
    ba:    ['hbar', 'scale-figma', 'bans', 'ban'],
  };

  // ─── AGGREGATION RULES ────────────────────────────────────────────────────
  // Applied when collapsing monthly rows to quarterly view.
  const INDICATOR_AGGREGATION = {
    sov:   'sum',
    bss:   'sum',
    sstsr: 'sum',
    cra:   'sum',
    vom:   'sum',
    eqr:   'avg',
    ebl:   'avg',
    svt:   'avg',
    bt:    'avg',
    nps:   'avg',
    sop:   'avg',
    dvtr:  'avg',
    tam:   'none',
    cagr:  'none',
    mcon:  'none',
    ba:    'none',
  };

  // ─── DESIGN SYSTEM ────────────────────────────────────────────────────────
  function buildDesign() {
    const sel = CONFIG.selectedColor;
    return {
      donut: {
        banValue:      { font: FONT_TITLE, style: 'italic', color: sel },
        banLabel:      { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        legendLabel:   { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        legendValue:   { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        legendSelected:{ font: FONT_LIGHT, style: 'normal', color: sel },
      },
      bar: {
        valueLabel:    { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        valueLabelSel: { font: FONT_BODY,  style: 'normal', color: sel },
        axisLabel:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        axisLabelSel:  { font: FONT_LIGHT, style: 'normal', color: sel },
      },
      line: {
        axisX:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        axisY:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        gridColor: COL_GRID,
      },
      ban: {
        value: { font: FONT_TITLE, style: 'italic', color: sel },
        label: { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
      },
      bans: {
        primaryValue: { font: FONT_TITLE, size: 56, color: sel },
        compValue:    { font: FONT_TITLE, size: 32, color: '#808080' },
      },
      slope:         { lineP: { color: sel, width: 2.5 }, lineC: { color: '#808080', width: 1 } },
      area100:       { primary: sel, comp: '#808080' },
      stream:        { primary: sel, comp: '#808080' },
      treemap:       { primary: sel, comp: '#808080' },
      treemapBar:    { primary: sel, comp: '#808080' },
      bubbles:       { primary: sel, comp: '#808080' },
      insetBubble:   { primary: sel, comp: '#808080' },
      progressRing:  { primary: sel, comp: '#808080' },
      waffle:        { filled: sel, comp: '#808080', empty: '#4D4D4D', neg: '#D73F58' },
      hbar:          { primary: sel, comp: '#808080' },
      vbarStacked:   { primaryActive: sel, primaryPassive: '#E0697D', compActive: '#808080', compPassive: '#4D4D4D' },
      scaleFigma:    { primary: sel, comp: '#808080' },
      multiscale:    { primary: sel, comp: '#808080' },
      dotMatrix:     { filled: sel, comp: '#808080', passive: '#4D4D4D', neg: '#D73F58' },
      smallMultiples:{ primary: sel, comp: '#808080' },
      arc:           { fill: sel },
    };
  }

  // ─── STATE ────────────────────────────────────────────────────────────────
  let _selectedBrand  = null;  // clicked brand — opacity highlight only
  let _chartOverrides = {};    // { metricId: chartType, ... } — persisted to settings
  let _viewMode       = 'monthly'; // 'quarterly' | 'monthly'

  // ─── CHART RENDERERS ──────────────────────────────────────────────────────
  function renderDonut(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || window.innerWidth  || 480;
    var H = rect.height || window.innerHeight || 300;
    var legendW = Math.min(Math.floor(W * 0.38), 220);
    var available = W - legendW;
    var R = Math.min(H * 0.44, available * 0.5, H < 200 ? 60 : 150);
    var inner = R * 0.46;

    el.style.display        = 'flex';
    el.style.alignItems     = 'center';
    el.style.justifyContent = 'center';
    el.style.gap            = '20px';
    el.style.padding        = '12px';

    var ban = document.createElement('div');
    ban.style.cssText = 'display:flex;flex-direction:column;gap:6px;min-width:110px;';
    var sel = data.find(function(d) { return d.name === selectedBrand; }) || data[0];
    ban.innerHTML =
      '<div style="font-size:' + Math.max(36, R*0.5) + 'px;line-height:1;' +
      'color:' + D.banValue.color + ';font-family:' + D.banValue.font + ';' +
      'font-style:' + D.banValue.style + ';font-weight:400;">' +
      (sel ? sel.value.toFixed(1) : '--') + '</div>' +
      '<div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;' +
      'color:' + D.banLabel.color + ';font-family:' + D.banLabel.font + ';">' +
      (sel ? sel.name : '') + '</div>';
    el.appendChild(ban);

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.setAttribute('width',  R * 2 + 24);
    svgEl.setAttribute('height', R * 2 + 24);
    svgEl.style.flexShrink = '0';
    el.appendChild(svgEl);

    var svg = d3.select(svgEl);
    var g   = svg.append('g').attr('transform', 'translate(' + (R+12) + ',' + (R+12) + ')');

    var arc      = d3.arc().innerRadius(inner).outerRadius(R).padAngle(0.028).cornerRadius(2);
    var arcHover = d3.arc().innerRadius(inner).outerRadius(R+7).padAngle(0.028).cornerRadius(2);
    var pie      = d3.pie().value(function(d) { return d.value; }).sort(null);

    var isTransparent = CONFIG.bgColor === 'transparent';
    var holeColor     = isTransparent ? 'transparent' : CONFIG.bgColor;

    g.selectAll('path').data(pie(data)).join('path')
      .attr('d', arc)
      .attr('fill', function(d) { return d.data.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
      .attr('stroke', holeColor)
      .attr('stroke-width', isTransparent ? 0 : 2)
      .attr('data-brand', function(d) { return d.data.name; })
      .style('cursor', 'pointer')
      .on('mouseover', function() { d3.select(this).attr('d', arcHover); })
      .on('mouseout',  function() { d3.select(this).attr('d', arc); })
      .on('click', async function(e, d) { await selectBrand(d.data.name, dashboard); });

    g.append('circle')
      .attr('r', inner - 2)
      .attr('fill', holeColor)
      .attr('fill-opacity', isTransparent ? 0 : 1);

    var legend = document.createElement('div');
    legend.style.cssText = 'display:flex;flex-direction:column;gap:7px;';
    data.forEach(function(d) {
      var isSelected  = d.name === selectedBrand;
      var labelStyle  = isSelected ? D.legendSelected : D.legendLabel;
      var item = document.createElement('div');
      item.setAttribute('data-brand', d.name);
      item.style.cssText =
        'display:flex;align-items:center;gap:7px;cursor:pointer;' +
        'font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'color:' + labelStyle.color + ';font-family:' + labelStyle.font + ';';
      item.innerHTML =
        '<span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;' +
        'background:' + (isSelected ? CONFIG.selectedColor : CONFIG.neutralColor) + ';"></span>' +
        '<span style="flex:1;">' + d.name + '</span>' +
        '<span style="color:' + D.legendValue.color + ';font-family:' + D.legendValue.font + ';">' +
        d.value.toFixed(1) + '</span>';
      item.onclick = (function(name) {
        return async function() { await selectBrand(name, dashboard); };
      })(d.name);
      legend.appendChild(item);
    });
    el.appendChild(legend);
  }

  // ─── CHART: BAR ───────────────────────────────────────────────────────────
  function renderBar(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || 500;
    var H = rect.height || 300;

    var sorted = data.slice().sort(function(a, b) { return b.value - a.value; });
    var svg = d3.select(el).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .style('width', '100%').style('height', '100%').style('display', 'block');

    var isHorizontal = H < 220 || H < W * 0.35;

    if (isHorizontal) {
      var m = { top:8, right:48, bottom:8, left:88 };
      var w = W - m.left - m.right;
      var h = H - m.top  - m.bottom;
      var g = svg.append('g').attr('transform', 'translate(' + m.left + ',' + m.top + ')');

      var y = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, h]).padding(0.22);
      var x = d3.scaleLinear().domain([0, d3.max(data, function(d) { return d.value; }) * 1.15]).range([0, w]);

      g.selectAll('rect').data(sorted).join('rect')
        .attr('x', 0).attr('y', function(d) { return y(d.name); })
        .attr('width', function(d) { return x(d.value); })
        .attr('height', y.bandwidth())
        .attr('fill', function(d) { return d.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
        .attr('rx', 2).style('cursor', 'pointer')
        .on('click', async function(e, d) { await selectBrand(d.name, dashboard); });

      g.selectAll('.vl').data(sorted).join('text').attr('class', 'vl')
        .attr('x', function(d) { return x(d.value) + 4; })
        .attr('y', function(d) { return y(d.name) + y.bandwidth() / 2; })
        .attr('dominant-baseline', 'middle')
        .style('fill',        function(d) { return d.name === selectedBrand ? D.valueLabelSel.color : D.valueLabel.color; })
        .style('font-size',   '10px')
        .style('font-family', function(d) { return d.name === selectedBrand ? D.valueLabelSel.font : D.valueLabel.font; })
        .text(function(d) { return d.value.toFixed(1); });

      g.selectAll('.lbl').data(sorted).join('text').attr('class', 'lbl')
        .attr('x', -6).attr('y', function(d) { return y(d.name) + y.bandwidth() / 2; })
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
        .style('fill',           function(d) { return d.name === selectedBrand ? D.axisLabelSel.color : D.axisLabel.color; })
        .style('font-size',      '10px')
        .style('font-family',    function(d) { return d.name === selectedBrand ? D.axisLabelSel.font : D.axisLabel.font; })
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .text(function(d) { return truncLabel(d.name, W); });
    } else {
      var m2 = { top:24, right:16, bottom:48, left:44 };
      var w2 = W - m2.left - m2.right;
      var h2 = H - m2.top  - m2.bottom;
      var g2 = svg.append('g').attr('transform', 'translate(' + m2.left + ',' + m2.top + ')');

      var x2 = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, w2]).padding(0.28);
      var y2 = d3.scaleLinear().domain([0, d3.max(data, function(d) { return d.value; }) * 1.15]).range([h2, 0]);

      g2.selectAll('rect').data(sorted).join('rect')
        .attr('x', function(d) { return x2(d.name); })
        .attr('y', function(d) { return y2(d.value); })
        .attr('width', x2.bandwidth())
        .attr('height', function(d) { return h2 - y2(d.value); })
        .attr('fill', function(d) { return d.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
        .attr('rx', 2).style('cursor', 'pointer')
        .on('click', async function(e, d) { await selectBrand(d.name, dashboard); });

      g2.selectAll('.vl').data(sorted).join('text').attr('class', 'vl')
        .attr('x', function(d) { return x2(d.name) + x2.bandwidth() / 2; })
        .attr('y', function(d) { return y2(d.value) - 5; })
        .attr('text-anchor', 'middle')
        .style('fill',        function(d) { return d.name === selectedBrand ? D.valueLabelSel.color : D.valueLabel.color; })
        .style('font-size',   '11px')
        .style('font-family', function(d) { return d.name === selectedBrand ? D.valueLabelSel.font : D.valueLabel.font; })
        .text(function(d) { return d.value.toFixed(1); });

      g2.append('g').attr('transform', 'translate(0,' + h2 + ')')
        .call(d3.axisBottom(x2).tickSize(0))
        .call(function(ax) { ax.select('.domain').remove(); })
        .selectAll('text')
        .style('fill',           function(d) { return d === selectedBrand ? D.axisLabelSel.color : D.axisLabel.color; })
        .style('font-size',      '10px')
        .style('font-family',    function(d) { return d === selectedBrand ? D.axisLabelSel.font : D.axisLabel.font; })
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .attr('dy', '1.4em')
        .text(function(d) { return truncLabel(d, W); });
    }
  }

  // ─── CHART: LINE ──────────────────────────────────────────────────────────
  function renderLine(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || 500;
    var H = rect.height || 300;
    var m = { top:20, right:88, bottom:40, left:40 };
    var w = W - m.left - m.right;
    var h = H - m.top  - m.bottom;

    if (!data[0] || !data[0].period) { renderBar(el, data, selectedBrand, dashboard, buildDesign().bar); return; }

    var brands  = [];
    var periods = [];
    data.forEach(function(d) {
      if (brands.indexOf(d.name)   === -1) brands.push(d.name);
      if (periods.indexOf(d.period)=== -1) periods.push(d.period);
    });
    periods.sort();

    var grouped = brands.map(function(brand) {
      return {
        name: brand,
        values: periods.map(function(period) {
          var match = data.find(function(d) { return d.name === brand && d.period === period; });
          return { period: period, value: match ? match.value : null };
        }).filter(function(d) { return d.value !== null; }),
      };
    });

    var svg = d3.select(el).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .style('width', '100%').style('height', '100%').style('display', 'block');
    var g = svg.append('g').attr('transform', 'translate(' + m.left + ',' + m.top + ')');

    var x = d3.scalePoint().domain(periods).range([0, w]).padding(0.1);
    var y = d3.scaleLinear().domain([
      d3.min(data, function(d) { return d.value; }) * 0.95,
      d3.max(data, function(d) { return d.value; }) * 1.1,
    ]).range([h, 0]);

    var line = d3.line().defined(function(d) { return d.value !== null; })
      .x(function(d) { return x(d.period); })
      .y(function(d) { return y(d.value); })
      .curve(d3.curveMonotoneX);

    grouped.filter(function(b) { return b.name !== selectedBrand; }).forEach(function(brand) {
      g.append('path').datum(brand.values)
        .attr('fill', 'none').attr('stroke', CONFIG.neutralColor)
        .attr('stroke-width', 1).attr('opacity', 0.5).attr('d', line)
        .style('pointer-events', 'none');
      g.append('path').datum(brand.values)
        .attr('fill', 'none').attr('stroke', 'transparent')
        .attr('stroke-width', 18).attr('d', line)
        .style('cursor', 'pointer')
        .on('click', (function(b) { return async function() { await selectBrand(b.name, dashboard); }; })(brand));
    });

    var selBrand = grouped.find(function(b) { return b.name === selectedBrand; });
    if (selBrand) {
      g.append('path').datum(selBrand.values)
        .attr('fill', 'none').attr('stroke', CONFIG.selectedColor)
        .attr('stroke-width', 2.5).attr('d', line).style('pointer-events', 'none');
      g.append('path').datum(selBrand.values)
        .attr('fill', 'none').attr('stroke', 'transparent')
        .attr('stroke-width', 18).attr('d', line).style('cursor', 'pointer')
        .on('click', async function() { await selectBrand(selBrand.name, dashboard); });
      g.selectAll('.dot').data(selBrand.values).join('circle').attr('class', 'dot')
        .attr('cx', function(d) { return x(d.period); })
        .attr('cy', function(d) { return y(d.value); })
        .attr('r', 3.5).attr('fill', CONFIG.selectedColor).style('cursor', 'pointer')
        .on('click', async function() { await selectBrand(selBrand.name, dashboard); });
    }

    var placedY = [];
    grouped.forEach(function(brand) {
      var last = brand.values[brand.values.length - 1];
      if (!last) return;
      var ly = y(last.value);
      placedY.forEach(function(py) { if (Math.abs(py - ly) < 12) ly = py + 12; });
      placedY.push(ly);
      g.append('text')
        .attr('x', x(last.period) + 6).attr('y', ly)
        .attr('dominant-baseline', 'middle')
        .style('fill',           brand.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor)
        .style('font-size',      '10px').style('font-family', FONT_LIGHT)
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .style('cursor', 'pointer')
        .text(truncLabel(brand.name, W))
        .on('click', (function(b) { return async function() { await selectBrand(b.name, dashboard); }; })(brand));
    });

    g.append('g').attr('transform', 'translate(0,' + h + ')')
      .call(d3.axisBottom(x).tickSize(3))
      .call(function(ax) { ax.select('.domain').attr('stroke', D.gridColor); })
      .selectAll('text')
      .style('fill', D.axisX.color).style('font-size', '11px')
      .style('font-family', D.axisX.font)
      .style('text-transform', 'uppercase').style('letter-spacing', '0.06em');

    g.append('g')
      .call(d3.axisLeft(y).ticks(4).tickSize(-w))
      .call(function(ax) {
        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', D.gridColor).attr('stroke-dasharray', '3,3');
      })
      .selectAll('text').style('fill', D.axisY.color).style('font-size', '11px')
      .style('font-family', D.axisY.font);
  }

  // ─── CHART: BAN ───────────────────────────────────────────────────────────
  function renderBAN(el, data, selectedBrand, D) {
    var sel = (Array.isArray(data) ? data.find(function(d) { return d.name === selectedBrand; }) || data[0] : null);
    var value = sel ? sel.value : (data && !Array.isArray(data) ? data : null);
    var rect = el.getBoundingClientRect();
    var W = rect.width || window.innerWidth || 200;
    var H = rect.height || window.innerHeight || 200;
    var fontSize = Math.min(Math.max(H * 0.48, 48), 180);

    el.style.display        = 'flex';
    el.style.flexDirection  = 'column';
    el.style.alignItems     = 'center';
    el.style.justifyContent = 'center';
    el.style.height         = '100%';
    el.style.gap            = '8px';

    var displayVal = value !== null && value !== undefined ? parseFloat(value).toFixed(2) : '--';

    el.innerHTML =
      '<div style="font-size:' + fontSize + 'px;font-weight:400;line-height:1;' +
      'color:' + D.value.color + ';font-family:' + D.value.font + ';font-style:' + D.value.style + ';">' +
      displayVal + '</div>';
  }

  // ─── BANs ─────────────────────────────────────────────────────────────────
  function renderBANs(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];

    var primaryFontSize = Math.min(Math.max(Math.floor(H * 0.52), 48), 160);

    var gap = 3;
    var sorted = data.slice().sort(function(a,b) { return b.value - a.value; });
    var total  = d3.sum(sorted, function(d) { return d.value; });
    var usableW = W - gap * (sorted.length - 1);
    var opacities  = [1.0, 0.82, 0.65, 0.50, 0.38];
    var compBrands = sorted.filter(function(d) { return d.name !== primary; });

    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    var cx = 0;
    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var segW      = (d.value / total) * usableW;
      var compRank  = compBrands.findIndex(function(c) { return c.name === d.name; });
      var op        = isPrimary ? 1 : (opacities[compRank] !== undefined ? opacities[compRank] : 0.25);

    var nComp = competitors.length;

      var nRows = Math.ceil(nComp / nCols);
      var cellW = rightW / nCols;
      var cellH = H / nRows;
      var maxR = Math.min(cellW / 2 - 8, cellH / 2 - 14);

  // ─── INSET BUBBLE ─────────────────────────────────────────────────────────
  function renderInsetBubble(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var reference = d3.max(data, function(d) { return Math.abs(d.value); }) || 100;

    var primaryData = data.find(function(d) { return d.name === primary; });
    var competitors = data.filter(function(d) { return d.name !== primary; })
      .sort(function(a, b) { return b.value - a.value; });

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    var leftW = Math.floor(W * 0.42);
    var rightW = W - leftW;

    // Subtle divider
    svg.append('line')
      .attr('x1', leftW).attr('y1', H * 0.08)
      .attr('x2', leftW).attr('y2', H * 0.92)
      .attr('stroke', COL_GRID).attr('stroke-width', 1).attr('opacity', 0.4);

    // Reference caption
    svg.append('text').attr('x', W - 4).attr('y', 13).attr('text-anchor', 'end')
      .style('font-size', '8px').style('font-family', FONT_LIGHT).style('fill', COL_DARK_GREY)
      .text('○ = max ' + reference.toFixed(1));

    function drawInset(cx, cy, outerR, d, col, opacity, delay) {
      var rInner = Math.min(outerR * 0.97, Math.max(outerR * Math.sqrt(Math.abs(d.value) / reference), 2.5));
      svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', outerR)
        .attr('fill', 'none').attr('stroke', COL_GRID).attr('stroke-width', 1)
        .attr('data-brand', d.name);
      svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 0)
        .attr('fill', col).attr('fill-opacity', opacity)
        .attr('data-brand', d.name).style('cursor', 'pointer')
        .on('click', (function(nm) { return async function() { await selectBrand(nm, _dashboard); }; })(d.name))
        .transition().duration(450).delay(delay).ease(d3.easeBackOut).attr('r', rInner);
      if (rInner >= 12) {
        svg.append('text').attr('x', cx).attr('y', cy + 4).attr('text-anchor', 'middle')
          .style('font-size', Math.min(14, rInner * 0.38) + 'px')
          .style('font-family', FONT_TITLE).style('font-style', 'italic')
          .style('fill', COL_LIGHT_GREY).style('pointer-events', 'none')
          .text(d.value.toFixed(1));
      } else {
        svg.append('line')
          .attr('x1', cx).attr('y1', cy - rInner - 2)
          .attr('x2', cx).attr('y2', cy - outerR - 8)
          .attr('stroke', col).attr('stroke-width', 0.8)
          .attr('stroke-dasharray', '2,2').attr('opacity', 0.65);
        svg.append('text').attr('x', cx).attr('y', cy - outerR - 11)
          .attr('text-anchor', 'middle')
          .style('font-size', '9px').style('font-family', FONT_TITLE).style('font-style', 'italic')
          .style('fill', col).attr('data-brand', d.name)
          .text(d.value.toFixed(1));
      }
      return rInner;
    }

    // Primary hero inset circle
    if (primaryData) {
      var pR = Math.min(leftW / 2 - 14, H / 2 - 30);
      pR = Math.max(pR, 20);
      var pX = leftW / 2, pY = H / 2;
      drawInset(pX, pY, pR, primaryData, D.primary, 1, 0);
      svg.append('text').attr('x', pX).attr('y', pY + pR + 16)

    if (nComp > 0) {

      var cellW = rightW / nCols;
      var cellH = H / nRows;
      var maxR = Math.min(cellW / 2 - 8, cellH / 2 - 18);

        var col = i % nCols;
        var row = Math.floor(i / nCols);

        var cy = row * cellH + cellH / 2;
        var cR = Math.max(maxR * 0.80, 10);
        drawInset(cx, cy, cR, comp, D.comp, 0.78, i * 50 + 100);
        svg.append('text').attr('x', cx).attr('y', cy + cR + 13)
          .attr('text-anchor', 'middle')
          .style('font-size', '9px').style('font-family', FONT_LIGHT)
          .style('text-transform', 'uppercase').style('fill', D.comp)
          .attr('data-brand', comp.name)
          .text(comp.name.slice(0, 4));
      });

    el.style.overflow = 'hidden';
    el.appendChild(svgEl);

  // ─── PROGRESS RING ────────────────────────────────────────────────────────
  function renderProgressRing(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var reference = 1; // eqr/ebl values are 0–1
    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];
    var n = sorted.length;
    var slotW = W / n;
    var R  = Math.min(H < 200 ? 40 : 70, slotW / 2 - 10);
    var sw = Math.max(8, R * 0.22);
    var cy = Math.max(R + 8, Math.min(H / 2, H - R - 22));

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    var arcTrack = d3.arc().innerRadius(R-sw).outerRadius(R).startAngle(-Math.PI).endAngle(Math.PI);
    var arcFill  = d3.arc().innerRadius(R-sw).outerRadius(R).cornerRadius(sw/2);

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var cx  = slotW * i + slotW / 2;
      var col = isPrimary ? D.primary : D.comp;
      var frac = Math.min(Math.abs(d.value) / reference, 1);
      var endAngle = -Math.PI / 2 + frac * 2 * Math.PI;
      var g = svg.append('g').attr('transform','translate(' + cx + ',' + cy + ')');

      g.append('path').attr('d', arcTrack()).attr('fill','var(--grey-700)').attr('opacity',0.30);

      var fillPath = g.append('path')
        .attr('fill',col).attr('fill-opacity', isPrimary ? 1 : 0.80)
        .attr('data-brand', d.name).style('cursor','pointer')
        .on('click', (function(name) { return async function() { await selectBrand(name, _dashboard); }; })(d.name));
      fillPath.transition().duration(700).ease(d3.easeCircleOut)
        .attrTween('d', function() {
          var interp = d3.interpolate(-Math.PI/2, endAngle);
          return function(t) { return arcFill.startAngle(-Math.PI/2).endAngle(interp(t))(); };
        });

      g.append('text').attr('y',4).attr('text-anchor','middle')
        .style('font-size', Math.min(13, R*0.28) + 'px')
        .style('font-family', FONT_TITLE).style('font-style','italic')
        .style('fill',col).text(d.value.toFixed(2));

      svg.append('text').attr('x',cx).attr('y',cy+R+16).attr('text-anchor','middle')
        .style('font-size', isPrimary ? '10px':'9px').style('font-family', FONT_LIGHT)
        .style('text-transform','uppercase').style('fill',col).attr('data-brand', d.name)
        .text(d.name.slice(0,4));
    });

    el.style.overflow = 'hidden';
    el.appendChild(svgEl);

  // ─── WAFFLE CHART ─────────────────────────────────────────────────────────
  function renderWaffle(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.promoterFraction - a.promoterFraction; }),
    ];
    var n = sorted.length;
    var cols = 10, labelH = 22;
    var maxBlockW = n > 1 ? Math.floor((W - (n-1) * 10) / n) : Math.floor(W * 0.8);
    var availH = Math.max(H - labelH - 8, 40);
    var step = Math.max(4, Math.min(Math.floor(availH / cols), Math.floor(maxBlockW / cols)));
    var r = Math.max(1.2, step * 0.34);
    var blockW = cols * step + 2, blockH = cols * step + 2;
    var svgH = blockH + labelH;
    var brandGap = Math.max(6, (W - n * blockW) / Math.max(n-1,1));

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + svgH); svgEl.style.width='100%'; svgEl.style.height=svgH+'px'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    sorted.forEach(function(d, bi) {
      var isPrimary = d.name === primary;
      var bx = bi * (blockW + brandGap);
      var nPromote = Math.round((d.promoterFraction || 0) * 100);
      var nPassive = Math.round((d.passiveFraction  || 0) * 100);
      var col = isPrimary ? D.filled : D.comp;

      var g = svg.append('g').attr('opacity',0).attr('data-brand', d.name).style('cursor','pointer');
      g.on('click', (function(name) { return async function() { await selectBrand(name, _dashboard); }; })(d.name));
      g.transition().duration(500).delay(bi*80).ease(d3.easeCubicOut).attr('opacity',1);

      for (var i = 0; i < 100; i++) {
        var c = i % cols, rw = Math.floor(i / cols);
        var cxd = bx + c * step + r, cyd = rw * step + r;
        var fill, op;
        if (i < nPromote)                  { fill = col;    op = isPrimary ? 1 : 0.78; }
        else if (i < nPromote + nPassive)  { fill = D.passive; op = 0.50; }
        else                               { fill = D.neg;   op = 0.85; }
        g.append('circle').attr('cx',cxd).attr('cy',cyd).attr('r',r)
          .attr('fill',fill).attr('opacity',op);
      }

      svg.append('text').attr('x', bx + blockW/2).attr('y', blockH+16).attr('text-anchor','middle')
        .style('font-size', isPrimary ? '10px':'9px').style('font-family', FONT_LIGHT)
        .style('text-transform','uppercase').style('fill',col).attr('data-brand', d.name)
        .text(d.name.slice(0,4));
    });

    el.style.overflow = 'hidden';
    el.appendChild(svgEl);
  }

  // ─── HORIZONTAL BAR ───────────────────────────────────────────────────────
  function renderHBar(el, data, primary, dashboard, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var mT = 12, mR = 72, mB = 22, mL = Math.max(80, Math.min(Math.floor(W * 0.20), 130));
    var iW = W - mL - mR, iH = H - mT - mB;

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];

    var allVals = data.map(function(d) { return d.value; });
    var vMin = d3.min(allVals), vMax = d3.max(allVals);
    var xDomain = vMin < 0 ? [vMin * 1.1, vMax * 1.1] : [0, vMax * 1.1];

    var band = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, iH]).padding(0.22);
    var bandwidth = Math.min(band.bandwidth(), 44);
    var x = d3.scaleLinear().domain(xDomain).range([0, iW]);

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var g = d3.select(svgEl).append('g').attr('transform','translate(' + mL + ',' + mT + ')');

    // zero line if needed
    if (vMin < 0) {
      g.append('line').attr('x1', x(0)).attr('x2', x(0)).attr('y1',0).attr('y2',iH)
        .attr('stroke', CONFIG.neutralColor).attr('stroke-width',1).attr('opacity',0.5);
    }

    g.append('g').attr('transform','translate(0,' + iH + ')')
      .call(d3.axisBottom(x).ticks(4).tickSize(-iH))
      .call(function(ax) {
        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', COL_GRID).attr('opacity',0.35).attr('stroke-dasharray','2,3');
      })
      .selectAll('text').style('fill', COL_DARK_GREY).style('font-size','9px').style('font-family', FONT_LIGHT);

    var primaryRow = sorted.findIndex(function(d) { return d.name === primary; });
    if (primaryRow >= 0 && primaryRow < sorted.length - 1) {
      var sepY = band(sorted[primaryRow].name) + band.bandwidth() + band.step() * 0.13;
      g.append('line').attr('x1',-mL).attr('x2',iW+mR).attr('y1',sepY).attr('y2',sepY)
        .attr('stroke','var(--grey-700)').attr('stroke-width',0.5);
    }

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var col = isPrimary ? D.primary : D.comp;
      var rowY = band(d.name);
      var barY = rowY + (band.bandwidth() - bandwidth) / 2;
      var barH = bandwidth;
      var barX = vMin < 0 ? x(Math.min(d.value, 0)) : 0;
      var barW = Math.abs(x(d.value) - x(0));

      g.append('rect').attr('x',barX).attr('y',barY).attr('height',barH)
        .attr('width',0).attr('rx',2)
        .attr('fill',col).attr('data-brand',d.name).style('cursor','pointer')
        .on('click', (function(name) { return async function() { await selectBrand(name, dashboard); }; })(d.name))
        .transition().duration(600).delay(i*50).ease(d3.easeCubicOut).attr('width', barW);

      g.append('text').attr('x',-8).attr('y', rowY + band.bandwidth()/2 + 4).attr('text-anchor','end')
        .style('font-size', isPrimary ? '10px':'9px').style('font-family', FONT_LIGHT)
        .style('text-transform','uppercase').style('fill',col).text(d.name);

      var valX = d.value >= 0 ? x(d.value) + 8 : x(d.value) - 8;
      var valAnchor = d.value >= 0 ? 'start' : 'end';
      g.append('text').attr('x',valX).attr('y', rowY + band.bandwidth()/2 + 4)
        .attr('text-anchor',valAnchor)
        .style('font-size','11px').style('font-family', FONT_TITLE).style('font-style','italic')
        .style('fill',col).text(d.value.toFixed(3))
        .attr('opacity',0).transition().duration(300).delay(i*50+600).attr('opacity',1);
    });

    el.appendChild(svgEl);
  }

  // ─── VERTICAL BAR STACKED ─────────────────────────────────────────────────
  function renderVBarStacked(el, data, primary, D) {

    '}'                                                                     +

    '  height:100%;font-size:11px;'                                         +
    "  font-family:'Tableau Light','Helvetica Neue',Arial,sans-serif;"      +
    '  color:#4D4D4D;padding:16px;text-align:center;'                       +
    '}' +
    // ── Scorecard matrix (WO-1) ──
    '.sc-wrap{flex:1;overflow-y:auto;min-height:0;padding-bottom:4px;}' +
    '.sc-meta{padding:8px 12px 4px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}' +
    '.sc-title{text-transform:uppercase;}' +
    '.sc-row-header{display:flex;flex-shrink:0;border-bottom:2px solid #4D4D4D;}' +
    '.sc-row{display:flex;flex-shrink:0;border-bottom:1px solid #2A2828;' +
    '  cursor:pointer;user-select:none;transition:background 0.12s;}' +
    '.sc-row:hover{background:#363232;}' +
    '.sc-row:active{opacity:0.85;}' +
    '.sc-cell-left{flex:1 1 0;min-width:0;padding:8px 12px;display:flex;flex-direction:column;gap:3px;}' +
    '.sc-cell-left .ind-jump{margin-left:0;}' +
    '.sc-cell-left-hdr{flex:1 1 0;min-width:0;padding:8px 12px;}' +
    '.sc-cell,.sc-cell-hdr{flex:0 0 56px;padding:8px 4px;text-align:center;' +
    '  display:flex;flex-direction:column;align-items:center;justify-content:center;' +
    '  gap:2px;overflow:hidden;}';

  function injectCSS() {
    if (document.getElementById(STYLE_ID)) return;
    var style = document.createElement('style');
    style.id = STYLE_ID;
    style.textContent = CSS;
    document.head.appendChild(style);
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  var JUMP_SVG =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
      'stroke-width="1.5" color="#808080">' +
      '<circle cx="12" cy="12" r="10"/>' +
      '<polyline points="8 12 12 16 16 12"/>' +
      '<line x1="12" y1="8" x2="12" y2="16"/>' +
    '</svg>';

  function renderMatrix(root, model, meta, onSelect) {
    var wrap = document.createElement('div');
    wrap.className = 'sc-wrap';

    // Title + question block
    if (meta && (meta.title || meta.question)) {
      var metaDiv = document.createElement('div');
      metaDiv.className = 'sc-meta';
      if (meta.title) {
        var titleEl = document.createElement('div');
        titleEl.className = 'ind-name sc-title';
        titleEl.textContent = meta.title;
        metaDiv.appendChild(titleEl);
      }
      if (meta.question) {
        var qEl = document.createElement('div');
        qEl.className = 'ind-source';
        qEl.textContent = meta.question;
        metaDiv.appendChild(qEl);
      }
      wrap.appendChild(metaDiv);
    }

    if (!model.rows.length) {
      var empty = document.createElement('div');
      empty.className = 'tbl-empty-msg';
      empty.textContent = 'No indicators found';
      wrap.appendChild(empty);
      root.appendChild(wrap);
      return;
    }

    var brands = model.brands;

    // Header row
    var hdrRow = document.createElement('div');
    hdrRow.className = 'sc-row-header';
    var leftHdr = document.createElement('div');
    leftHdr.className = 'sc-cell-left-hdr';
    hdrRow.appendChild(leftHdr);
    brands.forEach(function(brandKey, i) {
      var cell = document.createElement('div');
      cell.className = 'sc-cell-hdr';
      var nameEl = document.createElement('div');
      nameEl.className = 'ind-name';
      nameEl.textContent = (typeof BRAND_DISPLAY_MAP !== 'undefined' && BRAND_DISPLAY_MAP[brandKey])
        ? BRAND_DISPLAY_MAP[brandKey] : brandKey;
      if (i === 0) { nameEl.style.color = 'var(--primary-500, var(--grey-100))'; }
      cell.appendChild(nameEl);
      var sc = model.header[brandKey];
      if (sc !== null && sc !== undefined) {
        var hScore = document.createElement('div');
        hScore.className = 'ind-source';
        hScore.textContent = Number(sc).toFixed(1);
        cell.appendChild(hScore);
      }
      hdrRow.appendChild(cell);
    });
    wrap.appendChild(hdrRow);

    // Body rows
    model.rows.forEach(function(row) {
      var tr = document.createElement('div');
      tr.className = 'sc-row';

      // Left cell: name + source + jump arrow
      var leftCell = document.createElement('div');
      leftCell.className = 'sc-cell-left';
      var nameEl = document.createElement('div');
      nameEl.className = 'ind-name';
      nameEl.textContent = row.name;
      leftCell.appendChild(nameEl);
      if (row.source) {
        var srcEl = document.createElement('div');
        srcEl.className = 'ind-source';
        srcEl.textContent = row.source;
        leftCell.appendChild(srcEl);
      }
      var jumpEl = document.createElement('div');
      jumpEl.className = 'ind-jump';
      jumpEl.innerHTML = JUMP_SVG + '<span class="ind-jump-label">Jump to</span>';
      leftCell.appendChild(jumpEl);
      tr.appendChild(leftCell);

      // Score cells
      brands.forEach(function(brandKey, i) {
        var sc = (row.scores && row.scores[brandKey] !== undefined) ? row.scores[brandKey] : null;
        var cell = document.createElement('div');
        cell.className = 'sc-cell';
        if (sc !== null) {
          var scoreEl = document.createElement('div');
          scoreEl.className = 'ind-name';
          scoreEl.textContent = Number(sc).toFixed(1);
          if (i === 0) {
            scoreEl.style.color = sc > 4
              ? 'var(--rag-green, var(--grey-100))'
              : sc < 2
                ? 'var(--rag-red, var(--grey-100))'
                : 'var(--rag-amber, var(--grey-100))';
          }
          cell.appendChild(scoreEl);
        }
        tr.appendChild(cell);
      });

      tr.addEventListener('click', (function(id) {
        return function() { if (typeof onSelect === 'function') onSelect(id); };
      })(row.id));

      wrap.appendChild(tr);
    });

    root.appendChild(wrap);
  }

  function renderTable(indicators, onIndicatorSelected, onBack, matrixModel, subgroupMeta) {
    injectCSS();

    var root = document.getElementById('table-view');
    if (!root) {
      console.warn('table.js: #table-view element not found');
      return;
    }
    root.innerHTML = '';

    if (typeof onBack === 'function') {
      var backRow = document.createElement('div');
      backRow.className = 'tbl-back-row';
      var backBtn = document.createElement('button');
      backBtn.className = 'tbl-back-btn';
      backBtn.title = 'Back';
      backBtn.textContent = '←';
      backBtn.onclick = onBack;
      backRow.appendChild(backBtn);
      root.appendChild(backRow);
    }

    if (matrixModel) {
      renderMatrix(root, matrixModel, subgroupMeta, onIndicatorSelected);
      return;
    }

    if (!indicators || !indicators.length) {
      var msg = document.createElement('div');
      msg.className = 'tbl-empty-msg';
      msg.textContent = 'No indicators found';
      root.appendChild(msg);
      return;
    }

    indicators.forEach(function (ind) {
      var row = document.createElement('div');
      row.className = 'ind-row';
      row.innerHTML =
        '<div class="ind-left">' +
          '<div class="ind-name">' + escHtml(ind.name) + '</div>' +
          (ind.source
            ? '<div class="ind-source">' + escHtml(ind.source) + '</div>'
            : '') +
        '</div>' +
        '<div class="ind-jump">' +
          JUMP_SVG +
          '<span class="ind-jump-label">Jump to</span>' +
        '</div>';

      row.addEventListener('click', (function (id) {
        return function () {
          if (typeof onIndicatorSelected === 'function') {
            onIndicatorSelected(id);
          }
        };
      })(ind.id));

      root.appendChild(row);
    });
  }

  global.renderTable = renderTable;

})(window);
</script>

    subcategoryIdField: 'subcategory_id',
    brandField:         'Brand Name Upper',
    valueField:         'SUM(Raw Value)',
    yearField:          'Year',
    monthField:         'Month',
    categoryField:      'category_id',
    chart:              'hbar',
    selectedColor:      '#e994a2',
    neutralColor:       '#7d7d7d',
    bgColor:            'transparent',
    showUnits:          'true',
  };

  // ─── STATE ────────────────────────────────────────────────────────────────
  let CONFIG              = Object.assign({}, DEFAULTS);
  let _dashboard          = null;
  let _lastData           = null;
  let _lastSelected       = null;
  let _clientBrand        = null;
  let _allData            = null;       // chart data for current indicator (post period/mode)
  let _selectedPeriod     = 'all';
  let _rawData            = [];         // full cached worksheet rows
  let _indicators         = [];         // parsed { id, name, source } list
  let _scoreModel         = null;       // { brands, header, rows } from scores worksheet; null when unavailable
  let _view               = 'table';
  let _selectedIndicatorId = null;
  var _subgroup           = null;   // resolved subgroup id for this dashboard instance
  // _selectedBrand, _chartOverrides, _viewMode are declared by charts.js

  // ─── SUBGROUP RESOLUTION ─────────────────────────────────────────────────
  // Single function, documented precedence — adding a branch later is additive.
  // Normalises to trim + lowercase so a stray space or case difference in a tab
  // name doesn't silently break resolution.
  function resolveSubgroup() {
    // Branch 1: in-extension selection (future) — not wired
    // Branch 2: parameter (future) — not wired
    // Branch 3: dashboard.name (live) — tab must be named with the subcategory_id
    var name = _dashboard && _dashboard.name ? _dashboard.name : null;
    return name ? name.trim().toLowerCase() : null;
  }

  // ─── HTML / ATTR ESCAPING ─────────────────────────────────────────────────
  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escAttr(s) {
    return String(s == null ? '' : s).replace(/"/g, '&quot;');
  }

  // ─── BACKGROUND ───────────────────────────────────────────────────────────
  // ─── APPLY BACKGROUND ─────────────────────────────────────────────────────
  function applyBackground() {
    document.body.style.background = CONFIG.bgColor;
    document.documentElement.style.background = CONFIG.bgColor;
  }

  // ─── SHARED HELPERS ───────────────────────────────────────────────────────
  // ─── SHARED HELPERS ───────────────────────────────────────────────────────
  function sortWithPrimaryLast(data, primary) {
    return [
      ...data.filter(d => d.name !== primary),
      ...data.filter(d => d.name === primary),
    ];
  }

  function showTooSmall(el) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;' +
      'height:100%;font-size:11px;font-family:\'Tableau Light\',Arial,sans-serif;' +
      'color:var(--grey-700)">Container too small</div>';
  }

  function showEmpty(el) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;' +
      'height:100%;font-size:11px;font-family:\'Tableau Light\',Arial,sans-serif;' +
      'color:var(--grey-700)">No data available</div>';
  }

  function applySelectionOpacity(containerEl, selected) {
    d3.select(containerEl).selectAll('[data-brand]')
      .transition().duration(300).ease(d3.easeCubicOut)
      .style('opacity', function() {
        if (!selected) return 1;
        return this.getAttribute('data-brand') === selected ? 1 : 0.2;
      });
  }

  // ─── PERIOD HELPERS ───────────────────────────────────────────────────────
  // ─── PERIOD HELPERS ───────────────────────────────────────────────────────
  function toYearMonth(year, month) {
    return Math.round(year) + '-' + String(Math.round(month)).padStart(2, '0');
  }

  function toYearQuarter(yearmonth) {
    var parts = yearmonth.split('-');
    var y = parseInt(parts[0]);
    var m = parseInt(parts[1]);
    return y + '-Q' + Math.ceil(m / 3);
  }

  // Returns the three yearmonth strings belonging to a given year+quarter.
  function quarterMonths(year, quarter) {
    var startMonth = (quarter - 1) * 3 + 1;
    var result = [];
    for (var i = 0; i < 3; i++) {
      result.push(toYearMonth(year, startMonth + i));
    }
    return result;
  }

  function sortByPeriod(data) {
    return data.slice().sort(function(a, b) {
      return (a.period || '').localeCompare(b.period || '');
    });
  }

  // ─── QUARTERLY AGGREGATION ────────────────────────────────────────────────
  // ─── QUARTERLY AGGREGATION ────────────────────────────────────────────────
  function aggregateByQuarter(data, metricId) {
    var aggRule = INDICATOR_AGGREGATION[metricId] || 'avg';

    // Group by brand + yearquarter
    var grouped = {};
    data.forEach(function(d) {
      if (!d.period) return;
      var yq  = toYearQuarter(d.period);
      var key = d.name + '||' + yq;
      if (!grouped[key]) grouped[key] = { name: d.name, period: yq, values: [], months: [] };
      grouped[key].values.push(d.value);
      grouped[key].months.push(d.period);
    });

    // Only keep complete quarters (all 3 months present for this brand)
    var result = [];
    Object.keys(grouped).forEach(function(key) {
      var g = grouped[key];
      var qparts = g.period.split('-Q');
      var year    = parseInt(qparts[0]);
      var quarter = parseInt(qparts[1]);
      var expected = quarterMonths(year, quarter);
      var complete = expected.every(function(ym) { return g.months.indexOf(ym) !== -1; });
      if (!complete) return;

      var value = aggRule === 'sum'
        ? d3.sum(g.values)
        : d3.mean(g.values);

      result.push({ name: g.name, period: g.period, value: value });
    });

    return sortByPeriod(result);
  }

  // ─── PIVOT LONG → WIDE ────────────────────────────────────────────────────
  // ─── PIVOT LONG → WIDE ────────────────────────────────────────────────────
  // Used by chart renderers that expect { period, Brand1: v, Brand2: v, ... }
  function pivotToWide(data) {
    var periods = [];
    var brands  = [];
    data.forEach(function(d) {
      if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
      if (d.name   && brands.indexOf(d.name)   === -1) brands.push(d.name);
    });
    periods.sort();
    return periods.map(function(period) {
      var row = { period: period };
      brands.forEach(function(brand) {
        var match = data.find(function(d) { return d.name === brand && d.period === period; });
        row[brand] = match ? match.value : null;
      });
      return row;
    });
  }

  // ─── CHART RESOLVER ───────────────────────────────────────────────────────
  // ─── CHART RESOLVER ───────────────────────────────────────────────────────
  function resolveChart(metricId) {
    // 1. User saved a per-indicator override
    if (_chartOverrides[metricId]) return _chartOverrides[metricId];
    // 2. Recommended default for this metric
    var charts = METRIC_CHARTS[metricId];
    if (charts && charts.length) return charts[0];
    // 3. Global fallback
    return CONFIG.chart;
  }

  // ─── VIEW TOGGLE (refreshViewToggle, refreshPeriodSelector, applyPeriodAndRender)
  function refreshViewToggle() {
    var isTrend = INDICATOR_TREND[CONFIG.metricId];

    var titleEl = document.getElementById('chart-title');
    if (titleEl) {
      var label = METRIC_LABELS[CONFIG.metricId] || CONFIG.metricId || '';
      var unit  = CONFIG.showUnits !== 'false' ? METRIC_UNITS[CONFIG.metricId] : null;
      titleEl.innerHTML = label +
        (unit ? ' <span style="font-size:18px;color:#808080;">(' + unit + ')</span>' : '');
    }

    var header = document.getElementById('chart-header');
    if (header) header.style.display = CONFIG.metricId ? 'flex' : 'none';

    var pillsRow = document.getElementById('pills-row');
    if (pillsRow) pillsRow.style.display = isTrend ? 'flex' : 'none';

    var qBtn = document.getElementById('btn-qtr');
    var mBtn = document.getElementById('btn-mo');
    if (qBtn && mBtn) {
      if (_viewMode === 'quarterly') {
        qBtn.className = 'pill-btn active';
        mBtn.className = 'pill-btn';
      } else {
        qBtn.className = 'pill-btn';
        mBtn.className = 'pill-btn active';
      }
    }
    refreshPeriodSelector();
  }

  function refreshPeriodSelector() {
    var el = document.getElementById('period-selector');
    if (!el) return;
    el.innerHTML = '';
    if (!_allData || !INDICATOR_TREND[CONFIG.metricId]) return;
    var periods = [];
    _allData.forEach(function(d) {
      if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
    });
    periods.sort();
    if (periods.length <= 1) return;

    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;background:#111111;border-radius:8px;padding:3px;gap:2px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);';
    ['all'].concat(periods).forEach(function(p) {
      var isActive = _selectedPeriod === p;
      var btn = document.createElement('button');
      var agg = INDICATOR_AGGREGATION[CONFIG.metricId] || 'avg';
      var allLabel = agg === 'sum' ? 'Total' : (agg === 'avg' ? 'Average' : 'All');
      btn.textContent = p === 'all' ? allLabel : p;
      btn.className = 'period-btn' + (isActive ? ' active' : '');
      btn.onclick = function() {
        _selectedPeriod = p;
        applyPeriodAndRender();
      };
      wrap.appendChild(btn);
    });
    el.appendChild(wrap);
  }

  function applyPeriodAndRender() {
    if (!_allData) return;
    var isMultiPeriod = MULTI_PERIOD_CHARTS.indexOf(CONFIG.chart) !== -1;
    var data;
    if (_selectedPeriod !== 'all') {
      data = _allData.filter(function(d) { return d.period === _selectedPeriod; });
      if (!data.length) { _selectedPeriod = 'all'; data = null; }
    }
    if (!data) {
      if (isMultiPeriod) {
        data = _allData;
      } else {
        var aggRule = INDICATOR_AGGREGATION[CONFIG.metricId] || 'avg';
        if (aggRule === 'none') {
          // No meaningful aggregation — use last period only
          var allPs = [];
          _allData.forEach(function(d) { if (d.period && allPs.indexOf(d.period) === -1) allPs.push(d.period); });
          allPs.sort();
          data = allPs.length > 1 ? _allData.filter(function(d) { return d.period === allPs[allPs.length - 1]; }) : _allData;
        } else {
          // Aggregate all periods per brand (sum or average)
          var grouped = {};
          _allData.forEach(function(d) {
            if (!grouped[d.name]) grouped[d.name] = [];
            grouped[d.name].push(d.value);
          });
          data = Object.keys(grouped).map(function(name) {
            var vals = grouped[name];
            return { name: name, value: aggRule === 'sum' ? d3.sum(vals) : d3.mean(vals) };
          });
        }
      }
    }
    refreshPeriodSelector();
    renderChart(data, _clientBrand, _dashboard);
  }

  // ─── SET VIEW MODE (Qtr/Mo) — re-process current indicator ────────────────
  function setViewMode(mode) {
    _viewMode = mode;
    _selectedPeriod = 'all';
    refreshViewToggle();
    if (_selectedIndicatorId) {
      if (_dashboard) {
        processIndicator(_selectedIndicatorId);
      } else {
        renderChart(getSampleData(CONFIG.chart), _lastSelected, null);
      }
    }
  }

  // ─── DATA GUARDS ─────────────────────────────────────────────────────────

    return false;

  function guardBaAttributes(data) {
    if (!data[0] || !data[0].Trust) {
      console.warn('[ba] Attribute columns missing (need Trust, Innovation, Value, Style, Heritage).');
      return false;
    }
    return true;

  // ─── ROUTER ───────────────────────────────────────────────────────────────
  // ─── ROUTER ───────────────────────────────────────────────────────────────
  function renderChart(data, selectedBrand, dashboard) {
    _lastData     = data;
    _lastSelected = selectedBrand;

    var el = document.getElementById('chart');
    el.innerHTML = '';
    el.removeAttribute('style');

    var D = buildDesign();

    // Charts that need wide-format data
    var needsWide = ['line-straight','line-smooth','area-100','stream','small-multiples'];
    var chartData = (needsWide.indexOf(CONFIG.chart) !== -1 && Array.isArray(data) && data[0] && data[0].name)
      ? pivotToWide(data)
      : data;

    switch (CONFIG.chart) {
      case 'donut':          renderDonut(el, data, selectedBrand, dashboard, D.donut);           break;
      case 'bar':            renderBar(el, data, selectedBrand, dashboard, D.bar);               break;
      case 'line':           renderLine(el, data, selectedBrand, dashboard, D.line);             break;
      case 'ban':            renderBAN(el, data, selectedBrand, D.ban);                          break;
      case 'bans':           renderBANs(el, data, selectedBrand, D.bans);                        break;
      case 'line-straight':  renderLineChart(el, chartData, selectedBrand, true);                break;
      case 'line-smooth':    renderLineChart(el, chartData, selectedBrand, false);               break;
      case 'slope':          renderSlope(el, data, selectedBrand, D.slope);                      break;
      case 'area-100':       renderArea100(el, chartData, selectedBrand, D.area100);             break;
      case 'stream':         renderStream(el, chartData, selectedBrand, D.stream);               break;
      case 'treemap':        renderTreemap(el, data, selectedBrand, D.treemap);                  break;
      case 'treemap-bar':    renderTreemapBar(el, data, selectedBrand, D.treemapBar);            break;
      case 'bubbles':        renderBubbles(el, data, selectedBrand, D.bubbles);                  break;
      case 'inset-bubble':   renderInsetBubble(el, data, selectedBrand, D.insetBubble);          break;
      case 'progress-ring':  renderProgressRing(el, data, selectedBrand, D.progressRing);        break;
      case 'waffle':         renderWaffle(el, data, selectedBrand, D.waffle);                    break;
      case 'hbar':           renderHBar(el, data, selectedBrand, dashboard, D.hbar);             break;
      case 'vbar-stacked':   renderVBarStacked(el, data, selectedBrand, D.vbarStacked);          break;
      case 'scale-figma':    renderScaleFigma(el, data, selectedBrand, D.scaleFigma);            break;
      case 'multiscale':     renderMultiScale(el, data, selectedBrand, D.multiscale);            break;
      case 'dot-matrix':     renderDotMatrix(el, data, selectedBrand, D.dotMatrix);              break;
      case 'small-multiples':renderSmallMultiples(el, chartData, selectedBrand, D.smallMultiples);break;
      case 'arc':            renderArc(el, data, selectedBrand, D.arc);                          break;
      default: showError('Unknown chart type: "' + CONFIG.chart + '"');
    }

    refreshViewToggle();

    // Restore highlight after entrance animations settle
    if (_selectedBrand) {
      var _captureEl = el;
      setTimeout(function() { applySelectionOpacity(_captureEl, _selectedBrand); }, 850);
    }
  }

  // ─── MARK SELECTOR ───────────────────────────────────────────────────────
  // ─── MARK SELECTOR ───────────────────────────────────────────────────────
  async function selectBrand(name, dashboard) {
    // Toggle: clicking the same brand deselects
    _selectedBrand = (_selectedBrand === name) ? null : name;
    applySelectionOpacity(document.getElementById('chart'), _selectedBrand);
    if (!dashboard) return;
    if (_selectedBrand) {
      var criteria = [{ fieldName: CONFIG.brandField, value: _selectedBrand }];
      await Promise.allSettled(
        dashboard.worksheets
          .filter(function(ws) { return ws.name !== CONFIG.worksheet; })
          .map(function(ws) {
            return ws.selectMarksByValueAsync(criteria, tableau.SelectionUpdateType.Replace);
          })
      );
    } else {
      await Promise.allSettled(
        dashboard.worksheets
          .filter(function(ws) { return ws.name !== CONFIG.worksheet; })
          .map(function(ws) { return ws.clearSelectedMarksAsync(); })
      );
    }
  }

  // ─── VIEW SWITCHING ───────────────────────────────────────────────────────
  function switchToTable() {
    _view = 'table';
    document.getElementById('table-view').style.display  = 'flex';
    document.getElementById('chart-shell').style.display = 'none';

    var matrixModel  = null;
    var subgroupMeta = null;
    var list         = _indicators.length ? _indicators : null;

    if (!_dashboard) {
      // No live Tableau connection — use sample data (preview / dev mode)
      var urlSub = new URLSearchParams(location.search).get('subgroup');
      if (urlSub) { urlSub = urlSub.trim().toLowerCase(); }
      var urlSubgroup = urlSub || null;

      var filteredScores = urlSubgroup
        ? SAMPLE_SCORES.filter(function(d) { return d.subcategory_id === urlSubgroup; })
        : SAMPLE_SCORES;
      if (filteredScores.length) {
        matrixModel = buildScoreModel(filteredScores, 'ILLY', urlSubgroup || '');
      }
      subgroupMeta = (urlSubgroup && SUBGROUP_META[urlSubgroup]) ? SUBGROUP_META[urlSubgroup] : null;

      if (!list) {
        var filtered = urlSubgroup
          ? SAMPLE_INDICATORS.filter(function(d) { return d.subcategory_id === urlSubgroup; })
          : SAMPLE_INDICATORS;
        list = filtered.length ? filtered : SAMPLE_INDICATORS;
      }
    } else {
      // Tableau mode
      matrixModel  = _scoreModel;
      subgroupMeta = (_subgroup && SUBGROUP_META[_subgroup]) ? SUBGROUP_META[_subgroup] : null;

      if (!list && !matrixModel) {
        document.getElementById('table-view').innerHTML =
          '<p style="padding:16px;font-family:\'Tableau Light\',sans-serif;color:#666;">' +
          'Name this dashboard tab with a subgroup ID to display its indicators.</p>';
        return;
      }
    }

    renderTable(list, switchToChart, null, matrixModel, subgroupMeta);
  }

  function switchToChart(indicatorId) {
    _view = 'chart';
    _selectedIndicatorId = indicatorId;
    document.getElementById('table-view').style.display  = 'none';
    document.getElementById('chart-shell').style.display = 'flex';

    // Set metric + show header (with back button) before branching, so the
    // user can always return to the table even if data processing fails.
    CONFIG.metricId = indicatorId;
    CONFIG.chart    = resolveChart(indicatorId);
    refreshViewToggle();

    if (_dashboard) {
      processIndicator(indicatorId);
    } else {
      _allData        = null;
      _clientBrand    = null;
      _selectedBrand  = null;
      renderChart(getSampleData(CONFIG.chart), null, null);
    }
  }

  // ─── BUILD SCORE MODEL ────────────────────────────────────────────────────
  // Pure function. Accepts normalised rows {brand, indicator_id, name, source,
  // subcategory_id, score} and returns the pivot model for renderTable or null.
  function buildScoreModel(rawRows, clientBrand, subgroup) {
    var sub = subgroup ? subgroup.trim().toLowerCase() : '';
    var rows = rawRows.filter(function(r) {
      var sc = r.subcategory_id ? r.subcategory_id.trim().toLowerCase() : '';
      return (!sub || sc === sub) &&
             r.indicator_id !== 'overall' &&
             (r.category_id !== 'coffee_general') &&
             r.score !== null && r.score !== undefined && !isNaN(r.score);
    });
    var headerRows = rawRows.filter(function(r) {
      var sc = r.subcategory_id ? r.subcategory_id.trim().toLowerCase() : '';
      return (!sub || sc === sub) && r.indicator_id === 'overall' &&
             r.score !== null && r.score !== undefined && !isNaN(r.score);
    });

    if (!rows.length && !headerRows.length) return null;

    // Collect all brand keys seen across both sets
    var brandSet = {};
    rows.forEach(function(r) { brandSet[r.brand] = true; });
    headerRows.forEach(function(r) { brandSet[r.brand] = true; });
    var allBrandKeys = Object.keys(brandSet);

    // Brand order: client first, then COMPETITOR_ORDER, then any remaining
    var client = clientBrand ? clientBrand.toUpperCase() : '';
    var ordered = [];
    if (client && brandSet[client]) ordered.push(client);
    COMPETITOR_ORDER.forEach(function(k) {
      if (brandSet[k] && ordered.indexOf(k) === -1) ordered.push(k);
    });
    allBrandKeys.forEach(function(k) {
      if (ordered.indexOf(k) === -1) ordered.push(k);
    });

    // Build header {brandKey: score}
    var header = {};
    headerRows.forEach(function(r) { header[r.brand] = r.score; });

    // Build rows: group by indicator_id
    var indMap = {};
    var indOrder = [];
    rows.forEach(function(r) {
      if (!indMap[r.indicator_id]) {
        indMap[r.indicator_id] = { id: r.indicator_id, name: r.name, source: r.source, scores: {} };
        indOrder.push(r.indicator_id);
      }
      indMap[r.indicator_id].scores[r.brand] = r.score;
    });
    var indRows = indOrder.map(function(id) { return indMap[id]; });

    if (!indRows.length) return null;
    return { brands: ordered, header: header, rows: indRows };
  }

  // ─── FETCH SCORE DATA ─────────────────────────────────────────────────────
  // Reads scoreWorksheet, runs isolation probe per rule 6, then builds model.
  async function fetchScoreData() {
    if (!_dashboard || !CONFIG.scoreWorksheet) return null;
    var ws = _dashboard.worksheets.find(function(w) { return w.name === CONFIG.scoreWorksheet; });
    if (!ws) {
      console.warn('[scoreWorksheet] not found:', CONFIG.scoreWorksheet);
      return null;
    }

    // Isolation probe — must succeed before pivot is built (TABLEAU_API_REALITY rule 6)
    try {
      var probe = await ws.getSummaryDataAsync({ maxRows: 1 });
      console.log('[scoreWorksheet probe] OK — cols:',
        probe.columns.map(function(c) { return c.fieldName; }),
        'sample rows:', probe.data.length);
    } catch (e) {
      console.warn('[scoreWorksheet probe FAILED]', e);
      return null;
    }

    // Full read
    try {
      var dt   = await ws.getSummaryDataAsync({ maxRows: 5000 });
      var cols = dt.columns;
      var dataRows = dt.data;

      function colIdx(name) {
        var norm = name.toLowerCase().replace(/[\s_]+/g, '');
        return cols.findIndex(function(c) {
          return c.fieldName.toLowerCase().replace(/[\s_]+/g, '') === norm;
        });
      }

      var brandIdx  = colIdx(CONFIG.brandField);
      var indIdx    = colIdx(CONFIG.indicatorIdField);
      var nameIdx   = colIdx(CONFIG.nameField);
      var sourceIdx = colIdx(CONFIG.sourceField);
      var subcatIdx = colIdx(CONFIG.subcategoryIdField);
      var scoreIdx  = colIdx(CONFIG.scoreField);
      var catIdx    = colIdx(CONFIG.categoryField);

      if (brandIdx === -1 || indIdx === -1 || scoreIdx === -1) {
        console.warn('[scoreWorksheet] required columns missing. Available:',
          cols.map(function(c) { return c.fieldName; }).join(', '));
        return null;
      }

      var normalised = dataRows.map(function(row) {
        var sc = parseFloat(row[scoreIdx].value);
        return {
          brand:          row[brandIdx].formattedValue || row[brandIdx].value || '',
          indicator_id:   indIdx    !== -1 ? (row[indIdx].value    || '') : '',
          name:           nameIdx   !== -1 ? (row[nameIdx].formattedValue   || row[nameIdx].value   || '') : '',
          source:         sourceIdx !== -1 ? (row[sourceIdx].formattedValue || row[sourceIdx].value || '') : '',
          subcategory_id: subcatIdx !== -1 ? (row[subcatIdx].value || row[subcatIdx].formattedValue || '') : '',
          category_id:    catIdx    !== -1 ? (row[catIdx].value    || '') : '',
          score:          isNaN(sc) ? null : sc,
        };
      });

      return buildScoreModel(normalised, CONFIG.clientBrand, _subgroup);
    } catch (e) {
      console.error('[scoreWorksheet] read failed:', e);
      return null;
    }
  }

  // ─── FETCH WORKSHEET ONCE, CACHE _rawData + _indicators ───────────────────
  async function fetchAndCacheData() {
    if (!_dashboard || !CONFIG.worksheet) return;
    var ws = _dashboard.worksheets.find(function(w) { return w.name === CONFIG.worksheet; });
    if (!ws) {
      console.warn('Worksheet not found:', CONFIG.worksheet);
      return;
    }
    try {
      var dt   = await ws.getSummaryDataAsync({ maxRows: 5000 });
      var cols = dt.columns;
      var rows = dt.data;

      function colIdx(name) {
        var norm = name.toLowerCase().replace(/[\s_]+/g, '');
        return cols.findIndex(function(c) {
          return c.fieldName.toLowerCase().replace(/[\s_]+/g, '') === norm;
        });
      }

      var brandIdx  = colIdx(CONFIG.brandField);
      var valueIdx  = colIdx(CONFIG.valueField);
      var yearIdx   = colIdx(CONFIG.yearField);
      var monthIdx  = colIdx(CONFIG.monthField);
      var catIdx    = colIdx(CONFIG.categoryField);
      var indIdx    = colIdx(CONFIG.indicatorIdField);
      var nameIdx   = colIdx(CONFIG.nameField);
      var sourceIdx = colIdx(CONFIG.sourceField);
      var subcatIdx = colIdx(CONFIG.subcategoryIdField);

      if (brandIdx === -1 || valueIdx === -1 || indIdx === -1) {
        var available = cols.map(function(c) { return c.fieldName; }).join(', ');
        console.warn('Required fields missing. Available: ' + available);
        showError('Required fields missing. Available: ' + available);
        return;
      }

      _rawData = rows.map(function(row) {
        var rawVal = parseFloat(row[valueIdx].value);
        var year   = yearIdx  !== -1 ? parseFloat(row[yearIdx].value)  : null;
        var month  = monthIdx !== -1 ? parseFloat(row[monthIdx].value) : null;
        var period = (year && month && !isNaN(year) && !isNaN(month))
          ? toYearMonth(year, month) : null;
        return {
          name:      row[brandIdx].formattedValue || row[brandIdx].value,
          value:     isNaN(rawVal) ? null : rawVal,
          indicator: indIdx    !== -1 ? (row[indIdx].value    || '') : null,
          category:  catIdx    !== -1 ? (row[catIdx].value    || '') : null,
          period:    period,
          _indName:  nameIdx   !== -1 ? (row[nameIdx].formattedValue   || row[nameIdx].value   || '') : '',
          _source:   sourceIdx !== -1 ? (row[sourceIdx].formattedValue || row[sourceIdx].value || '') : '',
          _subcat:   subcatIdx !== -1 ? (row[subcatIdx].value || row[subcatIdx].formattedValue || '') : '',
        };
      }).filter(function(d) { return d.value !== null && d.name !== 'coffee_general'; });

      // Dedupe by indicator_id to build the table
      var seen = {};
      _indicators = [];
      _rawData.forEach(function(d) {
        if (!d.indicator || seen[d.indicator]) return;
        seen[d.indicator] = true;
        _indicators.push({
          id:             d.indicator,
          name:           d._indName || METRIC_LABELS[d.indicator] || d.indicator,
          source:         d._source,
          subcategory_id: d._subcat,
        });
      });
      _indicators.sort(function(a, b) { return a.name.localeCompare(b.name); });
      _subgroup = resolveSubgroup();
      _indicators = _subgroup
        ? _indicators.filter(function(d) {
            var sc = d.subcategory_id ? d.subcategory_id.trim().toLowerCase() : '';
            return sc === _subgroup;
          })
        : [];

      // Fetch scores before rendering (rule 6: probe runs inside fetchScoreData)
      _scoreModel = null;
      if (CONFIG.scoreWorksheet) {
        _scoreModel = await fetchScoreData();
      }

      switchToTable();
    } catch (err) {
      console.error('Data error:', err);
      showError('Data error: ' + err.message);
    }
  }

  // ─── PROCESS DATA FOR A SELECTED INDICATOR ────────────────────────────────
  function processIndicator(indicatorId) {
    CONFIG.metricId = indicatorId;
    CONFIG.chart    = resolveChart(indicatorId);

    var data    = _rawData.filter(function(d) { return d.indicator === indicatorId; });
    var isTrend = INDICATOR_TREND[indicatorId];

    if (isTrend) {
      if (_viewMode === 'quarterly') {
        data = aggregateByQuarter(data, indicatorId);
      } else {
        data = sortByPeriod(data.filter(function(d) { return d.period; }));
      }
    } else {
      var periods = [];
      data.forEach(function(d) {
        if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
      });
      periods.sort();
      if (periods.length > 1) {
        var latest = periods[periods.length - 1];
        data = data.filter(function(d) { return d.period === latest; });
      }
    }

    if (!data.length) { showError('No data for indicator: ' + indicatorId); return; }

    _allData        = data;
    _selectedPeriod = 'all';
    _clientBrand    = null;
    _selectedBrand  = null;

    refreshViewToggle();
    applyPeriodAndRender();
  }

  // ─── TABLEAU INIT ─────────────────────────────────────────────────────────
  applyBackground();

  if (typeof tableau === 'undefined') {
    // Preview mode: sample indicators, no Tableau
    switchToTable();
    showSettings();
  } else {
    tableau.extensions.initializeAsync({
      configure: function() { showSettings(); },
    }).then(async function() {
      _dashboard = tableau.extensions.dashboardContent.dashboard;

      // Load persisted settings
      var settings = tableau.extensions.settings;
      Object.keys(DEFAULTS).forEach(function(k) {
        var val = settings.get(k);
        if (val) CONFIG[k] = val;
      });
      var storedOverrides = settings.get('chartOverrides');
      if (storedOverrides) {
        try { _chartOverrides = JSON.parse(storedOverrides); } catch(e) {}
      }

      applyBackground();

      if (!CONFIG.worksheet) {
        switchToTable();
        showSettings();
        return;
      }
      await fetchAndCacheData();
    }).catch(function(err) {
      console.error('initializeAsync failed:', err);
      switchToTable();
      showSettings();
    });
  }
  </script>
</body>
</html>
