      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, background 0.12s;
    }
    #back-btn:hover, #back-btn:focus { color: #141414; background: #ededed; outline: none; }
    #back-btn svg { width: 18px; height: 18px; flex-shrink: 0; fill: currentColor; }

    #chart-header {
      display: none;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 16px 24px;
      flex-shrink: 0;
      gap: 16px;
    }
    #chart-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    #chart-name {
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      font-size: 24px;
      color: #ededed;
      line-height: 1.2;
    }
    #chart-source {
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: #777;
    }
    #chart-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #pills-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #period-selector {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-wrap: wrap;
    }

    .period-btn {
      border: none;
      height: 30px;
      padding: 0 10px;
      font-size: 11px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: #444;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .period-btn.active {
      background: #2e2e2e;
      color: #e6e6e6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    #chart {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .error {
      color: #e994a2;
      font-size: 13px;
      padding: 16px;
      font-family: monospace;
    }

    #settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #settings-dialog {
      background: #222222;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      width: 680px;
      max-width: 95vw;
      color: #e6e6e6;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    #settings-dialog h2 {
      font-size: 15px;
      color: #e994a2;

  // ─── PERIOD HELPERS ───────────────────────────────────────────────────────
  // ─── PERIOD HELPERS ───────────────────────────────────────────────────────
  function toYearMonth(year, month) {
    return Math.round(year) + '-' + String(Math.round(month)).padStart(2, '0');
  }

  function toYearQuarter(yearmonth) {
    var parts = yearmonth.split('-');
    var y = parseInt(parts[0]);
    var m = parseInt(parts[1]);
    return y + '-Q' + Math.ceil(m / 3);
  }

  // Returns the three yearmonth strings belonging to a given year+quarter.
  function quarterMonths(year, quarter) {
    var startMonth = (quarter - 1) * 3 + 1;
    var result = [];
    for (var i = 0; i < 3; i++) {
      result.push(toYearMonth(year, startMonth + i));
    }
    return result;
  }

  function sortByPeriod(data) {
    return data.slice().sort(function(a, b) {
      return (a.period || '').localeCompare(b.period || '');
    });
  }

  // ─── QUARTERLY AGGREGATION ────────────────────────────────────────────────
  // ─── QUARTERLY AGGREGATION ────────────────────────────────────────────────
  function aggregateByQuarter(data, metricId) {
    var aggRule = INDICATOR_AGGREGATION[metricId] || 'avg';

    // Group by brand + yearquarter
    var grouped = {};
    data.forEach(function(d) {
      if (!d.period) return;
      var yq  = toYearQuarter(d.period);
      var key = d.name + '||' + yq;
      if (!grouped[key]) grouped[key] = { name: d.name, period: yq, values: [], months: [] };
      grouped[key].values.push(d.value);
      grouped[key].months.push(d.period);
    });

    // Only keep complete quarters (all 3 months present for this brand)
    var result = [];
    Object.keys(grouped).forEach(function(key) {
      var g = grouped[key];
      var qparts = g.period.split('-Q');
      var year    = parseInt(qparts[0]);
      var quarter = parseInt(qparts[1]);
      var expected = quarterMonths(year, quarter);
      var complete = expected.every(function(ym) { return g.months.indexOf(ym) !== -1; });
      if (!complete) return;

      var value = aggRule === 'sum'
        ? d3.sum(g.values)
        : d3.mean(g.values);

      result.push({ name: g.name, period: g.period, value: value });
    });

    return sortByPeriod(result);
  }

  // ─── PIVOT LONG → WIDE ────────────────────────────────────────────────────
  // ─── PIVOT LONG → WIDE ────────────────────────────────────────────────────
  // Used by chart renderers that expect { period, Brand1: v, Brand2: v, ... }
  function pivotToWide(data) {
    var periods = [];
    var brands  = [];
    data.forEach(function(d) {
      if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
      if (d.name   && brands.indexOf(d.name)   === -1) brands.push(d.name);
    });
    periods.sort();
    return periods.map(function(period) {
      var row = { period: period };
      brands.forEach(function(brand) {
        var match = data.find(function(d) { return d.name === brand && d.period === period; });
        row[brand] = match ? match.value : null;
      });
      return row;
    });
  }

    if (nameEl) {
      var label = METRIC_LABELS[CONFIG.metricId] || CONFIG.metricId || '';
      var isHeadlineBan = ['tam', 'cagr', 'mcon'].indexOf(CONFIG.metricId) !== -1;
      var unit  = (!isHeadlineBan && CONFIG.showUnits !== 'false') ? METRIC_UNITS[CONFIG.metricId] : null;
      nameEl.textContent = label + (unit ? ' (' + unit + ')' : '');
    }
    var srcEl = document.getElementById('chart-source');
    if (srcEl) {
      var indForSrc = _indicators.find(function(i) { return i.id === CONFIG.metricId; });
      if (!indForSrc && _scoreModel) {
        indForSrc = _scoreModel.rows.find(function(r) { return r.id === CONFIG.metricId; });
      }
      srcEl.textContent = (indForSrc && indForSrc.source) ? indForSrc.source : '';
    }

    var header = document.getElementById('chart-header');
    if (header) header.style.display = CONFIG.metricId ? 'flex' : 'none';

    var pillsRow = document.getElementById('pills-row');
    if (pillsRow) pillsRow.style.display = hasTrend ? 'flex' : 'none';

    var qBtn = document.getElementById('btn-qtr');
    var mBtn = document.getElementById('btn-mo');
    if (qBtn && mBtn) {
      // Show only buttons for grains that have data
      qBtn.style.display = (_availableGrains && _availableGrains.quarterly) ? '' : 'none';
      mBtn.style.display = (_availableGrains && _availableGrains.monthly)   ? '' : 'none';
      if (_viewMode === 'quarterly') {
        qBtn.className = 'pill-btn active';
        mBtn.className = 'pill-btn';
      } else {
        qBtn.className = 'pill-btn';
        mBtn.className = 'pill-btn active';
      }
    }
    refreshPeriodSelector();
    refreshDirectionSwitcher();
  }

  // ─── DIRECTION SWITCHER (ban_editorial / ban_radial / ban_ledger) ──────────
  var BAN_DIR_LABELS = { 'ban_editorial': 'Editorial', 'ban_radial': 'Radial', 'ban_ledger': 'Ledger' };
  var HEADLINE_BAN_IDS = ['tam', 'cagr', 'mcon'];

  function refreshDirectionSwitcher() {
    var sw = document.getElementById('direction-switcher');
    if (!sw) return;
    sw.innerHTML = '';
    var mId = CONFIG.metricId;
    if (HEADLINE_BAN_IDS.indexOf(mId) === -1) { sw.style.display = 'none'; return; }
    var validDirs = METRIC_CHARTS[mId] || [];
    if (validDirs.length <= 1) { sw.style.display = 'none'; return; }
    sw.style.display = 'flex';
    validDirs.forEach(function(dir) {
      var btn = document.createElement('button');
      btn.textContent = BAN_DIR_LABELS[dir] || dir;
      btn.className = 'pill-btn' + (CONFIG.chart === dir ? ' active' : '');
      btn.onclick = function() {
        if (CONFIG.chart === dir) return;
        CONFIG.chart = dir;
        _banDirections[mId] = dir;
        refreshDirectionSwitcher();
        applyPeriodAndRender();
      };
      sw.appendChild(btn);
    });
  }

  function refreshPeriodSelector() {
    var el = document.getElementById('period-selector');
    if (!el) return;
    el.innerHTML = '';
    if (!_allData || !(_availableGrains && _availableGrains.monthly)) return;
    var periods = [];
    _allData.forEach(function(d) {
      if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
    });
    periods.sort();
    if (periods.length <= 1) return;

    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;background:#111111;border-radius:8px;padding:3px;gap:2px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);';
    ['all'].concat(periods).forEach(function(p) {
      var isActive = _selectedPeriod === p;
      var btn = document.createElement('button');
      var agg = INDICATOR_AGGREGATION[CONFIG.metricId] || 'avg';
      var allLabel = agg === 'sum' ? 'Total' : (agg === 'avg' ? 'Average' : 'All');
      btn.textContent = p === 'all' ? allLabel : p;
      btn.className = 'period-btn' + (isActive ? ' active' : '');
      btn.onclick = function() {
        _selectedPeriod = p;
        applyPeriodAndRender();
      };
      wrap.appendChild(btn);
    });
    el.appendChild(wrap);
  }

  function applyPeriodAndRender() {
    if (!_allData) return;
    var isMultiPeriod = MULTI_PERIOD_CHARTS.indexOf(CONFIG.chart) !== -1;
    var data;
    if (_selectedPeriod !== 'all') {
      data = _allData.filter(function(d) { return d.period === _selectedPeriod; });
      if (!data.length) { _selectedPeriod = 'all'; data = null; }
    }
    if (!data) {
      if (isMultiPeriod) {
        data = _allData;
      } else {
        var aggRule = INDICATOR_AGGREGATION[CONFIG.metricId] || 'avg';
        if (aggRule === 'none') {
          // No meaningful aggregation — use last period only
          var allPs = [];
          _allData.forEach(function(d) { if (d.period && allPs.indexOf(d.period) === -1) allPs.push(d.period); });
          allPs.sort();
          data = allPs.length > 1 ? _allData.filter(function(d) { return d.period === allPs[allPs.length - 1]; }) : _allData;
        } else {
          // Aggregate all periods per brand (sum or average)
          var grouped = {};
          _allData.forEach(function(d) {
            if (!grouped[d.name]) grouped[d.name] = [];
            grouped[d.name].push(d.value);
          });
          data = Object.keys(grouped).map(function(name) {
            var vals = grouped[name];
            return { name: name, value: aggRule === 'sum' ? d3.sum(vals) : d3.mean(vals) };
          });
        }
      }
    }
    refreshPeriodSelector();
    renderChart(data, CONFIG.clientBrand, _dashboard);
  }

  // ─── SET VIEW MODE (Qtr/Mo) — re-process current indicator ────────────────
  function setViewMode(mode) {
    _viewMode = mode;
    _selectedPeriod = 'all';
    refreshViewToggle();
    if (_selectedIndicatorId) {
      if (_dashboard) {
        processIndicator(_selectedIndicatorId);
      } else {
        renderChart(getSampleData(CONFIG.chart), _lastSelected, null);
      }
    }
  }

  // ─── DATA GUARDS ─────────────────────────────────────────────────────────
  // ─── DATA GUARDS ─────────────────────────────────────────────────────────
  function guardStarbucksPresent(data, metricId) {
    if (!data.some(function(d) { return d.name === 'Starbucks'; }))
      console.warn('[' + metricId + '] Starbucks missing from dataset.');
  }

  function guardNpsRecalculated(data) {
    if (data && data.illy && data.illy.nps > 5) return true;
    console.warn('[nps] Values appear to be Likert means, not true NPS. Arc blocked.');
    return false;
  }

  function guardBaAttributes(data) {
    if (!data[0] || !data[0].Trust) {
      console.warn('[ba] Attribute columns missing (need Trust, Innovation, Value, Style, Heritage).');
      return false;
    }
    return true;
  }

  function guardRatioNotStacked(metricId, chartType) {
    var ratioMetrics = ['eqr', 'ebl', 'sstsr'];
    if (ratioMetrics.indexOf(metricId) !== -1 && chartType === 'vbar-stacked')
      console.warn('[' + metricId + '] Ratio 0-1 rendered as stacked bar — independent fractions do not sum to 100%, use grouped vbar.');
  }

  function guardSignedFloatStraight(metricId, chartType) {
    var signedMetrics = ['vom', 'svt'];
    if (signedMetrics.indexOf(metricId) !== -1 && chartType === 'line-smooth')
      console.warn('[' + metricId + '] Signed-float trend using smoothed line — default should be line-straight to avoid fabricated zero-crossings.');
  }

  // ─── SHARED: grouped-cell frame assertion ─────────────────────────────────
  // checkGroupedCellFrame(label, frameEl, checkFn)
  // Asserts a grouped-cell container: gap === 2px AND frame radius = cell radius + 2.
  // frameEl must have [data-grouped-cell] children (set by the renderer).
  // checkFn has the same signature as the local check() inside each harness.
  function checkGroupedCellFrame(label, frameEl, checkFn) {
    if (!frameEl) { checkFn(label + '-gcf-present', false, 'no frame element'); return; }
    var cells = frameEl.querySelectorAll('[data-grouped-cell]');
    if (!cells.length) { checkFn(label + '-gcf-has-cells', false, 'no [data-grouped-cell] children'); return; }

    var cs = window.getComputedStyle(frameEl);
    var gapOk = (cs.gap === '2px' || cs.gap === '2px 2px' || cs.rowGap === '2px');
    checkFn(label + '-gcf-gutter-2px', gapOk, 'gap=' + cs.gap + ' rowGap=' + cs.rowGap);

    var frameR = parseFloat(cs.borderRadius) || parseFloat(cs.borderTopLeftRadius) || 0;
    var cellR  = parseFloat(window.getComputedStyle(cells[0]).borderRadius) ||
                 parseFloat(window.getComputedStyle(cells[0]).borderTopLeftRadius) || 0;
    var radiusOk = (frameR === cellR + 2);
    checkFn(label + '-gcf-radius-nested', radiusOk, 'frame-r=' + frameR + ' cell-r=' + cellR + ' expected=' + (cellR + 2));
  }

  // ─── BAN-SHELL HARNESS ────────────────────────────────────────────────────
  // Call runBanShellHarness() from the browser console after rendering a headline ban.
  // Returns { pass: bool, results: [{name, ok, detail}] } and logs to console.
  function runBanShellHarness() {
    var results = [];
    var pass = true;

    function check(name, ok, detail) {
      results.push({ name: name, ok: ok, detail: detail || '' });
      if (!ok) pass = false;
    }

    var chartEl = document.getElementById('chart');

    // 1. Guaranteed pink present (rule or active-band marker)
    var pinkRules   = chartEl ? chartEl.querySelectorAll('[data-ban-pink-rule]') : [];
    var pinkMarkers = chartEl ? chartEl.querySelectorAll('[data-ban-active-marker]') : [];
    check('guaranteed-pink-present', (pinkRules.length + pinkMarkers.length) > 0,
      pinkRules.length + ' rule(s), ' + pinkMarkers.length + ' marker(s)');

    // 2. Hero is neutral #ededed, not pink
    var heroEls = chartEl ? chartEl.querySelectorAll('[data-ban-hero]') : [];
    var heroOk = true;
    heroEls.forEach(function(h) {
      var c = h.style.color;
      if (c === '#e994a2' || c === 'rgb(233, 148, 162)') heroOk = false;
    });
    check('hero-neutral-not-pink', heroOk, heroEls.length + ' hero element(s)');

    // 3. Gutter uniform 2px — grid gap on lockup el, and bands column gap if present
    var lockupEl = chartEl; // el itself carries data-ban-lockup in new grid layout
    var gutterOk = false;
    var gutterDetail = 'no lockup';
    if (lockupEl) {
      var csLock = window.getComputedStyle(lockupEl);
      var gridGapOk = (csLock.gap === '2px' || csLock.rowGap === '2px' || csLock.columnGap === '2px');
      var rail = chartEl ? chartEl.querySelector('[data-ban-rail]') : null;
      var railGapOk = true;
      var railGapDetail = 'no rail';
      if (rail) {
        var csRail = window.getComputedStyle(rail);
        railGapOk = (csRail.gap === '2px' || csRail.rowGap === '2px');
        railGapDetail = 'rail-gap=' + csRail.gap;
      }
      gutterOk = gridGapOk && railGapOk;
      gutterDetail = 'grid-gap=' + csLock.gap + (rail ? ' ' + railGapDetail : ' no-rail');
    }
    check('gutter-uniform-2px', gutterOk, gutterDetail);

    // 4. Cell border-radius 8px when band cells present (no nested frame in new grid design)
    var radiiOk = true;
    var radiiDetail = 'no band cells';
    var banCellsR = chartEl ? chartEl.querySelectorAll('[data-ban-cell]') : [];
    if (banCellsR.length > 0) {
      var cellBr = window.getComputedStyle(banCellsR[0]).borderRadius;
      radiiOk = (cellBr === '8px');
      radiiDetail = 'cell-radius=' + cellBr;
    }
    check('cell-radius-8px', radiiOk, radiiDetail);

    // 5. No {{...}} placeholder tokens or literal "pending" text visible
    var bodyText = chartEl ? (chartEl.innerText || '') : '';
    var hasToken   = /\{\{[^}]+\}\}/.test(bodyText);
    var hasPending = /\bpending\b/i.test(bodyText);
    check('no-placeholder-tokens', !hasToken && !hasPending,
      hasToken ? 'Found {{…}} token' : (hasPending ? 'Found "pending" text' : 'clean'));

    // 6. Grid fills frame: el is a CSS grid filling its container (new grid-fills-frame layout)
    (function() {
      var csEl = chartEl ? window.getComputedStyle(chartEl) : null;
      var isGrid = csEl && csEl.display === 'grid';
      var hasCols = chartEl && (chartEl.style.gridTemplateColumns || '').indexOf('fr') !== -1;
      check('grid-fills-frame', isGrid && hasCols,
        csEl ? 'display=' + csEl.display + ' cols=' + (chartEl.style.gridTemplateColumns || 'none') : 'no element');
    })();

    // 7. Hero fixed-size: hero element has a font-size in the sanctioned clamp band [100, 200]
    (function() {
      if (CONFIG.chart === 'ban_radial') {
        check('hero-size-clamped', true, 'radial — hero embedded in ring SVG (fixed-scale approach)'); return;
      }
      var heroEl = chartEl ? chartEl.querySelector('[data-ban-hero]') : null;
      if (!heroEl) { check('hero-size-clamped', false, 'no [data-ban-hero] element found'); return; }
      var fsPx = parseInt(heroEl.style.fontSize, 10);
      var ok = !isNaN(fsPx) && fsPx >= 100 && fsPx <= 200;
      check('hero-size-clamped', ok, 'font-size=' + (heroEl.style.fontSize || 'unset'));
    })();

    // 8. Grid fills frame (structural): [data-ban-textcol] element exists in the grid
    var textColEl = chartEl ? chartEl.querySelector('[data-ban-textcol]') : null;
    check('textcol-present-in-grid', !!textColEl,
      textColEl ? 'data-ban-textcol present' : 'no data-ban-textcol element found');

    // 9. No absolute positioning inside the ban shell (all text in normal flow)
    var absEls = chartEl ? chartEl.querySelectorAll('[data-ban-lockup] *') : [];
    var absOk = true;
    Array.prototype.forEach.call(absEls, function(el) {
      if (el.style.position === 'absolute') absOk = false;
    });
    check('no-absolute-positioning', absOk, absOk ? 'all elements normal-flow' : 'found position:absolute');

    // 10. Direction switcher valid-set per metric
    (function() {
      var mId = CONFIG.metricId;
      var sw = document.getElementById('direction-switcher');
      var HEADLINE = ['tam', 'cagr', 'mcon'];
      if (HEADLINE.indexOf(mId) === -1) {
        check('direction-switcher-not-shown-for-non-headline', !sw || sw.style.display === 'none',
          'switcher hidden for non-headline metric');
        return;
      }
      var expected = METRIC_CHARTS[mId] || [];
      var btns = sw ? Array.prototype.slice.call(sw.querySelectorAll('button')) : [];
      var btnTexts = btns.map(function(b) { return b.textContent; });
      var LABELS = { 'ban_editorial': 'Editorial', 'ban_radial': 'Radial', 'ban_ledger': 'Ledger' };
      var expectedLabels = expected.map(function(d) { return LABELS[d] || d; });
      var countOk = btns.length === expected.length;
      var labelsOk = expectedLabels.every(function(l) { return btnTexts.indexOf(l) !== -1; });
      check('direction-switcher-valid-set', countOk && labelsOk,
        'expected [' + expectedLabels.join(', ') + '] got [' + btnTexts.join(', ') + ']');

      // Check active button matches CONFIG.chart
      var activeBtns = btns.filter(function(b) { return b.className.indexOf('active') !== -1; });
      var activeLabel = activeBtns.length ? activeBtns[0].textContent : '';
      var expectedActive = LABELS[CONFIG.chart] || CONFIG.chart;
      check('direction-switcher-active-matches-chart', activeLabel === expectedActive,
        'active=' + activeLabel + ' chart=' + CONFIG.chart);
    })();

    // 11. No granularity toggle for point-in-time (aggregation=none) metrics
    (function() {
      var mId = CONFIG.metricId;
      var isPointInTime = INDICATOR_AGGREGATION[mId] === 'none';
      if (!isPointInTime) return; // only relevant for cagr/tam/mcon/ba
      var pillsRow = document.getElementById('pills-row');
      var hidden = !pillsRow || pillsRow.style.display === 'none';
      check('no-granularity-toggle-for-point-in-time', hidden,
        'pills-row display=' + (pillsRow ? pillsRow.style.display : 'no element'));
    })();

    // 12. Chart-name element carries the canonical METRIC_LABELS title (title owner: chrome header)
    (function() {
      var mId = CONFIG.metricId;
      var HEADLINE = ['tam', 'cagr', 'mcon'];
      if (HEADLINE.indexOf(mId) === -1) return;
      var canonical = METRIC_LABELS[mId] || '';
      var nameEl = document.getElementById('chart-name');
      var cardTitle = nameEl ? nameEl.textContent : '(no chart-name el)';
      check('canonical-title-matches', cardTitle === canonical,
        'chart-name="' + cardTitle + '" canonical="' + canonical + '"');
    })();

    // 13–15. Direction-switch checks: switch through all valid directions and verify
    (function() {
      var mId = CONFIG.metricId;
      var HEADLINE = ['tam', 'cagr', 'mcon'];
      if (HEADLINE.indexOf(mId) === -1) return;
      var validDirs = METRIC_CHARTS[mId] || [];
      var origChart = CONFIG.chart;
      var PREVIEW_BAN = { cagr: 1.9, tam: 14.4, mcon: 2002 };
      var numVal = PREVIEW_BAN[mId];
      var brand = CONFIG.clientBrand;

      validDirs.forEach(function(dir) {
        CONFIG.chart = dir;
        if (dir === 'ban_radial')  { renderBanRadial(chartEl, getBanShellContent(mId, numVal, brand)); }
        else if (dir === 'ban_ledger') { renderBanLedger(chartEl, getBanShellContent(mId, numVal, brand)); }
        else { renderBanShell(chartEl, getBanShellContent(mId, numVal, brand)); }

        var pr = chartEl.querySelectorAll('[data-ban-pink-rule]');
        var pm = chartEl.querySelectorAll('[data-ban-active-marker]');
        check('dir-' + dir + '-guaranteed-pink', (pr.length + pm.length) > 0,
          pr.length + ' rule, ' + pm.length + ' marker');

        var tc = chartEl.querySelector('[data-ban-textcol]');
        check('dir-' + dir + '-textcol-present', !!tc,
          tc ? 'data-ban-textcol present' : 'no textcol');
      });

      // Restore original
      CONFIG.chart = origChart;
      if (origChart === 'ban_radial')  { renderBanRadial(chartEl, getBanShellContent(mId, numVal, brand)); }
      else if (origChart === 'ban_ledger') { renderBanLedger(chartEl, getBanShellContent(mId, numVal, brand)); }
      else { renderBanShell(chartEl, getBanShellContent(mId, numVal, brand)); }
    })();

    // 22–27. Aspect-size checks: wide/short (1500×340) and narrow/tall (400×700)
    (function() {
      var HEADLINE_IDS = ['tam', 'cagr', 'mcon'];
      var mId = (typeof CONFIG !== 'undefined') ? CONFIG.metricId : '';
      if (HEADLINE_IDS.indexOf(mId) === -1) {
        check('aspect-checks-setup', false, 'not a headline metric — skip aspect checks');
        return;
      }
      var PREVIEW_BAN = { cagr: 1.9, tam: 14.4, mcon: 2002 };
      var numVal = PREVIEW_BAN[mId];
      var brand  = (typeof CONFIG !== 'undefined') ? CONFIG.clientBrand : 'Illy Coffee';
      var testEl = chartEl;

      function renderDir(tEl, ct) {
        if (CONFIG.chart === 'ban_radial')  { renderBanRadial(tEl, ct); }
        else if (CONFIG.chart === 'ban_ledger') { renderBanLedger(tEl, ct); }
        else { renderBanShell(tEl, ct); }
      }

      function runAtSize(label, w, h) {
        var origStyle = testEl.style.cssText;
        testEl.style.cssText = 'width:' + w + 'px;height:' + h + 'px;position:relative;overflow:hidden;';
        renderDir(testEl, getBanShellContent(mId, numVal, brand));

        // Pink guaranteed
        var pr = testEl.querySelectorAll('[data-ban-pink-rule]');
        var pm = testEl.querySelectorAll('[data-ban-active-marker]');
        check(label + '-guaranteed-pink', (pr.length + pm.length) > 0,
          pr.length + ' rule, ' + pm.length + ' marker');

        // No overlap among visible text/hero elements
        var nodes = Array.prototype.slice.call(
          testEl.querySelectorAll('[data-ban-hero],[data-ban-reading]')
        ).filter(function(n) { return n.style.display !== 'none'; });
        var overlapOk = true;
        for (var i = 0; i < nodes.length && overlapOk; i++) {
          for (var j = i + 1; j < nodes.length && overlapOk; j++) {
            var ra = nodes[i].getBoundingClientRect(), rb = nodes[j].getBoundingClientRect();
            if (ra.width > 0 && rb.width > 0 && ra.height > 0 && rb.height > 0) {
              if (Math.min(ra.bottom, rb.bottom) - Math.max(ra.top, rb.top) > 1 &&
                  Math.min(ra.right, rb.right) - Math.max(ra.left, rb.left) > 1) {
                overlapOk = false;
              }
            }
          }
        }
        check(label + '-no-overlap', overlapOk, 'checked ' + nodes.length + ' element(s)');

        // Grid is present (grid-fills-frame at this size)
        var csT = window.getComputedStyle(testEl);
        check(label + '-grid-fills-frame', csT.display === 'grid',
          'display=' + csT.display);

        testEl.style.cssText = origStyle;
        renderDir(testEl, getBanShellContent(mId, numVal, brand));
      }

      runAtSize('wide-short-1500x340',  1500, 340);
      runAtSize('narrow-tall-400x700',   400, 700);
    })();

    // hero-size-constant: hero font-size is in the [100, 200] band across values and container sizes.
    // Covers A1 (fixed, not container-derived) and A3 (stable across values).
    (function() {
      var HEADLINE = ['tam', 'cagr', 'mcon'];
      if (HEADLINE.indexOf(CONFIG.metricId) === -1) {
        check('hero-size-constant', true, 'non-headline metric — skip'); return;
      }
      var brand = CONFIG.clientBrand;
      var testEl = chartEl;
      var allOk = true;
      var detail = '';

      // Representative values per metric covering short, mid, and longer strings
      var TEST_VALS = { cagr: [1.9, 5.5, 12.4], tam: [9.4, 14.4, 120.4], mcon: [800, 1502, 2002] };
      var vals = TEST_VALS[CONFIG.metricId] || [1.9, 14.4, 2002];

      var dirsToCheck = (METRIC_CHARTS[CONFIG.metricId] || ['ban_editorial']).filter(function(d) {
        return d !== 'ban_radial'; // radial hero is embedded in the rings SVG — separate fixed approach
      });

      dirsToCheck.forEach(function(dir) {
        var sizes = vals.map(function(numVal) {
          var origStyle = testEl.style.cssText;
          testEl.style.cssText = 'width:800px;height:500px;position:relative;overflow:hidden;';
          if (dir === 'ban_ledger') { renderBanLedger(testEl, getBanShellContent(CONFIG.metricId, numVal, brand)); }
          else { renderBanShell(testEl, getBanShellContent(CONFIG.metricId, numVal, brand)); }
          var hEl = testEl.querySelector('[data-ban-hero]');
          var fsPx = hEl ? parseInt(hEl.style.fontSize, 10) : NaN;
          testEl.style.cssText = origStyle;
          return fsPx;
        });
        var allInBand = sizes.every(function(s) { return !isNaN(s) && s >= 100 && s <= 200; });
        if (!allInBand) { allOk = false; detail += dir + ':out-of-band(' + sizes.join(',') + ') '; }
        else { detail += dir + ':sizes(' + sizes.join(',') + ') '; }
      });

      // Also verify radial has its rings SVG
      if ((METRIC_CHARTS[CONFIG.metricId] || []).indexOf('ban_radial') !== -1) {
        var origStyle = testEl.style.cssText;
        testEl.style.cssText = 'width:800px;height:500px;position:relative;overflow:hidden;';
        renderBanRadial(testEl, getBanShellContent(CONFIG.metricId, 1.9, brand));
        var rSvg = testEl.querySelector('[data-ban-rings-svg]');
        if (!rSvg) { allOk = false; detail += 'ban_radial:no-rings-svg '; }
        else { detail += 'ban_radial:rings-svg-ok '; }
        testEl.style.cssText = origStyle;
      }

      // Restore
      var numVal = ({cagr:1.9, tam:14.4, mcon:2002})[CONFIG.metricId];
      if (CONFIG.chart === 'ban_radial') { renderBanRadial(testEl, getBanShellContent(CONFIG.metricId, numVal, brand)); }
      else if (CONFIG.chart === 'ban_ledger') { renderBanLedger(testEl, getBanShellContent(CONFIG.metricId, numVal, brand)); }
      else { renderBanShell(testEl, getBanShellContent(CONFIG.metricId, numVal, brand)); }

      check('hero-size-constant', allOk, detail.trim());
    })();

    // hero-not-geometry-derived: hero font-size stays fixed when container width changes (A1, A4).
    (function() {
      var HEADLINE = ['tam', 'cagr', 'mcon'];

  // ─── VALUE-NUMERAL HARNESS ────────────────────────────────────────────────
  // runValueNumeralHarness() — call from browser console after rendering any non-BAN chart.
  // Returns { pass: bool, results: [{name, ok, detail}] }.
  function runValueNumeralHarness() {
    var results = [];
    var pass = true;
    function check(name, ok, detail) {
      results.push({ name: name, ok: ok, detail: detail || '' });
      if (!ok) pass = false;
    }

    var BAN_CHARTS = ['ban_editorial', 'ban_radial', 'ban_ledger'];
    var isBan = BAN_CHARTS.indexOf(CONFIG.chart) !== -1;

    // 1. BAN charts must have zero data-value-numeral elements
    var chartEl = document.getElementById('chart');
    var numerals = chartEl ? chartEl.querySelectorAll('[data-value-numeral]') : [];
    if (isBan) {
      check('ban-no-value-numeral', numerals.length === 0,
        numerals.length + ' data-value-numeral element(s) found in BAN chart');
      var finalPass = results.every(function(r) { return r.ok; });
      console.group('[ValueNumeralHarness] ' + (finalPass ? 'PASS ✓' : 'FAIL ✗'));
      results.forEach(function(r) {
        console.log((r.ok ? '✓' : '✗') + ' ' + r.name + (r.detail ? ' — ' + r.detail : ''));
      });
      console.groupEnd();
      return { pass: finalPass, results: results };
    }

    // 2. Non-BAN charts that carry value numerals must have at least one
    var NO_NUMERAL_CHARTS = ['line', 'slope', 'area-100', 'stream', 'dot-matrix',
      'small-multiples', 'arc', 'vbar-stacked', 'waffle'];
    var expectsNumeral = NO_NUMERAL_CHARTS.indexOf(CONFIG.chart) === -1;
    if (expectsNumeral) {
      check('value-numeral-present', numerals.length > 0,
        'expected ≥1 [data-value-numeral], found ' + numerals.length + ' (chart=' + CONFIG.chart + ')');
    }

    // 3. Each value-numeral element must be Baskerville italic 24px
    var badFont = [], badSize = [], badStyle = [];
    Array.prototype.forEach.call(numerals, function(el) {
      var cs = window.getComputedStyle(el);
      var ff = (cs.fontFamily || el.style.fontFamily || '');
      var fs = (cs.fontSize || el.style.fontSize || '');
      var fi = (cs.fontStyle || el.style.fontStyle || '');
      if (ff.indexOf('Baskerville') === -1) badFont.push(ff);
      if (fs !== '24px') badSize.push(fs);
      if (fi !== 'italic') badStyle.push(fi);
    });
    check('value-numeral-font-baskerville', badFont.length === 0,
      badFont.length ? 'bad font-family on ' + badFont.length + ' el(s): ' + badFont[0] : 'ok');
    check('value-numeral-size-24px', badSize.length === 0,
      badSize.length ? 'bad font-size on ' + badSize.length + ' el(s): ' + badSize[0] : 'ok');
    check('value-numeral-style-italic', badStyle.length === 0,
      badStyle.length ? 'bad font-style on ' + badStyle.length + ' el(s): ' + badStyle[0] : 'ok');

    // 4. BAN shell children must never carry data-value-numeral
    var banEls = chartEl ? chartEl.querySelectorAll('[data-ban-lockup] [data-value-numeral], [data-ban-hero] [data-value-numeral]') : [];
    check('ban-children-no-value-numeral', banEls.length === 0,
      banEls.length + ' data-value-numeral element(s) inside BAN shell');

    var finalPass2 = results.every(function(r) { return r.ok; });
    console.group('[ValueNumeralHarness] ' + (finalPass2 ? 'PASS ✓' : 'FAIL ✗'));
    results.forEach(function(r) {
      console.log((r.ok ? '✓' : '✗') + ' ' + r.name + (r.detail ? ' — ' + r.detail : ''));
    });
    console.groupEnd();
    return { pass: finalPass2, results: results };
  }

    guardRatioNotStacked(CONFIG.metricId, CONFIG.chart);

    // Charts that need wide-format data
    var needsWide = ['line-straight','line-smooth','area-100','stream','small-multiples'];
    var chartData = (needsWide.indexOf(CONFIG.chart) !== -1 && Array.isArray(data) && data[0] && data[0].name)
      ? pivotToWide(data)
      : data;

    switch (CONFIG.chart) {
      case 'donut':          renderDonut(el, data, selectedBrand, dashboard, D.donut);           break;
      case 'bar':            renderBar(el, data, selectedBrand, dashboard, D.bar);               break;

  // ─── BUILD SCORE MODEL ────────────────────────────────────────────────────
  // Pure function. Accepts normalised rows {brand, indicator_id, name, source,
  // subcategory_id, score} and returns the pivot model for renderTable or null.
  function buildScoreModel(rawRows, clientBrand, subgroup) {
    var sub = subgroup ? subgroup.trim().toLowerCase() : '';
    var rows = rawRows.filter(function(r) {
      var sc = r.subcategory_id ? r.subcategory_id.trim().toLowerCase() : '';
      return (!sub || sc === sub) &&
             r.indicator_id !== 'overall' &&
             (r.category_id !== 'coffee_general') &&
             r.score !== null && r.score !== undefined && !isNaN(r.score);
    });

    if (!rows.length) return null;

    // Collect brand keys from metric rows only
    var brandSet = {};
    rows.forEach(function(r) { brandSet[r.brand] = true; });
    var allBrandKeys = Object.keys(brandSet);

    // Brand order: client first, then COMPETITOR_ORDER, then any remaining
    var client = clientBrand ? clientBrand.toUpperCase() : '';
    var ordered = [];
    if (client && brandSet[client]) ordered.push(client);
    COMPETITOR_ORDER.forEach(function(k) {
      if (brandSet[k] && ordered.indexOf(k) === -1) ordered.push(k);
    });
    allBrandKeys.forEach(function(k) {
      if (ordered.indexOf(k) === -1) ordered.push(k);
    });

    // Build rows: group by indicator_id
    var indMap = {};
    var indOrder = [];
    rows.forEach(function(r) {
      if (!indMap[r.indicator_id]) {
        indMap[r.indicator_id] = { id: r.indicator_id, name: r.name || METRIC_LABELS[r.indicator_id] || r.indicator_id, source: r.source, scores: {} };
        indOrder.push(r.indicator_id);
      }
      indMap[r.indicator_id].scores[r.brand] = r.score;
    });
    var indRows = indOrder.map(function(id) { return indMap[id]; });

    if (!indRows.length) return null;
    return { brands: ordered, rows: indRows };
  }

  // ─── FETCH SCORE DATA ─────────────────────────────────────────────────────
  // Reads scoreWorksheet, runs isolation probe per rule 6, then builds model.
  async function fetchScoreData() {
    if (!_dashboard || !CONFIG.scoreWorksheet) return null;
    var ws = _dashboard.worksheets.find(function(w) { return w.name === CONFIG.scoreWorksheet; });
    if (!ws) {
      console.warn('[scoreWorksheet] not found:', CONFIG.scoreWorksheet);
      return null;
    }

    // Isolation probe — must succeed before pivot is built (TABLEAU_API_REALITY rule 6)
    try {
      var probe = await ws.getSummaryDataAsync({ maxRows: 1 });
      console.log('[scoreWorksheet probe] OK — cols:',
        probe.columns.map(function(c) { return c.fieldName; }),
        'sample rows:', probe.data.length);
    } catch (e) {
      console.warn('[scoreWorksheet probe FAILED]', e);
      return null;
    }

    // Full read
    try {
      var dt   = await ws.getSummaryDataAsync({ maxRows: 5000 });
      var cols = dt.columns;
      var dataRows = dt.data;

      function colIdx(name) {
        var norm = name.toLowerCase().replace(/[\s_]+/g, '');
        return cols.findIndex(function(c) {
          return c.fieldName.toLowerCase().replace(/[\s_]+/g, '') === norm;
        });
      }

      var brandIdx      = colIdx(CONFIG.brandField);
      var indIdx        = colIdx(CONFIG.indicatorIdField);
      var nameIdx       = colIdx(CONFIG.nameField);
      var sourceIdx     = colIdx(CONFIG.sourceField);
      var subcatIdx     = colIdx(CONFIG.subcategoryIdField);
      var subcatNameIdx = colIdx('subcategory_name');
      var scoreIdx      = colIdx(CONFIG.scoreField);
      var catIdx        = colIdx(CONFIG.categoryField);
      var levelIdx      = colIdx('level');
      if (levelIdx === -1) {
        console.warn('[scoreWorksheet] no "level" column — treating all rows as metric-level');
      }

      if (brandIdx === -1 || indIdx === -1 || scoreIdx === -1) {
        console.warn('[scoreWorksheet] required columns missing. Available:',
          cols.map(function(c) { return c.fieldName; }).join(', '));
        return null;
      }

      var normalised = dataRows.map(function(row) {
        var sc = parseFloat(row[scoreIdx].value);
        var rawBrand = String(row[brandIdx].formattedValue || row[brandIdx].value || '').trim().toUpperCase();
        return {
          brand:          BRAND_ALIASES[rawBrand] || rawBrand,
          indicator_id:   indIdx    !== -1 ? (row[indIdx].value    || '') : '',
          name:           nameIdx   !== -1 ? (row[nameIdx].formattedValue   || row[nameIdx].value   || '') : '',
          source:         sourceIdx !== -1 ? (row[sourceIdx].formattedValue || row[sourceIdx].value || '') : '',
          subcategory_id: subcatIdx !== -1 ? (row[subcatIdx].value || row[subcatIdx].formattedValue || '') : '',
          category_id:    catIdx    !== -1 ? (row[catIdx].value    || '') : '',
          level:          levelIdx  !== -1 ? String(row[levelIdx].value || '').toLowerCase() : 'metric',
          score:          isNaN(sc) ? null : sc,
        };
      }).filter(function(r) { return r.level === 'metric'; });
      _rawScoreNormalized = normalised;   // cache for brand-parameter re-renders

      var subcategoryName = '';
      if (subcatNameIdx !== -1) {
        var nameRow = dataRows.find(function(row) {
          var sc = subcatIdx !== -1 ? (row[subcatIdx].value || row[subcatIdx].formattedValue || '') : '';
          return sc.trim().toLowerCase() === (_subgroup || '');
        });
        if (nameRow) subcategoryName = nameRow[subcatNameIdx].formattedValue || nameRow[subcatNameIdx].value || '';
      }
      return { model: buildScoreModel(normalised, CONFIG.clientBrand, _subgroup), subcategoryName: subcategoryName };
    } catch (e) {
      console.error('[scoreWorksheet] read failed:', e);
      return null;
    }
  }

  // ─── FETCH WORKSHEET ONCE, CACHE _rawData + _indicators ───────────────────
  async function fetchAndCacheData() {
    if (!_dashboard || !CONFIG.worksheet) return;
    var ws = _dashboard.worksheets.find(function(w) { return w.name === CONFIG.worksheet; });
    if (!ws) {
      console.warn('Worksheet not found:', CONFIG.worksheet);
      return;
    }
    try {
      var dt   = await ws.getSummaryDataAsync({ maxRows: 5000 });
      var cols = dt.columns;
      var rows = dt.data;

      function colIdx(name) {
        var norm = name.toLowerCase().replace(/[\s_]+/g, '');
        return cols.findIndex(function(c) {
          return c.fieldName.toLowerCase().replace(/[\s_]+/g, '') === norm;
        });
      }

      var brandIdx  = colIdx(CONFIG.brandField);
      var valueIdx  = colIdx(CONFIG.valueField);
      var yearIdx    = colIdx(CONFIG.yearField);
      var monthIdx   = colIdx(CONFIG.monthField);
      var quarterIdx = colIdx(CONFIG.quarterField);
      var periodIdx  = CONFIG.periodField ? colIdx(CONFIG.periodField) : -1;
      var catIdx     = colIdx(CONFIG.categoryField);
      var indIdx    = colIdx(CONFIG.indicatorIdField);
      var nameIdx   = colIdx(CONFIG.nameField);
      var sourceIdx = colIdx(CONFIG.sourceField);
      var subcatIdx     = colIdx(CONFIG.subcategoryIdField);
      var subcatNameIdx = colIdx('subcategory_name');

      if (brandIdx === -1 || valueIdx === -1 || indIdx === -1) {
        var available = cols.map(function(c) { return c.fieldName; }).join(', ');
        console.warn('[fetchAndCacheData] worksheet="' + CONFIG.worksheet +
          '" cols=' + cols.length + ' rows=' + rows.length +
          ' brand=' + brandIdx + ' value=' + valueIdx + ' ind=' + indIdx +
          ' | Available: ' + available);
        showError('Required fields missing in "' + CONFIG.worksheet + '" (' +
          cols.length + ' cols, ' + rows.length + ' rows). ' +
          (cols.length === 0
            ? 'Worksheet returned no columns — check shelf fields and manifest data permission.'
            : 'Available: ' + available));
        return;
      }

      // ─── PRE-PASS: infer year for null-Year rows ─────────────────────────────
      // Some indicators (e.g. SVT from Snowflake) have Year='%null%' because their
      // date source doesn't map to the worksheet's Year dimension. We recover the year
      // by matching each brand's per-indicator quarter sequence (sorted by raw row
      // order) against the ordered (year, quarter) pairs extracted from rows that DO
      // have Year populated. A raw-row-index map is built so the main rows.map pass
      // can use the inferred year transparently.
      var _inferredYearByRI = {};
      if (yearIdx !== -1 && quarterIdx !== -1) {
        // Step 1 — sorted unique (year, quarter) pairs from rows with non-null Year
        var _ypSeen = {}, _ypList = [];
        rows.forEach(function(row) {
          var rawY = row[yearIdx].value;
          if (!rawY || rawY === '%null%' || rawY === 'Null') return;
          var y = Math.round(parseFloat(rawY));
          var q = Math.round(parseFloat(row[quarterIdx].value));
          if (y > 0 && q > 0) {
            var k = y + '|' + q;
            if (!_ypSeen[k]) { _ypSeen[k] = true; _ypList.push([y, q]); }
          }
        });
        _ypList.sort(function(a, b) { return a[0] !== b[0] ? a[0] - b[0] : a[1] - b[1]; });

        // Step 2 — collect null-Year rows grouped by (indicator, brand), in raw order
        var _nullGroups = {};
        rows.forEach(function(row, ri) {
          var rawY = row[yearIdx].value;
          if (rawY && rawY !== '%null%' && rawY !== 'Null') return;
          var q = quarterIdx !== -1 ? Math.round(parseFloat(row[quarterIdx].value)) : 0;
          if (!q || q <= 0 || isNaN(q)) return;
          var ind   = indIdx   !== -1 ? (row[indIdx].value   || '') : '';
          var brand = row[brandIdx].formattedValue || row[brandIdx].value || '';
          var gk = ind + '||' + brand;
          if (!_nullGroups[gk]) _nullGroups[gk] = [];
          _nullGroups[gk].push({ ri: ri, q: q });
        });

        // Step 3 — find matching consecutive subsequence in _ypList per group
        Object.keys(_nullGroups).forEach(function(gk) {
          var grp = _nullGroups[gk].sort(function(a, b) { return a.ri - b.ri; });
          var n = grp.length;
          if (n === 0 || n > _ypList.length) return;
          var qtrs = grp.map(function(r) { return r.q; });
          for (var s = 0; s <= _ypList.length - n; s++) {
            var ok = true;
            for (var j = 0; j < n; j++) {
              if (_ypList[s + j][1] !== qtrs[j]) { ok = false; break; }
            }
            if (ok) {
              grp.forEach(function(r, j) { _inferredYearByRI[r.ri] = _ypList[s + j][0]; });
              break;
            }
          }
        });
      }

      _rawData = rows.map(function(row, rowIdx) {
        var rawVal = parseFloat(row[valueIdx].value);
        var rawY   = yearIdx !== -1 ? row[yearIdx].value : null;
        var isYNull = !rawY || rawY === '%null%' || rawY === 'Null';
        var year   = isYNull
          ? (_inferredYearByRI[rowIdx] || null)
          : parseFloat(rawY);
        var month   = monthIdx   !== -1 ? parseFloat(row[monthIdx].value)   : null;
        var quarter = quarterIdx !== -1 ? parseFloat(row[quarterIdx].value) : null;

        // Period: prefer an explicit pre-computed field (periodField config), then
        // Year+Month, then Year+Quarter (year may be inferred from the pre-pass above).
        var period = null;
        if (periodIdx !== -1) {
          var pRaw = row[periodIdx].value || row[periodIdx].formattedValue || '';
          if (pRaw && pRaw !== '%null%' && pRaw !== 'Null') period = String(pRaw).trim();
        }
        if (!period) {
          period = (year && month && !isNaN(year) && !isNaN(month))
            ? toYearMonth(year, month)
            : (year && quarter && !isNaN(year) && !isNaN(quarter))
              ? (year + '-Q' + quarter)
              : null;
        }

        return {
          name:      row[brandIdx].formattedValue || row[brandIdx].value,
          value:     isNaN(rawVal) ? null : rawVal,
          indicator: indIdx    !== -1 ? (row[indIdx].value    || '') : null,
          category:  catIdx    !== -1 ? (row[catIdx].value    || '') : null,
          period:    period,
          _indName:  nameIdx   !== -1 ? (row[nameIdx].formattedValue   || row[nameIdx].value   || '') : '',
          _source:   sourceIdx !== -1 ? (row[sourceIdx].formattedValue || row[sourceIdx].value || '') : '',
          _subcat:     subcatIdx     !== -1 ? (row[subcatIdx].value     || row[subcatIdx].formattedValue     || '') : '',
          _subcatName: subcatNameIdx !== -1 ? (row[subcatNameIdx].formattedValue || row[subcatNameIdx].value || '') : '',
        };
      }).filter(function(d) { return d.value !== null && d.name !== 'coffee_general'; });

      // Dedupe by indicator_id to build the table
      var seen = {};
      _indicators = [];
      _rawData.forEach(function(d) {
        if (!d.indicator || seen[d.indicator]) return;
        seen[d.indicator] = true;
        _indicators.push({
          id:             d.indicator,
          name:           d._indName || METRIC_LABELS[d.indicator] || d.indicator,
          source:         d._source,
          subcategory_id: d._subcat,
        });
      });
      _indicators.sort(function(a, b) { return a.name.localeCompare(b.name); });
      _subgroup = resolveSubgroup();
      var subcatRow = _rawData.find(function(d) {
        var sc = d._subcat ? d._subcat.trim().toLowerCase() : '';
        return _subgroup ? sc === _subgroup : false;
      });
      _subcategoryName = (subcatRow && subcatRow._subcatName)
        ? subcatRow._subcatName
        : (SUBGROUP_META[_subgroup] && SUBGROUP_META[_subgroup].title ? SUBGROUP_META[_subgroup].title : null);

      _indicators = _subgroup
        ? _indicators.filter(function(d) {
            var sc = d.subcategory_id ? d.subcategory_id.trim().toLowerCase() : '';
            return sc === _subgroup;
          })
        : [];

      // Fetch scores before rendering (rule 6: probe runs inside fetchScoreData)
      _scoreModel = null;
      if (CONFIG.scoreWorksheet) {
        var scoreResult = await fetchScoreData();
        _scoreModel = scoreResult ? scoreResult.model : null;
        if (scoreResult && scoreResult.subcategoryName) _subcategoryName = scoreResult.subcategoryName;
      }

      switchToTable();
    } catch (err) {
      console.error('Data error:', err);
      showError('Data error: ' + err.message);
    }
  }

  // ─── DATA-DRIVEN GRAIN DETECTION ─────────────────────────────────────────
  // Returns which granularities are non-empty for a given indicator.
  // monthly: true if the indicator has ≥2 distinct periods.
  // quarterly: true if aggregateByQuarter would produce ≥2 distinct quarter-periods.
  function computeAvailableGrains(indicatorId) {
    var rows = _rawData.filter(function(d) { return d.indicator === indicatorId && d.period; });
    if (rows.length < 2) return { monthly: false, quarterly: false };

    // Partition periods by format: YYYY-MM (monthly) vs YYYY-Q# (already quarterly)
    var moPeriods = [], qPeriods = [];
    rows.forEach(function(d) {
      if (/^\d{4}-\d{2}$/.test(d.period)) {
        if (moPeriods.indexOf(d.period) === -1) moPeriods.push(d.period);
      } else if (/^\d{4}-Q\d$/.test(d.period)) {
        if (qPeriods.indexOf(d.period) === -1) qPeriods.push(d.period);
      }
    });

    var hasMonthly = moPeriods.length >= 2;

    // Quarterly: directly available if already Q-format, OR derivable by aggregating monthly rows
    var hasQuarterly = qPeriods.length >= 2;
    if (!hasQuarterly && hasMonthly) {
      var agg = aggregateByQuarter(rows, indicatorId);
      var aggQs = [];
      agg.forEach(function(d) {
        if (d.period && aggQs.indexOf(d.period) === -1) aggQs.push(d.period);
      });
      hasQuarterly = aggQs.length >= 2;
    }

    return { monthly: hasMonthly, quarterly: hasQuarterly };
  }

  // ─── PROCESS DATA FOR A SELECTED INDICATOR ────────────────────────────────
  function processIndicator(indicatorId) {
    CONFIG.metricId = indicatorId;
    CONFIG.chart    = resolveChart(indicatorId);

    // Data-driven grain detection — replaces static INDICATOR_TREND check
    _availableGrains = computeAvailableGrains(indicatorId);

    // Reset viewMode if the current mode has no data at that grain
    if (_viewMode === 'quarterly' && !_availableGrains.quarterly) {
      _viewMode = 'monthly';
    }
    // Symmetric fallback: monthly → quarterly when only quarterly data exists
    if (_viewMode === 'monthly' && !_availableGrains.monthly && _availableGrains.quarterly) {
      _viewMode = 'quarterly';
    }

    var data    = _rawData.filter(function(d) { return d.indicator === indicatorId; });
    var isTrend = _availableGrains.monthly || _availableGrains.quarterly;

    if (isTrend) {
      if (_viewMode === 'quarterly') {
        // If data is already in YYYY-Q# format, skip aggregation (aggregateByQuarter
        // expects YYYY-MM input and would produce NaN quarters from quarterly strings).
        data = _availableGrains.monthly
          ? aggregateByQuarter(data, indicatorId)
          : sortByPeriod(data.filter(function(d) { return d.period; }));
      } else {
        data = sortByPeriod(data.filter(function(d) { return d.period; }));
      }
    } else {
      var periods = [];
      data.forEach(function(d) {
        if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
      });
      periods.sort();
      if (periods.length > 1) {
        var latest = periods[periods.length - 1];
        data = data.filter(function(d) { return d.period === latest; });
      }
    }

    if (!data.length) { showError('No data for indicator: ' + indicatorId); return; }

    _allData        = data;
    _selectedPeriod = 'all';
    _selectedBrand  = null;

    refreshViewToggle();
    applyPeriodAndRender();
  }

  // ─── COLUMN DISCOVERY (for settings autocomplete) ─────────────────────────
  async function loadColumnOptions(worksheetName) {
    if (!_dashboard || !worksheetName) return [];
    var ws = _dashboard.worksheets.find(function(w) { return w.name === worksheetName; });
    if (!ws) return [];
    try {
      var dt = await ws.getSummaryDataAsync({ maxRows: 1 });
      return dt.columns.map(function(c) { return c.fieldName; });
    } catch(e) { return []; }
  }

  // ─── SETTINGS DIALOG ──────────────────────────────────────────────────────
  async function showSettings() {
    var existing = document.getElementById('settings-overlay');
    if (existing) existing.remove();

    var worksheets    = _dashboard ? _dashboard.worksheets.map(function(ws) { return ws.name; }) : [];
    var columns       = await loadColumnOptions(CONFIG.worksheet);
    var scoreColumns  = await loadColumnOptions(CONFIG.scoreWorksheet);

    var wsOptions = worksheets.length
      ? worksheets.map(function(w) {
          return '<option value="' + escAttr(w) + '"' + (w === CONFIG.worksheet ? ' selected' : '') + '>' + escHtml(w) + '</option>';
        }).join('')
      : '';
    var swsOptions = worksheets.length
      ? worksheets.map(function(w) {
          return '<option value="' + escAttr(w) + '"' + (w === CONFIG.scoreWorksheet ? ' selected' : '') + '>' + escHtml(w) + '</option>';
        }).join('')
      : '';
    var colOptions      = columns.map(function(c) { return '<option value="' + escAttr(c) + '">'; }).join('');
    var scoreColOptions = scoreColumns.map(function(c) { return '<option value="' + escAttr(c) + '">'; }).join('');

    var isTransparent = CONFIG.bgColor === 'transparent';
    var bgValue       = isTransparent ? '#333333' : CONFIG.bgColor;

    var overlay = document.createElement('div');
    overlay.id = 'settings-overlay';
    overlay.innerHTML =
      '<div id="settings-dialog">' +
        '<h2>BP Nav + Charts <span class="version">v' + VERSION + '</span></h2>' +
        '<datalist id="s-columns">' + colOptions + '</datalist>' +
        '<datalist id="s-score-columns">' + scoreColOptions + '</datalist>' +
        '<div class="fields-grid">' +

          '<div class="field field-full"><label>Worksheet</label>' +
            '<select id="s-worksheet"><option value="">— select —</option>' + wsOptions + '</select>' +
          '</div>' +

          '<div class="field field-full"><label>Score Worksheet</label>' +
            '<select id="s-scoreWorksheet"><option value="">— none —</option>' + swsOptions + '</select>' +
          '</div>' +
          '<div class="field field-full"><label>Score field</label>' +
            '<input type="text" id="s-scoreField" value="' + escAttr(CONFIG.scoreField) + '" list="s-score-columns">' +
          '</div>' +

          '<div class="field"><label>indicator_id field</label>' +
            '<input type="text" id="s-indicatorIdField" value="' + escAttr(CONFIG.indicatorIdField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Display Name field</label>' +
            '<input type="text" id="s-nameField" value="' + escAttr(CONFIG.nameField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Source field</label>' +
            '<input type="text" id="s-sourceField" value="' + escAttr(CONFIG.sourceField) + '" list="s-columns">' +
          '</div>' +

          '<div class="field"><label>subcategory_id field</label>' +
            '<input type="text" id="s-subcategoryIdField" value="' + escAttr(CONFIG.subcategoryIdField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Brand field</label>' +
            '<input type="text" id="s-brandField" value="' + escAttr(CONFIG.brandField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Value field</label>' +
            '<input type="text" id="s-valueField" value="' + escAttr(CONFIG.valueField) + '" list="s-columns">' +
          '</div>' +

          '<div class="field"><label>Year field</label>' +
            '<input type="text" id="s-yearField" value="' + escAttr(CONFIG.yearField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Month field</label>' +
            '<input type="text" id="s-monthField" value="' + escAttr(CONFIG.monthField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Quarter field</label>' +
            '<input type="text" id="s-quarterField" value="' + escAttr(CONFIG.quarterField) + '" list="s-columns">' +
          '</div>' +
          '<div class="field"><label>Period field <span style="font-weight:400;opacity:0.55">(optional override)</span></label>' +
            '<input type="text" id="s-periodField" value="' + escAttr(CONFIG.periodField) + '" list="s-columns" placeholder="e.g. Period String">' +
          '</div>' +
          '<div class="field"><label>Category field</label>' +
            '<input type="text" id="s-categoryField" value="' + escAttr(CONFIG.categoryField) + '" list="s-columns">' +
          '</div>' +

          '<div class="field"><label>Primary color</label>' +
            '<input type="color" id="s-selectedColor" value="' + escAttr(CONFIG.selectedColor) + '">' +
          '</div>' +
          '<div class="field"><label>Neutral color</label>' +
            '<input type="color" id="s-neutralColor" value="' + escAttr(CONFIG.neutralColor) + '">' +
          '</div>' +
          '<div class="field"><label>Background</label>' +
            '<div class="inline-controls">' +
              '<input type="color" id="s-bgColor" value="' + escAttr(bgValue) + '"' + (isTransparent ? ' disabled style="opacity:0.4"' : '') + '>' +
              '<input type="checkbox" id="s-transparent"' + (isTransparent ? ' checked' : '') + '>' +
              '<span>Transparent</span>' +
            '</div>' +
          '</div>' +

          '<div class="field field-full">' +
            '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;text-transform:none;color:#999;">' +
              '<input type="checkbox" id="s-showUnits"' + (CONFIG.showUnits !== 'false' ? ' checked' : '') + '>' +
              'Show units in indicator title' +
            '</label>' +
          '</div>' +

          '<div class="field field-full">' +
            '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;text-transform:none;color:#999;">' +
              '<input type="checkbox" id="s-showCommentary"' + (CONFIG.showCommentary !== 'false' ? ' checked' : '') + '>' +
              'Show commentary' +
            '</label>' +
          '</div>' +

          '<div></div>' +
          '<button class="btn btn-secondary" id="s-cancel">Cancel</button>' +
          '<button class="btn btn-primary"   id="s-save">Save</button>' +

        '</div>' +
      '</div>';

    document.body.appendChild(overlay);

    // Reload column datalist when worksheet changes
    document.getElementById('s-worksheet').addEventListener('change', async function() {
      var cols = await loadColumnOptions(this.value);
      document.getElementById('s-columns').innerHTML =
        cols.map(function(c) { return '<option value="' + escAttr(c) + '">'; }).join('');
    });
    document.getElementById('s-scoreWorksheet').addEventListener('change', async function() {
      var cols = await loadColumnOptions(this.value);
      document.getElementById('s-score-columns').innerHTML =
        cols.map(function(c) { return '<option value="' + escAttr(c) + '">'; }).join('');
    });

    var bgInput  = document.getElementById('s-bgColor');
    var bgCheck  = document.getElementById('s-transparent');
    bgCheck.addEventListener('change', function() {
      bgInput.disabled      = bgCheck.checked;
      bgInput.style.opacity = bgCheck.checked ? '0.4' : '1';
    });

    document.getElementById('s-cancel').onclick = function() { overlay.remove(); };

    document.getElementById('s-save').onclick = async function() {
      CONFIG.worksheet          = document.getElementById('s-worksheet').value;
      CONFIG.scoreWorksheet     = document.getElementById('s-scoreWorksheet').value;
      CONFIG.scoreField         = document.getElementById('s-scoreField').value.trim();
      CONFIG.indicatorIdField   = document.getElementById('s-indicatorIdField').value.trim();
      CONFIG.nameField          = document.getElementById('s-nameField').value.trim();
      CONFIG.sourceField        = document.getElementById('s-sourceField').value.trim();
      CONFIG.subcategoryIdField = document.getElementById('s-subcategoryIdField').value.trim();
      CONFIG.brandField         = document.getElementById('s-brandField').value.trim();
      CONFIG.valueField         = document.getElementById('s-valueField').value.trim();
      CONFIG.yearField          = document.getElementById('s-yearField').value.trim();
      CONFIG.monthField         = document.getElementById('s-monthField').value.trim();
      CONFIG.quarterField       = document.getElementById('s-quarterField').value.trim();
      CONFIG.periodField        = document.getElementById('s-periodField').value.trim();
      CONFIG.categoryField      = document.getElementById('s-categoryField').value.trim();
      CONFIG.selectedColor      = document.getElementById('s-selectedColor').value;
      CONFIG.neutralColor       = document.getElementById('s-neutralColor').value;
      CONFIG.bgColor            = bgCheck.checked ? 'transparent' : bgInput.value;
      CONFIG.showUnits          = document.getElementById('s-showUnits').checked ? 'true' : 'false';
      CONFIG.showCommentary     = document.getElementById('s-showCommentary').checked ? 'true' : 'false';

      if (_dashboard) {
        try {
          var settings = tableau.extensions.settings;
          Object.keys(DEFAULTS).forEach(function(k) { settings.set(k, String(CONFIG[k])); });
          settings.set('chartOverrides', JSON.stringify(_chartOverrides));
          await settings.saveAsync();
        } catch(e) { console.warn('Settings save failed:', e); }
      }

      applyBackground();
      overlay.remove();

      if (CONFIG.worksheet && _dashboard) {
        await fetchAndCacheData();
      } else {
        switchToTable();
      }
    };
  }

  // ─── EVENT WIRING ─────────────────────────────────────────────────────────
  document.getElementById('back-btn').onclick      = function() { switchToTable(); };
  document.getElementById('btn-qtr').onclick       = function() { setViewMode('quarterly'); };
  document.getElementById('btn-mo').onclick        = function() { setViewMode('monthly');   };
  document.getElementById('configure-btn').onclick = function() { showSettings(); };

  // ─── RESIZE OBSERVER ─────────────────────────────────────────────────────
  var _resizeTimer;
  var resizeObserver = new ResizeObserver(function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function() {
      if (_view === 'chart' && _lastData) renderChart(_lastData, _lastSelected, _dashboard);
    }, 150);
  });
  resizeObserver.observe(document.getElementById('chart'));

  // ─── TABLEAU INIT ─────────────────────────────────────────────────────────
  applyBackground();

  if (typeof tableau === 'undefined') {
    // Preview mode: sample indicators, no Tableau
    switchToTable();
    showSettings();
  } else {
    tableau.extensions.initializeAsync({
      configure: function() { showSettings(); },
    }).then(async function() {
      _dashboard = tableau.extensions.dashboardContent.dashboard;

      // Load persisted settings
      var settings = tableau.extensions.settings;
      Object.keys(DEFAULTS).forEach(function(k) {
        var val = settings.get(k);
        if (val) CONFIG[k] = val;
      });
      var storedOverrides = settings.get('chartOverrides');
      if (storedOverrides) {
        try { _chartOverrides = JSON.parse(storedOverrides); } catch(e) {}
      }

      applyBackground();

      if (!CONFIG.worksheet) {
        switchToTable();
        showSettings();
        return;
      }
      await fetchAndCacheData();

      // Read client brand from the Tableau parameter; re-render on change.
      // getParametersAsync is on Sheet (Dashboard extends Sheet), not on workbook.
      // Parameter values are in Brand Name Upper form — the same form as chart data —
      // so CONFIG.clientBrand is used raw on both sides of every brand match.
      try {
        if (_dashboard) {
          var params = await _dashboard.getParametersAsync();

          // Set initial client brand from the parameter (overrides the DEFAULTS fallback)
          var brandFromParam = false;
          params.forEach(function(p) {
            if (p.name === CONFIG.parameter && p.currentValue && p.currentValue.value) {
              CONFIG.clientBrand = p.currentValue.value;
              brandFromParam = true;
            }
          });
          // If the parameter resolved a different brand than the default, rebuild and re-render
          if (brandFromParam && _rawScoreNormalized.length) {
            _scoreModel = buildScoreModel(_rawScoreNormalized, CONFIG.clientBrand, _subgroup);
          }
          if (brandFromParam) switchToTable();

          // Listen to all parameters; on change, refresh client brand and re-render
          params.forEach(function(p) {
            p.addEventListener(tableau.TableauEventType.ParameterChanged, async function() {
              try {
                var fresh = await _dashboard.getParametersAsync();
                fresh.forEach(function(fp) {
                  if (fp.name === CONFIG.parameter && fp.currentValue && fp.currentValue.value) {
                    CONFIG.clientBrand = fp.currentValue.value;
                  }
                });
                if (_rawScoreNormalized.length) {
                  _scoreModel = buildScoreModel(_rawScoreNormalized, CONFIG.clientBrand, _subgroup);
                }
              } catch(e) { console.warn('[param refresh]', e); }
              if (_view === 'table') switchToTable();
              else applyPeriodAndRender();
            });
          });
        }
      } catch(e) { console.warn('[param listener]', e); }
    }).catch(function(err) {
      console.error('initializeAsync failed:', err);
      switchToTable();
      showSettings();
    });
  }
  </script>
