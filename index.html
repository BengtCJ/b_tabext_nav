  <script>
// ─── charts.js (inlined) ──────────────────────────────────────────────────
// charts.js — copied verbatim from b_tableau_extensions_2/index.html
// Source: https://raw.githubusercontent.com/BengtCJ/b_tableau_extensions_2/main/index.html

  // ─── METRIC → CHART MAPPING ───────────────────────────────────────────────
  // First entry = default. All entries = structurally compatible.
  // Snapshot charts: data reduced to latest period before rendering.
  // Trend charts: all periods passed through (monthly or quarterly per _viewMode).
  const METRIC_CHARTS = {
    // Headline class — three switchable directions; radial only where bands exist
    tam:   ['ban_editorial', 'ban_ledger'],
    cagr:  ['ban_editorial', 'ban_radial', 'ban_ledger'],
    mcon:  ['ban_editorial', 'ban_ledger'],

    // Ratio 0–1, per-brand per-month — supports snapshot + trend
    // Grouped (non-stacked) vbar is default: independent per-brand fractions that do not sum to 100%
    eqr:   ['vbar', 'hbar', 'progress-ring', 'line-straight', 'line-smooth', 'small-multiples'],
    ebl:   ['vbar', 'hbar', 'progress-ring', 'line-straight', 'line-smooth', 'small-multiples'],
    sstsr: ['vbar', 'hbar', 'progress-ring', 'line-straight', 'line-smooth', 'small-multiples'],

    // Compositional share (brands sum ~100%), per-brand per-month
    sov:   ['treemap', 'inset-bubble', 'bubbles', 'area-100', 'treemap-bar', 'stream'],
    bss:   ['treemap', 'inset-bubble', 'bubbles', 'area-100', 'treemap-bar', 'stream'],

    // Signed float — trend charts only; line-straight default to avoid fabricated zero-crossings
    vom:   ['line-straight', 'line-smooth', 'small-multiples'],
    svt:   ['line-straight', 'line-smooth', 'small-multiples'],

    // Likert 1–5 snapshot — no waffle/arc/progress-ring (not true ratios)
    bt:    ['scale-figma', 'hbar', 'vbar', 'bans', 'ban'],
    nps:   ['scale-figma', 'hbar', 'vbar', 'bans', 'ban'],
    sop:   ['scale-figma', 'hbar', 'vbar', 'bans', 'ban'],
    dvtr:  ['scale-figma', 'hbar', 'vbar', 'bans', 'ban'],

    // Unbounded positive snapshot
    cra:   ['hbar', 'scale-figma', 'bans', 'bubbles', 'treemap', 'treemap-bar',
            'donut', 'inset-bubble', 'ban'],

    // Brand attributes — multiscale blocked until multi-attribute data confirmed
    ba:    ['hbar', 'scale-figma', 'bans', 'ban'],
  };

  // ─── AGGREGATION RULES ────────────────────────────────────────────────────
  // Applied when collapsing monthly rows to quarterly view.
  const INDICATOR_AGGREGATION = {
    sov:   'sum',
    bss:   'sum',
    sstsr: 'sum',
    cra:   'sum',
    vom:   'sum',
    eqr:   'avg',
    ebl:   'avg',
    svt:   'avg',
    bt:    'avg',
    nps:   'avg',
    sop:   'avg',
    dvtr:  'avg',
    tam:   'none',
    cagr:  'none',
    mcon:  'none',
    ba:    'none',
  };

  // ─── DESIGN SYSTEM ────────────────────────────────────────────────────────
  function buildDesign() {
    const sel = CONFIG.selectedColor;
    return {
      donut: {
        banValue:      { font: FONT_TITLE, style: 'italic', color: sel },
        banLabel:      { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        legendLabel:   { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        legendValue:   { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        legendSelected:{ font: FONT_LIGHT, style: 'normal', color: sel },
      },
      bar: {
        valueLabel:    { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        valueLabelSel: { font: FONT_BODY,  style: 'normal', color: sel },
        axisLabel:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        axisLabelSel:  { font: FONT_LIGHT, style: 'normal', color: sel },
      },
      line: {
        axisX:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        axisY:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        gridColor: COL_GRID,
      },
      ban: {
        value: { font: FONT_TITLE, style: 'italic', color: sel },
        label: { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
      },
      bans: {
        primaryValue: { font: FONT_TITLE, size: 56, color: sel },
        compValue:    { font: FONT_TITLE, size: 32, color: '#808080' },
      },
      slope:         { lineP: { color: sel, width: 2.5 }, lineC: { color: '#808080', width: 1 } },
      area100:       { primary: sel, comp: '#808080' },
      stream:        { primary: sel, comp: '#808080' },
      treemap:       { primary: sel, comp: '#808080' },
      treemapBar:    { primary: sel, comp: '#808080' },
      bubbles:       { primary: sel, comp: '#808080' },
      insetBubble:   { primary: sel, comp: '#808080' },
      progressRing:  { primary: sel, comp: '#808080' },
      waffle:        { filled: sel, comp: '#808080', empty: '#4D4D4D', neg: '#D73F58' },
      hbar:          { primary: sel, comp: '#808080' },
      vbar:          { primary: sel, comp: '#808080' },
      vbarStacked:   { primaryActive: sel, primaryPassive: '#E0697D', compActive: '#808080', compPassive: '#4D4D4D' },
      scaleFigma:    { primary: sel, comp: '#808080' },
      multiscale:    { primary: sel, comp: '#808080' },
      dotMatrix:     { filled: sel, comp: '#808080', passive: '#4D4D4D', neg: '#D73F58' },
      smallMultiples:{ primary: sel, comp: '#808080' },
      arc:           { fill: sel },
    };
  }

  // ─── VALUE-LABEL HELPERS ─────────────────────────────────────────────────
  // Single source for value-label precision, size, fill, and font.
  // All chart renderers route their numeric value-label text nodes through these.
  var VL_SIZE = '13px'; // Label role per STYLE_SPEC
  function vlText(value) {
    var dec = INDICATOR_DECIMALS[CONFIG.metricId];
    return value.toFixed(dec !== undefined ? dec : 2);
  }
  function vlFill(name, primary) {
    if (name !== primary) return COL_LIGHT_GREY;
    return primary === CONFIG.clientBrand ? CONFIG.selectedColor : '#ededed';
  }
  function vlFont(name, primary) {
    return name === primary ? FONT_BODY : FONT_LIGHT;
  }

  // ─── VALUE-NUMERAL HELPER ─────────────────────────────────────────────────
  // Value-numeral role per STYLE_SPEC: Baskerville italic 24px.
  // Client brand fill = selectedColor (#e994a2); all others = #ededed.
  // Decimals from INDICATOR_DECIMALS. Excludes BAN family.
  var SERIF_VALUE_SIZE = '24px';
  function serifValue(sel, value, metricId, isClient) {
    var dec = (INDICATOR_DECIMALS[metricId] !== undefined) ? INDICATOR_DECIMALS[metricId] : 2;
    return sel
      .attr('data-value-numeral', '1')
      .style('font-family', FONT_TITLE)
      .style('font-style', 'italic')
      .style('font-size', SERIF_VALUE_SIZE)
      .style('fill', isClient ? CONFIG.selectedColor : '#ededed')
      .text(value.toFixed(dec));
  }

  // ─── STATE ────────────────────────────────────────────────────────────────
  let _selectedBrand  = null;  // clicked brand — opacity highlight only
  let _chartOverrides = {};    // { metricId: chartType, ... } — persisted to settings
  let _viewMode       = 'monthly'; // 'quarterly' | 'monthly'
  var _banDirections  = {};         // { metricId: 'ban_editorial'|'ban_radial'|'ban_ledger' }

  // ─── CHART RENDERERS ──────────────────────────────────────────────────────
  function renderDonut(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || window.innerWidth  || 480;
    var H = rect.height || window.innerHeight || 300;
    var legendW = Math.min(Math.floor(W * 0.38), 220);
    var available = W - legendW;
    var R = Math.min(H * 0.44, available * 0.5, H < 200 ? 60 : 150);
    var inner = R * 0.46;

    el.style.display        = 'flex';
    el.style.alignItems     = 'center';
    el.style.justifyContent = 'center';
    el.style.gap            = '20px';
    el.style.padding        = '12px';

    var ban = document.createElement('div');
    ban.style.cssText = 'display:flex;flex-direction:column;gap:6px;min-width:110px;';
    var sel = data.find(function(d) { return d.name === selectedBrand; }) || data[0];
    ban.innerHTML =
      '<div style="font-size:' + Math.max(36, R*0.5) + 'px;line-height:1;' +
      'color:' + D.banValue.color + ';font-family:' + D.banValue.font + ';' +
      'font-style:' + D.banValue.style + ';font-weight:400;">' +
      (sel ? sel.value.toFixed(1) : '--') + '</div>' +
      '<div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;' +
      'color:' + D.banLabel.color + ';font-family:' + D.banLabel.font + ';">' +
      (sel ? sel.name : '') + '</div>';
    el.appendChild(ban);

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.setAttribute('width',  R * 2 + 24);
    svgEl.setAttribute('height', R * 2 + 24);
    svgEl.style.flexShrink = '0';
    el.appendChild(svgEl);

    var svg = d3.select(svgEl);
    var g   = svg.append('g').attr('transform', 'translate(' + (R+12) + ',' + (R+12) + ')');

    var arc      = d3.arc().innerRadius(inner).outerRadius(R).padAngle(0.028).cornerRadius(2);
    var arcHover = d3.arc().innerRadius(inner).outerRadius(R+7).padAngle(0.028).cornerRadius(2);
    var pie      = d3.pie().value(function(d) { return d.value; }).sort(null);

    var isTransparent = CONFIG.bgColor === 'transparent';
    var holeColor     = isTransparent ? 'transparent' : CONFIG.bgColor;

    g.selectAll('path').data(pie(data)).join('path')
      .attr('d', arc)
      .attr('fill', function(d) { return d.data.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
      .attr('stroke', holeColor)
      .attr('stroke-width', isTransparent ? 0 : 2)
      .attr('data-brand', function(d) { return d.data.name; })
      .style('cursor', 'pointer')
      .on('mouseover', function() { d3.select(this).attr('d', arcHover); })
      .on('mouseout',  function() { d3.select(this).attr('d', arc); })
      .on('click', async function(e, d) { await selectBrand(d.data.name, dashboard); });

    g.append('circle')
      .attr('r', inner - 2)
      .attr('fill', holeColor)
      .attr('fill-opacity', isTransparent ? 0 : 1);

    var legend = document.createElement('div');
    legend.style.cssText = 'display:flex;flex-direction:column;gap:7px;';
    data.forEach(function(d) {
      var isSelected  = d.name === selectedBrand;
      var labelStyle  = isSelected ? D.legendSelected : D.legendLabel;
      var item = document.createElement('div');
      item.setAttribute('data-brand', d.name);
      item.style.cssText =
        'display:flex;align-items:center;gap:7px;cursor:pointer;' +
        'font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'color:' + labelStyle.color + ';font-family:' + labelStyle.font + ';';
      item.innerHTML =
        '<span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;' +
        'background:' + (isSelected ? CONFIG.selectedColor : CONFIG.neutralColor) + ';"></span>' +
        '<span style="flex:1;">' + d.name + '</span>' +
        '<span style="color:' + D.legendValue.color + ';font-family:' + D.legendValue.font + ';">' +
        d.value.toFixed(1) + '</span>';
      item.onclick = (function(name) {
        return async function() { await selectBrand(name, dashboard); };
      })(d.name);
      legend.appendChild(item);
    });
    el.appendChild(legend);
  }

  // ─── CHART: BAR ───────────────────────────────────────────────────────────
  function renderBar(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || 500;
    var H = rect.height || 300;

    var sorted = data.slice().sort(function(a, b) { return b.value - a.value; });
    var svg = d3.select(el).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .style('width', '100%').style('height', '100%').style('display', 'block');

    var isHorizontal = H < 220 || H < W * 0.35;

    if (isHorizontal) {
      var m = { top:8, right:48, bottom:8, left:88 };
      var w = W - m.left - m.right;
      var h = H - m.top  - m.bottom;
      var g = svg.append('g').attr('transform', 'translate(' + m.left + ',' + m.top + ')');

      var y = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, h]).padding(0.22);
      var x = d3.scaleLinear().domain([0, d3.max(data, function(d) { return d.value; }) * 1.15]).range([0, w]);

      g.selectAll('rect').data(sorted).join('rect')
        .attr('x', 0).attr('y', function(d) { return y(d.name); })
        .attr('width', function(d) { return x(d.value); })
        .attr('height', y.bandwidth())
        .attr('fill', function(d) { return d.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
        .attr('rx', 2).style('cursor', 'pointer')
        .on('click', async function(e, d) { await selectBrand(d.name, dashboard); });

      g.selectAll('.vl').data(sorted).join('text').attr('class', 'vl')
        .attr('x', function(d) { return x(d.value) + 4; })
        .attr('y', function(d) { return y(d.name) + y.bandwidth() / 2; })
        .attr('dominant-baseline', 'middle')
        .attr('data-value-numeral', '1')
        .style('font-family', FONT_TITLE)
        .style('font-style', 'italic')
        .style('font-size', SERIF_VALUE_SIZE)
        .style('fill', function(d) { return d.name === CONFIG.clientBrand ? CONFIG.selectedColor : '#ededed'; })
        .text(function(d) { return vlText(d.value); });

      g.selectAll('.lbl').data(sorted).join('text').attr('class', 'lbl')
        .attr('x', -6).attr('y', function(d) { return y(d.name) + y.bandwidth() / 2; })
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
        .style('fill',           function(d) { return d.name === selectedBrand ? D.axisLabelSel.color : D.axisLabel.color; })
        .style('font-size',      '10px')
        .style('font-family',    function(d) { return d.name === selectedBrand ? D.axisLabelSel.font : D.axisLabel.font; })
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .text(function(d) { return truncLabel(d.name, W); });
    } else {
      var m2 = { top:24, right:16, bottom:48, left:44 };
      var w2 = W - m2.left - m2.right;
      var h2 = H - m2.top  - m2.bottom;
      var g2 = svg.append('g').attr('transform', 'translate(' + m2.left + ',' + m2.top + ')');

      var x2 = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, w2]).padding(0.28);
      var y2 = d3.scaleLinear().domain([0, d3.max(data, function(d) { return d.value; }) * 1.15]).range([h2, 0]);

      g2.selectAll('rect').data(sorted).join('rect')
        .attr('x', function(d) { return x2(d.name); })
        .attr('y', function(d) { return y2(d.value); })
        .attr('width', x2.bandwidth())
        .attr('height', function(d) { return h2 - y2(d.value); })
        .attr('fill', function(d) { return d.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
        .attr('rx', 2).style('cursor', 'pointer')
        .on('click', async function(e, d) { await selectBrand(d.name, dashboard); });

      g2.selectAll('.vl').data(sorted).join('text').attr('class', 'vl')
        .attr('x', function(d) { return x2(d.name) + x2.bandwidth() / 2; })
        .attr('y', function(d) { return y2(d.value) - 5; })
        .attr('text-anchor', 'middle')
        .attr('data-value-numeral', '1')
        .style('font-family', FONT_TITLE)
        .style('font-style', 'italic')
        .style('font-size', SERIF_VALUE_SIZE)
        .style('fill', function(d) { return d.name === CONFIG.clientBrand ? CONFIG.selectedColor : '#ededed'; })
        .text(function(d) { return vlText(d.value); });

      g2.append('g').attr('transform', 'translate(0,' + h2 + ')')
        .call(d3.axisBottom(x2).tickSize(0))
        .call(function(ax) { ax.select('.domain').remove(); })
        .selectAll('text')
        .style('fill',           function(d) { return d === selectedBrand ? D.axisLabelSel.color : D.axisLabel.color; })
        .style('font-size',      '10px')
        .style('font-family',    function(d) { return d === selectedBrand ? D.axisLabelSel.font : D.axisLabel.font; })
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .attr('dy', '1.4em')
        .text(function(d) { return truncLabel(d, W); });
    }
  }

  // ─── CHART: LINE ──────────────────────────────────────────────────────────
  function renderLine(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || 500;
    var H = rect.height || 300;
    var m = { top:20, right:88, bottom:40, left:40 };
    var w = W - m.left - m.right;
    var h = H - m.top  - m.bottom;

    if (!data[0] || !data[0].period) { renderBar(el, data, selectedBrand, dashboard, buildDesign().bar); return; }

    var brands  = [];
    var periods = [];
    data.forEach(function(d) {
      if (brands.indexOf(d.name)   === -1) brands.push(d.name);
      if (periods.indexOf(d.period)=== -1) periods.push(d.period);
    });
    periods.sort();

    var grouped = brands.map(function(brand) {
      return {
        name: brand,
        values: periods.map(function(period) {
          var match = data.find(function(d) { return d.name === brand && d.period === period; });
          return { period: period, value: match ? match.value : null };
        }).filter(function(d) { return d.value !== null; }),
      };
    });

    var svg = d3.select(el).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .style('width', '100%').style('height', '100%').style('display', 'block');
    var g = svg.append('g').attr('transform', 'translate(' + m.left + ',' + m.top + ')');

    var x = d3.scalePoint().domain(periods).range([0, w]).padding(0.1);
    var y = d3.scaleLinear().domain([
      d3.min(data, function(d) { return d.value; }) * 0.95,
      d3.max(data, function(d) { return d.value; }) * 1.1,
    ]).range([h, 0]);

    var line = d3.line().defined(function(d) { return d.value !== null; })
      .x(function(d) { return x(d.period); })
      .y(function(d) { return y(d.value); })
      .curve(d3.curveMonotoneX);

    grouped.filter(function(b) { return b.name !== selectedBrand; }).forEach(function(brand) {
      g.append('path').datum(brand.values)
        .attr('fill', 'none').attr('stroke', CONFIG.neutralColor)
        .attr('stroke-width', 1).attr('opacity', 0.5).attr('d', line)
        .style('pointer-events', 'none');
      g.append('path').datum(brand.values)
        .attr('fill', 'none').attr('stroke', 'transparent')
        .attr('stroke-width', 18).attr('d', line)
        .style('cursor', 'pointer')
        .on('click', (function(b) { return async function() { await selectBrand(b.name, dashboard); }; })(brand));
    });

    var selBrand = grouped.find(function(b) { return b.name === selectedBrand; });
    if (selBrand) {
      g.append('path').datum(selBrand.values)
        .attr('fill', 'none').attr('stroke', CONFIG.selectedColor)
        .attr('stroke-width', 2.5).attr('d', line).style('pointer-events', 'none');
      g.append('path').datum(selBrand.values)
        .attr('fill', 'none').attr('stroke', 'transparent')
        .attr('stroke-width', 18).attr('d', line).style('cursor', 'pointer')
        .on('click', async function() { await selectBrand(selBrand.name, dashboard); });
      g.selectAll('.dot').data(selBrand.values).join('circle').attr('class', 'dot')
        .attr('cx', function(d) { return x(d.period); })
        .attr('cy', function(d) { return y(d.value); })
        .attr('r', 3.5).attr('fill', CONFIG.selectedColor).style('cursor', 'pointer')
        .on('click', async function() { await selectBrand(selBrand.name, dashboard); });
    }

    var placedY = [];
    grouped.forEach(function(brand) {
      var last = brand.values[brand.values.length - 1];
      if (!last) return;
      var ly = y(last.value);
      placedY.forEach(function(py) { if (Math.abs(py - ly) < 12) ly = py + 12; });
      placedY.push(ly);
      g.append('text')
        .attr('x', x(last.period) + 6).attr('y', ly)
        .attr('dominant-baseline', 'middle')
        .style('fill',           brand.name === selectedBrand ? (selectedBrand === CONFIG.clientBrand ? CONFIG.selectedColor : '#ededed') : CONFIG.neutralColor)
        .style('font-size',      '10px').style('font-family', FONT_LIGHT)
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .style('cursor', 'pointer')
        .text(truncLabel(brand.name, W))
        .on('click', (function(b) { return async function() { await selectBrand(b.name, dashboard); }; })(brand));
    });

    g.append('g').attr('transform', 'translate(0,' + h + ')')
      .call(d3.axisBottom(x).tickSize(3))
      .call(function(ax) { ax.select('.domain').attr('stroke', D.gridColor); })
      .selectAll('text')
      .style('fill', D.axisX.color).style('font-size', '11px')
      .style('font-family', D.axisX.font)
      .style('text-transform', 'uppercase').style('letter-spacing', '0.06em');

    g.append('g')
      .call(d3.axisLeft(y).ticks(4).tickSize(-w))
      .call(function(ax) {
        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', D.gridColor).attr('stroke-dasharray', '3,3');
      })
      .selectAll('text').style('fill', D.axisY.color).style('font-size', '11px')
      .style('font-family', D.axisY.font);
  }

  // ─── CHART: BAN ───────────────────────────────────────────────────────────
  function renderBAN(el, data, selectedBrand, D, metricId) {
    var mId    = metricId || '';
    var HEADLINE_IDS = ['tam', 'cagr', 'mcon'];

    // Headline class → dedicated ban-shell renderer
    if (HEADLINE_IDS.indexOf(mId) !== -1) {
      var hit0   = Array.isArray(data) ? (data.find(function(d) { return d.name === selectedBrand; }) || data[0]) : null;
      var val0   = hit0 ? hit0.value : (data && !Array.isArray(data) ? data : null);
      var numVal0 = (val0 !== null && val0 !== undefined) ? parseFloat(val0) : null;
      var brand0 = selectedBrand || CONFIG.clientBrand;
      renderBanShell(el, getBanShellContent(mId, numVal0, brand0));
      return;
    }

    var ctx    = INDICATOR_BAN_CONTEXT[mId] || { type: 'none', prefix: '', suffix: '' };
    var decs   = (INDICATOR_DECIMALS[mId] !== undefined) ? INDICATOR_DECIMALS[mId] : 2;
    var defn   = INDICATOR_DEFINITION[mId] || '';
    var caveat = ctx.caveat || '';

    var hit    = Array.isArray(data) ? (data.find(function(d) { return d.name === selectedBrand; }) || data[0]) : null;
    var value  = hit ? hit.value : (data && !Array.isArray(data) ? data : null);
    var numVal = (value !== null && value !== undefined) ? parseFloat(value) : null;

    var W = el.offsetWidth  || 400;
    var H = el.offsetHeight || 200;
    if (H < 80) { showTooSmall(el); return; }

    var heroSize = 112;

    // Active cell: which of the 3 context cells does the value land in?
    var activeIdx = -1;
    if (numVal !== null && ctx.thresholds && ctx.thresholds.length === 2) {
      activeIdx = numVal < ctx.thresholds[0] ? 0 : (numVal <= ctx.thresholds[1] ? 1 : 2);
    }

    var hasCells = !!(ctx.cells && ctx.cells.length === 3);

    el.style.display       = 'flex';
    el.style.flexDirection = 'row';
    el.style.alignItems    = 'stretch';
    el.style.height        = '100%';
    el.style.boxSizing     = 'border-box';
    el.style.padding       = '24px';
    el.style.gap           = '16px';

    // Left: hero number + definition + optional caveat
    var left = document.createElement('div');
    left.style.cssText = 'flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;min-width:0;';

    var HEADLINE_IDS = ['tam', 'cagr', 'mcon'];
    var heroColor = (HEADLINE_IDS.indexOf(mId) !== -1) ? '#ededed' : CONFIG.selectedColor;
    var heroEl = document.createElement('div');
    heroEl.style.cssText = 'font-family:' + FONT_TITLE + ';font-style:italic;font-weight:400;' +
      'font-size:' + heroSize + 'px;line-height:1;color:' + heroColor + ';text-align:center;';
    if (numVal !== null) {
      heroEl.innerHTML = ctx.prefix + numVal.toFixed(decs) +
        (ctx.suffix ? '<span style="color:#6f6f6f;font-size:0.3em;margin-left:0.08em;vertical-align:baseline;">' + ctx.suffix + '</span>' : '');
    } else {
      heroEl.textContent = '--';
    }
    left.appendChild(heroEl);

    if (defn) {
      var defnEl = document.createElement('div');
      defnEl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-size:13px;color:#a4a4a4;line-height:1.4;';
      defnEl.textContent = defn;
      left.appendChild(defnEl);
    }

    if (caveat) {
      var cavEl = document.createElement('div');
      cavEl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-style:italic;font-size:11px;color:#a4a4a4;line-height:1.3;margin-top:4px;';
      cavEl.textContent = caveat;
      left.appendChild(cavEl);
    }

    el.appendChild(left);

    // Right rail: three greyscale context cells (greyscale only — no RAG on this surface)
    if (hasCells) {
      var GUTTER = 2;
      var CELL_R = 8;
      var FRAME_R = CELL_R + GUTTER; // 10 = 8 + 2

      var rail = document.createElement('div');
      rail.setAttribute('data-grouped-cell-frame', 'ban-context');
      rail.style.cssText = 'background:#0d0d0d;border:1px solid #262626;border-radius:' + FRAME_R + 'px;' +
        'padding:' + GUTTER + 'px;display:flex;flex-direction:column;gap:' + GUTTER + 'px;' +
        'width:164px;flex-shrink:0;';

      ctx.cells.forEach(function(cell, i) {
        var isActive = (i === activeIdx);
        var cellEl = document.createElement('div');
        cellEl.setAttribute('data-grouped-cell', '1');
        cellEl.style.cssText = 'background:' + (isActive ? '#363636' : '#222222') + ';' +
          'border-radius:' + CELL_R + 'px;padding:8px 12px;display:flex;flex-direction:column;gap:4px;flex:1;';

        var lbl = document.createElement('div');
        lbl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-size:11px;color:#cfcfcf;' +
          'text-transform:uppercase;letter-spacing:0.06em;';
        lbl.textContent = cell.label;

        var rng = document.createElement('div');
        rng.style.cssText = 'font-family:' + FONT_BODY + ';font-size:13px;color:#cfcfcf;';
        rng.textContent = cell.range;

        cellEl.appendChild(lbl);
        cellEl.appendChild(rng);

        if (cell.note) {
          var noteEl = document.createElement('div');
          noteEl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-style:italic;font-size:11px;color:#a4a4a4;';
          noteEl.textContent = cell.note;
          cellEl.appendChild(noteEl);
        }

        rail.appendChild(cellEl);
      });

      el.appendChild(rail);
    }
  }

  // ─── BAN SHELL (Headline class: tam / cagr / mcon) ────────────────────────
  // Returns a content object for renderBanShell from static config + runtime value.
  function getBanShellContent(metricId, numVal, brand) {
    var decs = (INDICATOR_DECIMALS[metricId] !== undefined) ? INDICATOR_DECIMALS[metricId] : 2;
    var ctx  = INDICATOR_BAN_CONTEXT[metricId] || {};
    var brandName = BRAND_DISPLAY_MAP[brand] || brand || 'the market leader';

    // Unit for caption subline — read from METRIC_UNITS (single source, same as card header).
    // tam and cagr override to display-friendly labels; mcon uses the canonical 'index' from METRIC_UNITS.
    var UNITS = {
      cagr: '%',
      tam:  '$B',
      mcon: METRIC_UNITS['mcon'] || 'index',
    };

    // Pill-friendly label: first segment before " /" or full label if no slash
    function pillLabel(label) {
      var idx = label.indexOf(' /');
      return idx !== -1 ? label.slice(0, idx) : label;
    }

    // cagr is the only Headline metric with illustrative bands in the shell
    var isBandMetric = (metricId === 'cagr');
    var activeIdx = -1;
    var bands = [];
    if (isBandMetric && ctx.cells && ctx.thresholds && ctx.thresholds.length === 2) {
      activeIdx = (numVal !== null && numVal !== undefined)
        ? (numVal < ctx.thresholds[0] ? 0 : (numVal <= ctx.thresholds[1] ? 1 : 2))
        : -1;
      bands = ctx.cells.map(function(cell, i) {
        return { label: cell.label, pillLabel: pillLabel(cell.label), range: cell.range, example: cell.note, active: (i === activeIdx) };
      });
    }

    // Interim verdict + reading, brand-interpolated; re-resolved every render so ParameterChanged picks up new brand
    var verdictMap = {
      cagr: 'Growth is within the historical range — the kind of pace ' + brandName + ' has learned to navigate.',
      tam:  'The market size sets the ceiling ' + brandName + ' is operating within.',
      mcon: 'Concentration at this level shapes how ' + brandName + ' competes for attention and shelf.',
    };
    var readingMap = {
      cagr: 'At this rate the market is expanding without the disruption of a high-growth surge, which means ' + brandName + "'s positioning remains relevant — but the window to move is not unlimited. Final reading will be generated per subcategory.",
      tam:  'At scale the addressable opportunity is large enough that even a small share shift translates to meaningful volume for ' + brandName + '. Final reading will be generated per subcategory.',
      mcon: 'A market at this concentration level is competitive but not locked — ' + brandName + ' has room to manoeuvre without triggering a structural response. Final reading will be generated per subcategory.',
    };

    var dispVal = (numVal !== null && numVal !== undefined) ? numVal.toFixed(decs) : '--';

    return {
      title:       METRIC_LABELS[metricId] || metricId.toUpperCase(),
      code:        metricId.toUpperCase(),
      unit:        UNITS[metricId] || '',
      scope:       'Global coffee market',
      dispVal:     dispVal,
      prefix:      ctx.prefix || '',
      unitSuffix:  ctx.suffix || '',
      def:         INDICATOR_DEFINITION[metricId] || '',
      disclaimer:  isBandMetric ? (ctx.caveat || '') : '',
      bands:       bands,
      isBandMetric: isBandMetric,
      verdict:     verdictMap[metricId] || 'This indicator informs the strategic picture for ' + brandName + '.',
      reading:     readingMap[metricId] || 'Final reading will be generated per subcategory and brand.',
    };
  }

  // ─── BAN EDITORIAL (Direction 1 — 3-col grid, hero 2×2 block) ───────────────
  function renderBanShell(el, content) {
    var H = el.offsetHeight || 300;
    if (H < 80) { showTooSmall(el); return; }
    var GUTTER = 2;
    var CELL_R = 8;
    var isBand = content.isBandMetric && content.bands.length > 0;

    el.innerHTML = '';
    el.setAttribute('data-ban-lockup', '1');
    el.style.cssText = 'display:grid;' +
      (isBand ? 'grid-template-columns:repeat(3,1fr);' : 'grid-template-columns:minmax(0,5fr) minmax(0,7fr);') +
      'grid-template-rows:auto' + (isBand ? ' 1fr 1fr 1fr' : ' 1fr') + ';' +
      'gap:' + GUTTER + 'px;' +
      'background:transparent;width:100%;height:100%;box-sizing:border-box;overflow:hidden;';

    // ── TITLE STRIP (row 1, all cols, transparent) ─────────────────────────
    var titleCell = document.createElement('div');
    titleCell.style.cssText = 'grid-column:1/-1;padding:12px 16px 8px;' +
      'display:flex;flex-direction:column;gap:4px;';

    var captionEl = document.createElement('div');
    captionEl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-size:11px;color:#777;';
    captionEl.textContent = content.code + ' \xb7 ' + content.unit + ' \xb7 ' + content.scope;

    titleCell.appendChild(captionEl);
    el.appendChild(titleCell);

    // ── HERO ZONE (transparent, fixed-size div) ────────────────────────────
    // Band: 2×2 block cols 1-2 rows 2-3; band-less: col 1 row 2
    var heroZone = document.createElement('div');
    heroZone.style.cssText = (isBand ? 'grid-column:1/3;grid-row:2/4;' : 'grid-column:1;grid-row:2;') +
      'padding:8px 16px 16px;display:flex;flex-direction:column;justify-content:center;' +
      'gap:8px;overflow:hidden;min-width:0;';

    // Fixed hero size from type scale; char-count clamp so long values flex within the band
    var heroStr = (content.prefix || '') + content.dispVal;
    var HERO_BASE_PX = 160, HERO_MIN_PX = 100;
    var heroPx = Math.max(HERO_MIN_PX, HERO_BASE_PX - Math.max(0, heroStr.length - 4) * 12);
    var heroSufPx = Math.round(heroPx * 0.43);

    var heroEl = document.createElement('div');
    heroEl.setAttribute('data-ban-hero', '1');
    heroEl.style.cssText = 'font-family:' + FONT_TITLE + ';font-style:italic;font-weight:400;' +
      'font-size:' + heroPx + 'px;line-height:1;color:#ededed;white-space:nowrap;';
    if (content.unitSuffix) {
      heroEl.appendChild(document.createTextNode(heroStr));
      var sufSpan = document.createElement('span');
      sufSpan.style.cssText = 'font-size:' + heroSufPx + 'px;color:#6f6f6f;';
      sufSpan.textContent = content.unitSuffix;
      heroEl.appendChild(sufSpan);
    } else {
      heroEl.textContent = heroStr;
    }
    heroZone.appendChild(heroEl);

    // Guaranteed pink rule beneath hero (~120px, 1px, selectedColor)
    var ruleEl = document.createElement('div');
    ruleEl.setAttribute('data-ban-pink-rule', '1');
    ruleEl.style.cssText = 'background:' + CONFIG.selectedColor + ';width:120px;height:1px;flex-shrink:0;';
    heroZone.appendChild(ruleEl);
    el.appendChild(heroZone);

    if (isBand) {
      // ── VERDICT ZONE (col 1, row 4, transparent, top-aligned) ──────────
      var verdictZone = document.createElement('div');
      verdictZone.style.cssText = 'grid-column:1;grid-row:4;' +
        'padding:8px 16px 8px;display:flex;flex-direction:column;justify-content:center;gap:4px;overflow:hidden;min-width:0;';

      var verdictEl = document.createElement('div');
      verdictEl.setAttribute('data-ban-verdict', '1');
      verdictEl.style.cssText = 'font-family:' + FONT_TITLE + ';font-style:italic;font-weight:400;' +
        'font-size:24px;color:#b0b0b0;line-height:1.3;';
      verdictEl.textContent = content.verdict;
      verdictZone.appendChild(verdictEl);
      el.appendChild(verdictZone);

      // ── READING ZONE (col 2, row 4, transparent, top-aligned) ──────────
      var readingZone = document.createElement('div');
      readingZone.setAttribute('data-ban-textcol', '1');
      readingZone.style.cssText = 'grid-column:2;grid-row:4;' +
        'padding:8px 16px 8px;display:flex;flex-direction:column;justify-content:center;gap:4px;overflow:hidden;min-width:0;';

      var readingEl = document.createElement('div');
      readingEl.setAttribute('data-ban-reading', '1');
      readingEl.style.cssText = 'font-family:' + FONT_BODY + ';font-size:13px;color:#9a9a9a;line-height:1.5;';
      readingEl.textContent = content.reading;
      readingZone.appendChild(readingEl);

      if (content.disclaimer) {
        var discEl = document.createElement('div');
        discEl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-style:italic;font-size:11px;color:#555;margin-top:4px;';
        discEl.textContent = content.disclaimer;
        readingZone.appendChild(discEl);
      }
      el.appendChild(readingZone);

      // ── BAND CELLS (col 3, rows 2/3/4; benchmark numerals 40px) ────────
      content.bands.forEach(function(band, i) {

  // ─── BANs ─────────────────────────────────────────────────────────────────
  function renderBANs(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];

    var primaryFontSize = Math.min(Math.max(Math.floor(H * 0.52), 48), 160);
    var compFontSize    = Math.min(Math.max(Math.floor(H * 0.30), 28), 100);
    var labelFontSize   = Math.max(Math.floor(H * 0.055), 9);
    var pad             = Math.max(10, Math.floor(Math.min(W, H) * 0.03));

    el.style.display        = 'flex';
    el.style.alignItems     = 'center';
    el.style.flexWrap       = 'wrap';
    el.style.padding        = pad + 'px ' + Math.max(16, pad) + 'px';
    el.style.gap            = Math.max(14, Math.floor(W * 0.025)) + 'px';
    el.style.height         = '100%';
    el.style.boxSizing      = 'border-box';

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var wrap = document.createElement('div');
      if (isPrimary && sorted.length > 1) {
        var sepPad = Math.max(14, Math.floor(W * 0.025));
        wrap.style.cssText = 'padding-right:' + sepPad + 'px;margin-right:' + sepPad + 'px;border-right:1px solid var(--grey-700);';
      }

      var lbl = document.createElement('div');
      lbl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-size:' + labelFontSize + 'px;' +
        'text-transform:uppercase;letter-spacing:0.10em;margin-bottom:4px;' +
        'color:' + (isPrimary ? D.primaryValue.color : D.compValue.color) + ';';
      lbl.textContent = d.name;

      var val = document.createElement('div');
      val.setAttribute('data-brand', d.name);
      val.style.cssText = 'font-family:' + D.primaryValue.font + ';font-style:italic;' +
        'font-size:' + (isPrimary ? primaryFontSize : compFontSize) + 'px;' +
        'color:' + (isPrimary ? D.primaryValue.color : D.compValue.color) + ';line-height:0.90;';
      val.textContent = d.value.toFixed(2);

      wrap.appendChild(lbl);
      wrap.appendChild(val);
      el.appendChild(wrap);
    });
  }

  // ─── LINE CHART (straight + smooth) ──────────────────────────────────────
  function renderLineChart(el, data, primary, straight) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var mT = 12, mR = 100, mB = 28, mL = 38;
    var iW = W - mL - mR, iH = H - mT - mB;

    var brands = Object.keys(data[0]).filter(function(k) { return k !== 'period'; });
    var periods = data.map(function(d) { return d.period; });

    var allVals = [];
    brands.forEach(function(b) { data.forEach(function(d) { if (d[b] != null) allVals.push(d[b]); }); });
    var vMin = d3.min(allVals), vMax = d3.max(allVals);
    var yPad = (vMax - vMin) * 0.12 || 1;

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);
    var g = svg.append('g').attr('transform', 'translate(' + mL + ',' + mT + ')');

    var x = d3.scalePoint().domain(periods).range([0, iW]).padding(0.1);
    var y = d3.scaleLinear().domain([vMin - yPad, vMax + yPad]).range([iH, 0]);
    var curve = straight ? d3.curveLinear : d3.curveMonotoneX;
    var lineFn = d3.line()
      .defined(function(d) { return d.v != null; })
      .x(function(d) { return x(d.p); })
      .y(function(d) { return y(d.v); })
      .curve(curve);

    if (y(0) >= 0 && y(0) <= iH) {
      g.append('line').attr('x1',0).attr('x2',iW).attr('y1',y(0)).attr('y2',y(0))
        .attr('stroke','#808080').attr('stroke-width',1).attr('opacity',0.55);
    }

    var sorted = sortWithPrimaryLast(brands.map(function(b) { return { name: b }; }), primary).map(function(d) { return d.name; });
    var placedY = [];

    sorted.forEach(function(b) {
      var vals = data.map(function(d) { return { p: d.period, v: d[b] }; });
      var isPrimary = b === primary;
      var col = isPrimary ? CONFIG.selectedColor : CONFIG.neutralColor;
      var sw  = isPrimary ? 2 : 1.5;

      var path = g.append('path').datum(vals)
        .attr('fill','none').attr('stroke',col).attr('stroke-width',sw)
        .attr('opacity', isPrimary ? 1 : 0.7).attr('d', lineFn);

      var len = path.node().getTotalLength();
      path.attr('stroke-dasharray', len).attr('stroke-dashoffset', len)
        .transition().duration(800).ease(d3.easeLinear).attr('stroke-dashoffset', 0);

      [vals[0], vals[vals.length - 1]].forEach(function(pt) {

  // ─── TREEMAP BAR ──────────────────────────────────────────────────────────

    if (!data || !data.length) { showEmpty(el); return; }

    H = Math.min(Math.max(Math.floor(H * 0.60), 50), 110);
    var gap = 3;
    var sorted = data.slice().sort(function(a,b) { return b.value - a.value; });
    var total  = d3.sum(sorted, function(d) { return d.value; });
    var usableW = W - gap * (sorted.length - 1);
    var opacities  = [1.0, 0.82, 0.65, 0.50, 0.38];
    var compBrands = sorted.filter(function(d) { return d.name !== primary; });

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    var cx = 0;
    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var segW      = (d.value / total) * usableW;
      var compRank  = compBrands.findIndex(function(c) { return c.name === d.name; });
      var op        = isPrimary ? 1 : (opacities[compRank] !== undefined ? opacities[compRank] : 0.25);

      svg.append('rect')
        .attr('x', cx).attr('y',0).attr('width',0).attr('height',H)
        .attr('rx', (i === 0 || i === sorted.length-1) ? 4 : 0)
        .attr('fill', isPrimary ? D.primary : D.comp)

  // ─── BUBBLES ──────────────────────────────────────────────────────────────

    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var primaryData = data.find(function(d) { return d.name === primary; });
    var competitors = data.filter(function(d) { return d.name !== primary; })
      .sort(function(a, b) { return b.value - a.value; });

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

      .attr('x1', leftW).attr('y1', H * 0.08)
      .attr('x2', leftW).attr('y2', H * 0.92)
      .attr('stroke', COL_GRID).attr('stroke-width', 1).attr('opacity', 0.4);

    // Primary hero circle
    if (primaryData) {
      var pR = Math.min(leftW / 2 - 14, H / 2 - 28);
      pR = Math.max(pR, 20);
      var pX = leftW / 2, pY = H / 2;
      var pg = svg.append('g').attr('transform', 'translate(' + pX + ',' + pY + ')');

        .transition().duration(500).ease(d3.easeBackOut).attr('r', pR);
      if (pR > 16)
        pg.append('text').attr('y', pR > 32 ? -7 : 4).attr('text-anchor','middle')
          .style('font-size', VL_SIZE)
          .style('font-family', FONT_LIGHT).style('text-transform','uppercase')
          .style('fill', COL_LIGHT_GREY).style('pointer-events','none')
          .text(primaryData.name.length > 7 ? primaryData.name.slice(0, 7) : primaryData.name);
      if (pR > 32)

          primaryData.value, CONFIG.metricId, primaryData.name === CONFIG.clientBrand);

    // Competitor 2-column grid

          .attr('data-brand', comp.name).style('cursor','pointer')
          .on('click', (function(nm) { return async function() { await selectBrand(nm, _dashboard); }; })(comp.name))
          .transition().duration(400).delay(i * 50 + 100).ease(d3.easeBackOut).attr('r', r);
        if (r > 14)
          cg.append('text').attr('y', r > 22 ? -4 : 4).attr('text-anchor','middle')
            .style('font-size', VL_SIZE)
            .style('font-family', FONT_LIGHT).style('text-transform','uppercase')
            .style('fill', COL_LIGHT_GREY).style('pointer-events','none')
            .text(comp.name.slice(0, 4));
        if (r > 22)
          serifValue(cg.append('text').attr('y', 10).attr('text-anchor','middle').style('pointer-events','none'),
            comp.value, CONFIG.metricId, comp.name === CONFIG.clientBrand);
      });
    }

    el.appendChild(svgEl);
  }

  // ─── INSET BUBBLE ─────────────────────────────────────────────────────────
  function renderInsetBubble(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var reference = d3.max(data, function(d) { return Math.abs(d.value); }) || 100;

    var primaryData = data.find(function(d) { return d.name === primary; });
    var competitors = data.filter(function(d) { return d.name !== primary; })
      .sort(function(a, b) { return b.value - a.value; });

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    var leftW = Math.floor(W * 0.42);
    var rightW = W - leftW;

    // Subtle divider
    svg.append('line')
      .attr('x1', leftW).attr('y1', H * 0.08)
      .attr('x2', leftW).attr('y2', H * 0.92)
      .attr('stroke', COL_GRID).attr('stroke-width', 1).attr('opacity', 0.4);

    // Reference caption
    svg.append('text').attr('x', W - 4).attr('y', 13).attr('text-anchor', 'end')
      .style('font-size', '8px').style('font-family', FONT_LIGHT).style('fill', COL_DARK_GREY)
      .text('○ = max ' + reference.toFixed(1));

    function drawInset(cx, cy, outerR, d, col, opacity, delay) {
      var rInner = Math.min(outerR * 0.97, Math.max(outerR * Math.sqrt(Math.abs(d.value) / reference), 2.5));
      svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', outerR)
        .attr('fill', 'none').attr('stroke', COL_GRID).attr('stroke-width', 1)
        .attr('data-brand', d.name);
      svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 0)
        .attr('fill', col).attr('fill-opacity', opacity)
        .attr('data-brand', d.name).style('cursor', 'pointer')
        .on('click', (function(nm) { return async function() { await selectBrand(nm, _dashboard); }; })(d.name))
        .transition().duration(450).delay(delay).ease(d3.easeBackOut).attr('r', rInner);
      if (rInner >= 12) {
        serifValue(svg.append('text').attr('x', cx).attr('y', cy + 4).attr('text-anchor', 'middle').style('pointer-events', 'none'),
          d.value, CONFIG.metricId, d.name === CONFIG.clientBrand);
      } else {
        svg.append('line')
          .attr('x1', cx).attr('y1', cy - rInner - 2)
          .attr('x2', cx).attr('y2', cy - outerR - 8)
          .attr('stroke', col).attr('stroke-width', 0.8)
          .attr('stroke-dasharray', '2,2').attr('opacity', 0.65);
        serifValue(svg.append('text').attr('x', cx).attr('y', cy - outerR - 11).attr('text-anchor', 'middle').attr('data-brand', d.name),
          d.value, CONFIG.metricId, d.name === CONFIG.clientBrand);
      }
      return rInner;
    }

    // Primary hero inset circle
    if (primaryData) {
      var pR = Math.min(leftW / 2 - 14, H / 2 - 30);
      pR = Math.max(pR, 20);
      var pX = leftW / 2, pY = H / 2;
      drawInset(pX, pY, pR, primaryData, D.primary, 1, 0);
      svg.append('text').attr('x', pX).attr('y', pY + pR + 16)
        .attr('text-anchor', 'middle')
        .style('font-size', VL_SIZE).style('font-family', FONT_LIGHT)
        .style('text-transform', 'uppercase').style('fill', D.primary)
        .attr('data-brand', primaryData.name)
        .text(primaryData.name.length > 7 ? primaryData.name.slice(0, 7) : primaryData.name);
    }

    // Competitors in 2-col grid
    var nComp = competitors.length;
    if (nComp > 0) {
      var nCols = nComp <= 2 ? nComp : 2;
      var nRows = Math.ceil(nComp / nCols);
      var cellW = rightW / nCols;
      var cellH = H / nRows;
      var maxR = Math.min(cellW / 2 - 8, cellH / 2 - 18);
      maxR = Math.max(maxR, 10);

      competitors.forEach(function(comp, i) {
        var col = i % nCols;
        var row = Math.floor(i / nCols);
        var cx = leftW + col * cellW + cellW / 2;
        var cy = row * cellH + cellH / 2;
        var cR = Math.max(maxR * 0.80, 10);
        drawInset(cx, cy, cR, comp, D.comp, 0.78, i * 50 + 100);
        svg.append('text').attr('x', cx).attr('y', cy + cR + 13)
          .attr('text-anchor', 'middle')
          .style('font-size', VL_SIZE).style('font-family', FONT_LIGHT)
          .style('text-transform', 'uppercase').style('fill', D.comp)
          .attr('data-brand', comp.name)
          .text(comp.name.slice(0, 4));
      });
    }

    el.style.overflow = 'hidden';
    el.appendChild(svgEl);
  }

  // ─── PROGRESS RING ────────────────────────────────────────────────────────
  function renderProgressRing(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var reference = 1; // eqr/ebl values are 0–1
    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];
    var n = sorted.length;
    var slotW = W / n;
    var R  = Math.min(H < 200 ? 40 : 70, slotW / 2 - 10);
    var sw = Math.max(8, R * 0.22);
    var cy = Math.max(R + 8, Math.min(H / 2, H - R - 22));

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    var arcTrack = d3.arc().innerRadius(R-sw).outerRadius(R).startAngle(-Math.PI).endAngle(Math.PI);
    var arcFill  = d3.arc().innerRadius(R-sw).outerRadius(R).cornerRadius(sw/2);

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var cx  = slotW * i + slotW / 2;
      var col = isPrimary ? D.primary : D.comp;
      var frac = Math.min(Math.abs(d.value) / reference, 1);
      var endAngle = -Math.PI / 2 + frac * 2 * Math.PI;
      var g = svg.append('g').attr('transform','translate(' + cx + ',' + cy + ')');

      g.append('path').attr('d', arcTrack()).attr('fill','var(--grey-700)').attr('opacity',0.30);

      var fillPath = g.append('path')
        .attr('fill',col).attr('fill-opacity', isPrimary ? 1 : 0.80)
        .attr('data-brand', d.name).style('cursor','pointer')
        .on('click', (function(name) { return async function() { await selectBrand(name, _dashboard); }; })(d.name));
      fillPath.transition().duration(700).ease(d3.easeCircleOut)
        .attrTween('d', function() {
          var interp = d3.interpolate(-Math.PI/2, endAngle);
          return function(t) { return arcFill.startAngle(-Math.PI/2).endAngle(interp(t))(); };
        });

      serifValue(g.append('text').attr('y',4).attr('text-anchor','middle'),
        d.value, CONFIG.metricId, d.name === CONFIG.clientBrand);

      svg.append('text').attr('x',cx).attr('y',cy+R+16).attr('text-anchor','middle')
        .style('font-size', isPrimary ? '10px':'9px').style('font-family', FONT_LIGHT)
        .style('text-transform','uppercase').style('fill',col).attr('data-brand', d.name)
        .text(d.name.slice(0,4));
    });

    el.style.overflow = 'hidden';
    el.appendChild(svgEl);
  }

  // ─── WAFFLE CHART ─────────────────────────────────────────────────────────
  function renderWaffle(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.promoterFraction - a.promoterFraction; }),
    ];
    var n = sorted.length;
    var cols = 10, labelH = 22;
    var maxBlockW = n > 1 ? Math.floor((W - (n-1) * 10) / n) : Math.floor(W * 0.8);
    var availH = Math.max(H - labelH - 8, 40);
    var step = Math.max(4, Math.min(Math.floor(availH / cols), Math.floor(maxBlockW / cols)));
    var r = Math.max(1.2, step * 0.34);
    var blockW = cols * step + 2, blockH = cols * step + 2;
    var svgH = blockH + labelH;
    var brandGap = Math.max(6, (W - n * blockW) / Math.max(n-1,1));

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + svgH); svgEl.style.width='100%'; svgEl.style.height=svgH+'px'; svgEl.style.display='block';
    var svg = d3.select(svgEl);

    sorted.forEach(function(d, bi) {
      var isPrimary = d.name === primary;
      var bx = bi * (blockW + brandGap);
      var nPromote = Math.round((d.promoterFraction || 0) * 100);
      var nPassive = Math.round((d.passiveFraction  || 0) * 100);
      var col = isPrimary ? D.filled : D.comp;

      var g = svg.append('g').attr('opacity',0).attr('data-brand', d.name).style('cursor','pointer');
      g.on('click', (function(name) { return async function() { await selectBrand(name, _dashboard); }; })(d.name));
      g.transition().duration(500).delay(bi*80).ease(d3.easeCubicOut).attr('opacity',1);

      for (var i = 0; i < 100; i++) {
        var c = i % cols, rw = Math.floor(i / cols);
        var cxd = bx + c * step + r, cyd = rw * step + r;
        var fill, op;
        if (i < nPromote)                  { fill = col;    op = isPrimary ? 1 : 0.78; }
        else if (i < nPromote + nPassive)  { fill = D.passive; op = 0.50; }
        else                               { fill = D.neg;   op = 0.85; }
        g.append('circle').attr('cx',cxd).attr('cy',cyd).attr('r',r)
          .attr('fill',fill).attr('opacity',op);
      }

      svg.append('text').attr('x', bx + blockW/2).attr('y', blockH+16).attr('text-anchor','middle')
        .style('font-size', VL_SIZE).style('font-family', FONT_LIGHT)
        .style('text-transform','uppercase').style('fill',col).attr('data-brand', d.name)
        .text(d.name.slice(0,4));
    });

    el.style.overflow = 'hidden';
    el.appendChild(svgEl);
  }

  // ─── HORIZONTAL BAR ───────────────────────────────────────────────────────
  function renderHBar(el, data, primary, dashboard, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var mT = 12, mR = 72, mB = 22, mL = Math.max(80, Math.min(Math.floor(W * 0.20), 130));
    var iW = W - mL - mR, iH = H - mT - mB;

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];

    var allVals = data.map(function(d) { return d.value; });
    var vMin = d3.min(allVals), vMax = d3.max(allVals);
    var xDomain = vMin < 0 ? [vMin * 1.1, vMax * 1.1] : [0, vMax * 1.1];

    var band = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, iH]).padding(0.22);
    var bandwidth = Math.min(band.bandwidth(), 44);
    var x = d3.scaleLinear().domain(xDomain).range([0, iW]);

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var g = d3.select(svgEl).append('g').attr('transform','translate(' + mL + ',' + mT + ')');

    // zero line if needed
    if (vMin < 0) {
      g.append('line').attr('x1', x(0)).attr('x2', x(0)).attr('y1',0).attr('y2',iH)
        .attr('stroke', CONFIG.neutralColor).attr('stroke-width',1).attr('opacity',0.5);
    }

    g.append('g').attr('transform','translate(0,' + iH + ')')
      .call(d3.axisBottom(x).ticks(4).tickSize(-iH))
      .call(function(ax) {
        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', COL_GRID).attr('opacity',0.35).attr('stroke-dasharray','2,3');
      })
      .selectAll('text').style('fill', COL_DARK_GREY).style('font-size','9px').style('font-family', FONT_LIGHT);

    var primaryRow = sorted.findIndex(function(d) { return d.name === primary; });
    if (primaryRow >= 0 && primaryRow < sorted.length - 1) {
      var sepY = band(sorted[primaryRow].name) + band.bandwidth() + band.step() * 0.13;
      g.append('line').attr('x1',-mL).attr('x2',iW+mR).attr('y1',sepY).attr('y2',sepY)
        .attr('stroke','var(--grey-700)').attr('stroke-width',0.5);
    }

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var col = isPrimary ? D.primary : D.comp;
      var rowY = band(d.name);
      var barY = rowY + (band.bandwidth() - bandwidth) / 2;
      var barH = bandwidth;
      var barX = vMin < 0 ? x(Math.min(d.value, 0)) : 0;
      var barW = Math.abs(x(d.value) - x(0));

      g.append('rect').attr('x',barX).attr('y',barY).attr('height',barH)
        .attr('width',0).attr('rx',2)
        .attr('fill',col).attr('data-brand',d.name).style('cursor','pointer')
        .on('click', (function(name) { return async function() { await selectBrand(name, dashboard); }; })(d.name))
        .transition().duration(600).delay(i*50).ease(d3.easeCubicOut).attr('width', barW);

      g.append('text').attr('x',-8).attr('y', rowY + band.bandwidth()/2 + 4).attr('text-anchor','end')
        .style('font-size', isPrimary ? '10px':'9px').style('font-family', FONT_LIGHT)
        .style('text-transform','uppercase').style('fill',col).text(d.name);

      var valX = d.value >= 0 ? x(d.value) + 8 : x(d.value) - 8;
      var valAnchor = d.value >= 0 ? 'start' : 'end';
      serifValue(g.append('text').attr('x',valX).attr('y', rowY + band.bandwidth()/2 + 4).attr('text-anchor',valAnchor),
        d.value, CONFIG.metricId, d.name === CONFIG.clientBrand)
        .attr('opacity',0).transition().duration(300).delay(i*50+600).attr('opacity',1);
    });

    el.appendChild(svgEl);
  }

  // ─── VERTICAL BAR STACKED ─────────────────────────────────────────────────
  function renderVBarStacked(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var mT = 10, mR = 8, mB = 26, mL = 30;
    var iW = W - mL - mR, iH = H - mT - mB;

    // Support explicit active/passive or a ratio value (0–1 or 0–100)
    var plotData = data.map(function(d) {
      if (d.active !== undefined) return d;
      var v = d.value > 1 ? d.value / 100 : d.value;
      return { name: d.name, active: v, passive: 1 - v };
    });

    var sorted = sortWithPrimaryLast(plotData, primary);
    var band = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, iW]).padding(0.28);
    var y = d3.scaleLinear().domain([0, 1]).range([iH, 0]);

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H); svgEl.style.width='100%'; svgEl.style.height='100%'; svgEl.style.display='block';
    var g = d3.select(svgEl).append('g').attr('transform','translate(' + mL + ',' + mT + ')');

    g.append('g')
      .call(d3.axisLeft(y).ticks(4).tickSize(-iW).tickFormat(function(d) { return Math.round(d*100) + '%'; }))
      .call(function(ax) {
        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', COL_GRID).attr('opacity',0.35).attr('stroke-dasharray','2,3');
      })
      .selectAll('text').style('fill', COL_DARK_GREY).style('font-size','9px').style('font-family', FONT_LIGHT);

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var delay = isPrimary ? sorted.length * 40 + 80 : i * 40;
      var bx = band(d.name);
      var bw = band.bandwidth();
      var yActive = y(d.active);

      g.append('rect').attr('x',bx).attr('y',0).attr('width',bw).attr('height',0).attr('rx',0)
        .attr('fill', isPrimary ? D.primaryPassive : D.compPassive)
        .attr('data-brand', d.name)
        .transition().duration(600).delay(delay).ease(d3.easeCubicOut).attr('height', yActive);

      g.append('rect').attr('x',bx).attr('y',iH).attr('width',bw).attr('height',0).attr('rx',0)
        .attr('fill', isPrimary ? D.primaryActive : D.compActive)
        .attr('data-brand', d.name).style('cursor','pointer')
        .on('click', (function(name) { return async function() { await selectBrand(name, _dashboard); }; })(d.name))
        .transition().duration(600).delay(delay).ease(d3.easeCubicOut).attr('y',yActive).attr('height', iH-yActive);

      g.append('line').attr('x1',bx).attr('x2',bx+bw).attr('y1',yActive).attr('y2',yActive)
        .attr('stroke','#1A1A1A').attr('stroke-width',2).attr('pointer-events','none');
    });

    g.append('g').attr('transform','translate(0,' + iH + ')')
      .call(d3.axisBottom(band).tickSize(0).tickPadding(6))
      .call(function(ax) { ax.select('.domain').remove(); })
      .selectAll('text')
      .style('fill', function(d) { return d === primary ? D.primaryActive : '#E6E6E6'; })
      .style('font-size','9px').style('font-family', FONT_LIGHT).style('text-transform','uppercase');

    el.appendChild(svgEl);
  }

  // ─── VERTICAL BAR GROUPED ─────────────────────────────────────────────────
  function renderVBar(el, data, primary, D) {

    var sorted = sortWithPrimaryLast(data, primary);

    var fmtY = vMax <= 1

    var band = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, iW]).padding(0.28);
    var y = d3.scaleLinear().domain([0, yMax]).range([iH, 0]);

    var g = d3.select(svgEl).append('g').attr('transform','translate(' + mL + ',' + mT + ')');

    g.append('g')

        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', COL_GRID).attr('opacity',0.35).attr('stroke-dasharray','2,3');
      })
      .selectAll('text').style('fill', COL_DARK_GREY).style('font-size','9px').style('font-family', FONT_LIGHT);

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var col = isPrimary ? D.primary : D.comp;
      var delay = isPrimary ? sorted.length * 40 + 80 : i * 40;
      var bx = band(d.name);
      var bw = band.bandwidth();
      var barH = iH - y(d.value);

      g.append('rect').attr('x',bx).attr('y',iH).attr('width',bw).attr('height',0).attr('rx',1)
        .attr('fill',col).attr('data-brand',d.name).style('cursor','pointer')
        .on('click', (function(name) { return async function() { await selectBrand(name, _dashboard); }; })(d.name))
        .transition().duration(600).delay(delay).ease(d3.easeCubicOut)
        .attr('y', y(d.value)).attr('height', barH);

      serifValue(g.append('text').attr('x', bx + bw / 2).attr('y', y(d.value) - 6).attr('text-anchor','middle').attr('opacity', 0),
        d.value, CONFIG.metricId, d.name === CONFIG.clientBrand)
        .transition().duration(300).delay(delay + 600).attr('opacity', 1);
    });

    g.append('g').attr('transform','translate(0,' + iH + ')')
      .call(d3.axisBottom(band).tickSize(0).tickPadding(6))
      .call(function(ax) { ax.select('.domain').remove(); })
      .selectAll('text')
      .style('fill', function(d) { return d === primary ? D.primary : '#E6E6E6'; })
      .style('font-size','9px').style('font-family', FONT_LIGHT).style('text-transform','uppercase');

    el.appendChild(svgEl);
  }

  // ─── SCALE · FIGMA ────────────────────────────────────────────────────────
  function renderScaleFigma(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];

    var nRows    = sorted.length;

    // 31px header overall score — white on comparators, black on client cell
    '.sc-hdr-score{' +

    '.sc-score{' +
    "  font-family:'Baskerville','Libre Baskerville',Georgia,serif;" +
    '  font-size:21px;font-style:italic;font-weight:400;}' +
    '.sc-cell-client .sc-score{font-size:28px;}' +

    // ── Detail page header (above the card, in the transparent area) ──

    '.sc-commentary{' +
    '  border-radius:8px;background:#181818;' +

    // no own border; 2px gap comes from sc-frame gap:2px
    '.sc-commentary-verdict{' +
    "  font-family:'Tableau Regular','Helvetica Neue',Arial,sans-serif;" +
    '  font-size:16px;color:#b0b0b0;line-height:1.4;}' +
    '.sc-commentary-reading{' +
    "  font-family:'Tableau Regular','Helvetica Neue',Arial,sans-serif;" +
    '  font-size:13px;color:#b0b0b0;line-height:1.5;}' +
    '.detail-header{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}' +
    '.detail-header-title{' +
    "  font-family:'Tableau Regular','Helvetica Neue',Arial,sans-serif;" +
    '  font-size:56px;color:#ededed;line-height:1;text-transform:uppercase;}' +
    '.detail-header-question{' +
    "  font-family:'Tableau Light','Helvetica Neue',Arial,sans-serif;" +
    '  font-size:19px;color:#ededed;line-height:1.3;}' +
    '.sc-top-spacer{flex:1 1 0;max-height:104px;}' +
    '.sc-bot-spacer{flex:1 0 12px;min-height:12px;}';
    // sc-top-spacer: grows up to 104px; effective top-gap cap ≈ 104+16 (2 gaps) = 120px
    // sc-bot-spacer: min 12px; effective bottom inset ≈ 12+12 (gap+padding) = 24px (loose)

  function injectCSS() {
    if (document.getElementById(STYLE_ID)) return;
    var style = document.createElement('style');
    style.id = STYLE_ID;
    style.textContent = CSS;
    document.head.appendChild(style);
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // BULLETPROOF wordmark — first path only (y 0–38); "Score" letterforms in

  function renderMatrix(root, model, meta, onSelect) {
    var N = model.brands.length;

    var frame = document.createElement('div');
    frame.className = 'sc-frame';

    if (!model.rows.length) {
      var empty = document.createElement('div');
      empty.className = 'sc-empty-msg';
      empty.textContent = 'No indicators found';
      frame.appendChild(empty);
      var wrapE = document.createElement('div');
      wrapE.className = 'sc-wrap';
      wrapE.appendChild(frame);
      root.appendChild(wrapE);
      return;
    }

    var scroll = document.createElement('div');
    scroll.className = 'sc-grid-scroll';

    var grid = document.createElement('div');
    grid.className = 'sc-grid';
    grid.style.gridTemplateColumns = 'minmax(320px,2.2fr) 1.3fr repeat(' + (N - 1) + ',1fr)';

    // ── Per-brand mean scores (overall = mean of visible indicator scores) ──
    var brandMeans = {};
    model.brands.forEach(function(bk) {
      var vals = model.rows.map(function(r) {
        return (r.scores && r.scores[bk] !== undefined && r.scores[bk] !== null) ? r.scores[bk] : null;
      }).filter(function(v) { return v !== null && !isNaN(v); });
      brandMeans[bk] = vals.length
        ? vals.reduce(function(a, b) { return a + b; }, 0) / vals.length
        : null;
    });

    // ── Row padding: flex ~20px (few rows) → ~12px (many rows) ──
    var nRows = model.rows.length;
    var rowPad = nRows >= 6 ? 12 : nRows >= 4 ? 16 : 20;  // 4px multiples; ≈10-20px spec range
    var leftPad = nRows >= 6 ? 12 : 22;                    // generous ~22px left inset at ≤5 rows

    // ── Header row (grid row 1): label cell = wordmark; brand cells = name + mean score ──
    var hdrLabel = document.createElement('div');
    hdrLabel.className = 'sc-cell-hdr sc-cell-hdr-label';
    hdrLabel.style.padding = rowPad + 'px 12px';
    var wmEl = document.createElement('div');
    wmEl.className = 'sc-wordmark';
    wmEl.innerHTML = BULLETPROOF_SVG;
    hdrLabel.appendChild(wmEl);
    var stEl = document.createElement('div');
    stEl.className = 'sc-score-type';
    stEl.textContent = 'Score';
    hdrLabel.appendChild(stEl);
    grid.appendChild(hdrLabel);

    model.brands.forEach(function(brandKey, i) {
      var isClient = i === 0;
      var cell = document.createElement('div');
      cell.className = isClient ? 'sc-cell-hdr sc-cell-hdr-client' : 'sc-cell-hdr sc-cell-hdr-comp';
      cell.style.padding = rowPad + 'px 8px ' + rowPad + 'px ' + leftPad + 'px';
      var nameEl = document.createElement('div');
      nameEl.className = 'sc-brand-name';
      nameEl.textContent = (BRAND_DISPLAY_MAP && BRAND_DISPLAY_MAP[brandKey])
        ? BRAND_DISPLAY_MAP[brandKey]
        : brandKey.toLowerCase().replace(/(^|\s)(\S)/g, function(m, p1, p2) { return p1 + p2.toUpperCase(); });
      cell.appendChild(nameEl);
      var mean = brandMeans[brandKey];
      if (mean !== null && mean !== undefined) {
        var meanEl = document.createElement('div');
        meanEl.className = 'sc-hdr-score';
        meanEl.innerHTML = isClient
          ? mean.toFixed(1) + '<span class="sc-score-suffix">/5</span>'
          : mean.toFixed(1);
        cell.appendChild(meanEl);
      }
      grid.appendChild(cell);
    });

    // ── Body rows ──
    model.rows.forEach(function(row) {
      // Label cell
      var labelCell = document.createElement('div');
      labelCell.className = 'sc-cell-label';
      labelCell.style.padding = rowPad + 'px 12px';
      labelCell.addEventListener('click', (function(id) {
        return function() { if (typeof onSelect === 'function') onSelect(id); };
      })(row.id));

      var inner = document.createElement('div');
      inner.className = 'sc-cell-label-inner';

      var nameEl = document.createElement('div');
      nameEl.className = 'ind-heading';
      nameEl.textContent = row.name;
      inner.appendChild(nameEl);

      if (row.source) {
        var srcEl = document.createElement('div');
        srcEl.className = 'ind-source';
        srcEl.textContent = row.source;
        inner.appendChild(srcEl);
      }

      labelCell.appendChild(inner);

      var jumpEl = document.createElement('div');
      jumpEl.className = 'ind-jump';
      jumpEl.setAttribute('tabindex', '0');
      jumpEl.setAttribute('role', 'button');
      jumpEl.innerHTML = '<span class="ind-jump-label">OPEN DATA</span>';
      jumpEl.addEventListener('keydown', (function(id) {
        return function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            if (typeof onSelect === 'function') onSelect(id);
          }
        };
      })(row.id));
      labelCell.appendChild(jumpEl);

      grid.appendChild(labelCell);

      // Score cells
      model.brands.forEach(function(brandKey, i) {
        var isClient = i === 0;
        var sc = (row.scores && row.scores[brandKey] !== undefined) ? row.scores[brandKey] : null;
        var cell = document.createElement('div');
        cell.className = isClient ? 'sc-cell-client' : 'sc-cell-comp';
        cell.style.padding = rowPad + 'px 8px ' + rowPad + 'px ' + leftPad + 'px';

        if (sc !== null) {
          var colour;
          if (isClient) {
            colour = sc > 4 ? 'var(--rag-green)' : sc < 2 ? 'var(--rag-red)' : 'var(--rag-amber)';
          } else {
            colour = '#d2d2d2';
          }
          var scoreEl = document.createElement('div');
          scoreEl.className = 'sc-score';
          scoreEl.style.color = colour;
          scoreEl.innerHTML = isClient
            ? Number(sc).toFixed(1) + '<span class="sc-score-suffix">/5</span>'
            : Number(sc).toFixed(1);
          cell.appendChild(scoreEl);
        }

        grid.appendChild(cell);
      });
    });

    scroll.appendChild(grid);
    frame.appendChild(scroll);

    if (meta && meta.showCommentary && meta.verdict && nRows < 7) {
      var commentary = document.createElement('div');
      commentary.className = 'sc-commentary';
      var verdictEl = document.createElement('div');
      verdictEl.className = 'sc-commentary-verdict';
      verdictEl.textContent = meta.verdict;
      commentary.appendChild(verdictEl);
      var readingEl = document.createElement('div');
      readingEl.className = 'sc-commentary-reading';
      readingEl.textContent = meta.reading || '';
      commentary.appendChild(readingEl);
      frame.appendChild(commentary);
    }

    var wrap = document.createElement('div');
    wrap.className = 'sc-wrap';
    wrap.appendChild(frame);
    root.appendChild(wrap);
  }

  function renderTable(indicators, onIndicatorSelected, onBack, matrixModel, subgroupMeta) {
    injectCSS();

    var root = document.getElementById('table-view');
    if (!root) {
      console.warn('table.js: #table-view element not found');
      return;
    }
    root.innerHTML = '';

    if (typeof onBack === 'function') {
      var backRow = document.createElement('div');
      backRow.className = 'tbl-back-row';
      var backBtn = document.createElement('button');
      backBtn.className = 'tbl-back-btn';
      backBtn.title = 'Back';
      backBtn.textContent = '←';
      backBtn.onclick = onBack;
      backRow.appendChild(backBtn);
      root.appendChild(backRow);
    }

    if (matrixModel) {
      if (subgroupMeta && (subgroupMeta.title || subgroupMeta.question)) {
        var hdr = document.createElement('div');
        hdr.className = 'detail-header';
        if (subgroupMeta.title) {
          var hdrTitle = document.createElement('div');
          hdrTitle.className = 'detail-header-title';
          subgroupMeta.title.split(/\s+/).forEach(function(word) {
            var line = document.createElement('div');
            line.textContent = word;
            hdrTitle.appendChild(line);
          });
          hdr.appendChild(hdrTitle);
        }
        if (subgroupMeta.question) {
          var hdrQ = document.createElement('div');
          hdrQ.className = 'detail-header-question';
          hdrQ.textContent = subgroupMeta.question;
          hdr.appendChild(hdrQ);
        }
        root.appendChild(hdr);
        var topSpacer = document.createElement('div');
        topSpacer.className = 'sc-top-spacer';
        root.appendChild(topSpacer);
      }
      renderMatrix(root, matrixModel, subgroupMeta, onIndicatorSelected);
      var botSpacer = document.createElement('div');
      botSpacer.className = 'sc-bot-spacer';
      root.appendChild(botSpacer);
      return;
    }

    if (!indicators || !indicators.length) {
      var msg = document.createElement('div');
      msg.className = 'tbl-empty-msg';
      msg.textContent = 'No indicators found';
      root.appendChild(msg);
      return;
    }

    indicators.forEach(function (ind) {
      var row = document.createElement('div');
      row.className = 'ind-row';

      var leftEl = document.createElement('div');
      leftEl.className = 'ind-left';
      leftEl.innerHTML =
        '<div class="ind-heading">' + escHtml(ind.name) + '</div>' +
        (ind.source ? '<div class="ind-source">' + escHtml(ind.source) + '</div>' : '');
      row.appendChild(leftEl);

      var jumpEl = document.createElement('div');
      jumpEl.className = 'ind-jump';
      jumpEl.setAttribute('tabindex', '0');
      jumpEl.setAttribute('role', 'button');
      jumpEl.innerHTML = '<span class="ind-jump-label">OPEN DATA</span>';
      jumpEl.addEventListener('keydown', (function(id) {
        return function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            if (typeof onIndicatorSelected === 'function') onIndicatorSelected(id);
          }
        };
      })(ind.id));
      row.appendChild(jumpEl);

      row.addEventListener('click', (function (id) {
        return function () {
          if (typeof onIndicatorSelected === 'function') {
            onIndicatorSelected(id);
          }
        };
      })(ind.id));

      root.appendChild(row);
    });
  }

  global.renderTable = renderTable;

})(window);
</script>
  <style>
    :root {
      --grey-900: #1A1A1A;
      --grey-800: #2A2828;
      --grey-700: #4D4D4D;
      --grey-500: #808080;
      --grey-300: #B3B3B3;
      --grey-100: #E6E6E6;
      --primary-500: #E994A2;
      --primary-700: #E0697D;
      --primary-900: #D73F58;
      --rag-green:   #57bf6a;
      --rag-red:     #e0584f;
      --rag-amber:   #e0992e;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      background: transparent;
    }

    #table-view {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 8px;
      padding: 4px 0;
      overflow-y: auto;
    }

      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #back-btn {
      background: #202020;
      border: 0.5px solid transparent;
      color: #888;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
