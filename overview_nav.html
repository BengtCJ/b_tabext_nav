<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BP Overview Nav</title>
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
  <style>
    :root {
      --grey-900: #1A1A1A;
      --grey-800: #2A2828;
      --grey-700: #4D4D4D;
      --grey-500: #808080;
      --grey-300: #B3B3B3;
      --grey-100: #E6E6E6;
      --primary-500: #E994A2;
      --row-bg:    #2A2828;
      --row-hover: #363232;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 6px;
      padding: 4px 0;
      overflow-y: auto;
    }

    /* ── Card ── */
    .subcat-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--row-bg);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s;
      user-select: none;
    }

    .subcat-card:hover  { background: var(--row-hover); }
    .subcat-card:active { opacity: 0.85; }

    .card-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey-100);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-subtext {
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: var(--grey-500);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .card-right svg {
      width: 18px;
      height: 18px;
      opacity: 0.5;
      color: var(--grey-500);
    }

    .card-right-label {
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px;
      color: var(--grey-500);
      letter-spacing: 0.04em;
    }

    /* ── State messages ── */
    .state-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 11px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      color: var(--grey-700);
      padding: 16px;
      text-align: center;
    }

    /* ── Settings dialog ── */
    #settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #settings-dialog {
      background: #222222;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      width: 480px;
      max-width: 95vw;
      color: var(--grey-100);
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    #settings-dialog h2 {
      font-size: 15px;
      color: var(--primary-500);
      margin-bottom: 16px;
      font-weight: 400;
      letter-spacing: 0.06em;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    #settings-dialog h2 .version {
      font-size: 10px;
      color: #666;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .field select,
    .field input[type="text"] {
      width: 100%;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: var(--grey-100);
      padding: 4px 8px;
      font-size: 12px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      outline: none;
    }

    .field select:focus,
    .field input:focus { border-color: var(--primary-500); }

    .field-full { grid-column: 1 / -1; }

    .field .hint {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.05em;
    }

    .btn-primary   { background: var(--primary-500); color: #222; }
    .btn-primary:hover  { background: #d4778a; }
    .btn-secondary { background: #333; color: var(--grey-100); border: 1px solid #555; }
    .btn-secondary:hover { background: #3a3a3a; }

    #configure-btn {
      position: fixed;
      bottom: 6px;
      right: 6px;
      background: none;
      border: none;
      color: #666;
      font-size: 10px;
      cursor: pointer;
      z-index: 100;
      opacity: 0.15;
      transition: opacity 0.2s;
      padding: 0;
      line-height: 1;
    }
    #configure-btn:hover { opacity: 0.6; }
  </style>
</head>
<body>
  <div id="app"></div>
  <button id="configure-btn" title="Configure">⚙</button>

  <script>
  // ─── VERSION ──────────────────────────────────────────────────────────────
  var VERSION = '2026-05-28.4';

  // ─── DEFAULTS ─────────────────────────────────────────────────────────────
  var DEFAULTS = {
    worksheet:            '',
    nameField:            'subcategory_name',
    subtextField:         'subcategory_description',
    subcategoryIdField:   'subcategory_id',
    subcategoryParameter: 'Source Dashboard',
    targetDashboard:      '',
  };

  // ─── STATE ────────────────────────────────────────────────────────────────
  var CONFIG     = Object.assign({}, DEFAULTS);
  var _dashboard = null;

  // ─── SAMPLE DATA (preview mode) ───────────────────────────────────────────
  var SAMPLE = [
    { name: 'Opportunity Pathway',  subtext: 'Is there a clear market opportunity?', subcategory_id: 'cmoaf' },
    { name: 'Strategic Strength',   subtext: 'Does the strategy capitalise on opportunity?', subcategory_id: 'sbr' },
    { name: 'Portfolio Power',      subtext: 'Does the company have a robust portfolio?', subcategory_id: 'hp' },
    { name: 'Talent Magnetism',     subtext: 'Is the company able to attract the right talent?', subcategory_id: 'ct' },
  ];

  // ─── RENDER CARDS ─────────────────────────────────────────────────────────
  function renderCards(rows) {
    var app = document.getElementById('app');
    app.innerHTML = '';

    if (!rows || !rows.length) {
      app.innerHTML = '<div class="state-msg">No subcategories found</div>';
      return;
    }

    rows.forEach(function(row) {
      var div = document.createElement('div');
      div.className = 'subcat-card';

      div.innerHTML =
        '<div class="card-left">' +
          '<div class="card-name">' + escHtml(row.name) + '</div>' +
          (row.subtext ? '<div class="card-subtext">' + escHtml(row.subtext) + '</div>' : '') +
        '</div>' +
        '<div class="card-right">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
            '<polyline points="9 18 15 12 9 6"/>' +
          '</svg>' +
          '<span class="card-right-label">Explore</span>' +
        '</div>';

      div.addEventListener('click', function() {
        handleCardClick(row);
      });

      app.appendChild(div);
    });
  }

  // ─── CARD CLICK ───────────────────────────────────────────────────────────
  function handleCardClick(row) {
    if (!_dashboard) {
      console.log('Preview click — subcategory_id:', row.subcategory_id);
      return;
    }

    _dashboard.getParametersAsync().then(function(params) {
      var subcatParam = params.find(function(p) { return p.name === CONFIG.subcategoryParameter; });

      if (!subcatParam) {
        console.warn('Parameter not found:', CONFIG.subcategoryParameter);
      }

      var promise = subcatParam
        ? subcatParam.changeValueAsync(row.subcategory_id)
        : Promise.resolve();

      promise.catch(function(e) {
        console.warn('Parameter set failed:', e);
      });
      // Navigation to target dashboard must be handled by a Tableau
      // "Go to Dashboard" action — Extensions API 1.x has no public
      // activateSheetAsync on the workbook object.
    });
  }

  // ─── FETCH DATA ───────────────────────────────────────────────────────────
  function fetchAndRender() {
    if (!_dashboard || !CONFIG.worksheet) {
      renderCards(SAMPLE);
      return;
    }

    var ws = _dashboard.worksheets.find(function(w) { return w.name === CONFIG.worksheet; });
    if (!ws) {
      renderCards(SAMPLE);
      return;
    }

    ws.getSummaryDataAsync({ maxRows: 50 }).then(function(dataTable) {
      var cols = dataTable.columns;
      var rows = dataTable.data;

      function colIdx(fieldName) {
        var norm = fieldName.toLowerCase().replace(/[\s_]+/g, '');
        return cols.findIndex(function(c) {
          return c.fieldName.toLowerCase().replace(/[\s_]+/g, '') === norm;
        });
      }

      var nameIdx    = colIdx(CONFIG.nameField);
      var subtextIdx = colIdx(CONFIG.subtextField);
      var subcatIdx  = colIdx(CONFIG.subcategoryIdField);

      if (nameIdx === -1 || subcatIdx === -1) {
        var available = cols.map(function(c) { return c.fieldName; }).join(', ');
        showMsg('Field not found. Need "' + CONFIG.nameField + '" + "' +
                CONFIG.subcategoryIdField + '". Available: ' + available);
        return;
      }

      // Deduplicate by subcategory_id
      var seen = {};
      var data = [];
      rows.forEach(function(row) {
        var subcatId = row[subcatIdx].value || row[subcatIdx].formattedValue || '';
        if (!subcatId || seen[subcatId]) return;
        seen[subcatId] = true;
        data.push({
          name:           row[nameIdx].formattedValue || row[nameIdx].value || '',
          subtext:        subtextIdx !== -1 ? (row[subtextIdx].formattedValue || row[subtextIdx].value || '') : '',
          subcategory_id: subcatId,
        });
      });

      renderCards(data);
    }).catch(function(e) {
      showMsg('Data error: ' + e.message);
    });
  }

  // ─── SETTINGS ─────────────────────────────────────────────────────────────
  function showSettings() {
    var worksheets = _dashboard ? _dashboard.worksheets.map(function(ws) { return ws.name; }) : [];
    var dashName   = _dashboard ? _dashboard.name : '—';

    var existing = document.getElementById('settings-overlay');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.id = 'settings-overlay';

    var wsOptions = worksheets.map(function(w) {
      return '<option value="' + escAttr(w) + '"' + (CONFIG.worksheet === w ? ' selected' : '') + '>' + escHtml(w) + '</option>';
    }).join('');

    overlay.innerHTML =
      '<div id="settings-dialog">' +
        '<h2>BP Overview Nav <span class="version">' + VERSION + '</span></h2>' +

        '<div class="fields-grid">' +

          '<div class="field field-full"><label>Dashboard</label>' +
            '<input type="text" value="' + escAttr(dashName) + '" disabled ' +
              'style="opacity:0.4;cursor:default">' +
            '<div class="hint">Category is inferred from this dashboard\'s name</div>' +
          '</div>' +

          '<div class="field field-full"><label>Worksheet</label>' +
            '<select id="s-worksheet"><option value="">— select —</option>' + wsOptions + '</select>' +
          '</div>' +

          '<div class="field"><label>Name field</label>' +
            '<input type="text" id="s-nameField" value="' + escAttr(CONFIG.nameField) + '">' +
          '</div>' +

          '<div class="field"><label>Subtext field</label>' +
            '<input type="text" id="s-subtextField" value="' + escAttr(CONFIG.subtextField) + '">' +
            '<div class="hint">Optional — description below name</div>' +
          '</div>' +

          '<div class="field"><label>subcategory_id field</label>' +
            '<input type="text" id="s-subcategoryIdField" value="' + escAttr(CONFIG.subcategoryIdField) + '">' +
          '</div>' +

          '<div class="field"><label>Subcategory parameter name</label>' +
            '<input type="text" id="s-subcategoryParameter" value="' + escAttr(CONFIG.subcategoryParameter) + '">' +
          '</div>' +

          '<div class="field field-full"><label>Target dashboard name</label>' +
            '<input type="text" id="s-targetDashboard" value="' + escAttr(CONFIG.targetDashboard) + '" ' +
              'placeholder="Exact tab name of the indicator table dashboard">' +
          '</div>' +

        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn btn-secondary" id="s-cancel">Cancel</button>' +
          '<button class="btn btn-primary"   id="s-save">Save</button>' +
        '</div>' +
      '</div>';

    document.body.appendChild(overlay);

    document.getElementById('s-cancel').onclick = function() { overlay.remove(); };

    document.getElementById('s-save').onclick = function() {
      CONFIG.worksheet            = document.getElementById('s-worksheet').value;
      CONFIG.nameField            = document.getElementById('s-nameField').value.trim();
      CONFIG.subtextField         = document.getElementById('s-subtextField').value.trim();
      CONFIG.subcategoryIdField   = document.getElementById('s-subcategoryIdField').value.trim();
      CONFIG.subcategoryParameter = document.getElementById('s-subcategoryParameter').value.trim();
      CONFIG.targetDashboard      = document.getElementById('s-targetDashboard').value.trim();

      if (_dashboard) {
        try {
          var settings = tableau.extensions.settings;
          Object.keys(CONFIG).forEach(function(k) { settings.set(k, CONFIG[k]); });
          settings.saveAsync().catch(function(e) { console.warn('Settings save failed:', e); });
        } catch(e) { console.warn('Settings access failed:', e); }
      }

      overlay.remove();
      fetchAndRender();
    };
  }

  // ─── HELPERS ──────────────────────────────────────────────────────────────
  function showMsg(msg) {
    document.getElementById('app').innerHTML = '<div class="state-msg">' + escHtml(msg) + '</div>';
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    return String(str || '').replace(/"/g, '&quot;');
  }

  // ─── GEAR BUTTON ─────────────────────────────────────────────────────────
  document.getElementById('configure-btn').onclick = function() { showSettings(); };

  // ─── TABLEAU INIT ─────────────────────────────────────────────────────────
  if (typeof tableau === 'undefined') {
    renderCards(SAMPLE);
    showSettings();
  } else {
    tableau.extensions.initializeAsync({
      configure: function() { showSettings(); }
    }).then(function() {
      _dashboard = tableau.extensions.dashboardContent.dashboard;

      var settings = tableau.extensions.settings;
      Object.keys(DEFAULTS).forEach(function(k) {
        var val = settings.get(k);
        if (val) CONFIG[k] = val;
      });

      if (!CONFIG.worksheet) {
        showSettings();
        return;
      }

      fetchAndRender();

    }).catch(function(err) {
      console.error('initializeAsync failed:', err);
      showSettings();
    });
  }
  </script>
</body>
</html>
