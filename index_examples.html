<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examples extension — PoC (real embeds, schema-shaped seed)</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
<style>
  :root {
    --card:#0d0d0d;  --frame-border:#262626;
    --cell:#242424;  --cell-client:#484848;  --client:#e994a2;
    --divider:#1e1e1e;  --row-sel-bg:#1c1c1c;
    --t1:#ededed; --t2:#cfcfcf; --t3:#a4a4a4; --t4:#808080; --t5:#666; --t6:#555;
    --green:#57bf6a; --red:#e0584f; --amber:#e0992e;
    --f-title:'Baskerville','Libre Baskerville',Georgia,serif;
    --f-body:'Tableau Regular','Helvetica Neue',Arial,sans-serif;
    --f-light:'Tableau Light','Helvetica Neue',Arial,sans-serif;
    --tx:240ms; --ease:cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:transparent; color:var(--t1); font-family:var(--f-body); }

  .demo-wrap { max-width:1120px; margin:0 auto; padding:28px 24px 60px; }
  .demo-cap { font-family:var(--f-light); font-size:12px; color:var(--t5); letter-spacing:.04em; margin:0 4px 8px; }
  .demo-cap b { color:var(--t3); font-family:var(--f-body); font-weight:400; }
  .demo-note { font-family:var(--f-light); font-size:11px; color:var(--t6); margin:14px 4px 0; line-height:1.7; }
  .demo-note kbd { font-family:var(--f-body); color:var(--t3); background:#1a1a1a; border:1px solid #2a2a2a; border-radius:4px; padding:1px 6px; font-size:10px; }
  .demo-note b { color:var(--t3); font-weight:400; }

  #ex-root { width:100%; height:100%; background:transparent; overflow:hidden; position:relative; }
  html.demo-mode, body.demo-mode { overflow:auto; height:auto; }
  body.demo-mode { background:#050505; }
  body.demo-mode #ex-root { height:684px; border:1px solid var(--frame-border); border-radius:16px; }
  .stage { height:100%; overflow-y:auto; padding:0; }
  .stage::-webkit-scrollbar { width:10px; } .stage::-webkit-scrollbar-thumb { background:#222; border-radius:5px; border:2px solid var(--card); }

  .detail-header { overflow:hidden;
    transition:opacity var(--tx) var(--ease), transform var(--tx) var(--ease), max-height var(--tx) var(--ease), margin var(--tx) var(--ease);
    max-height:240px; margin-bottom:24px; }
  .stage.focus .detail-header { opacity:0; transform:translateY(-12px); max-height:0; margin-bottom:0; pointer-events:none; }
  .dh-title { font-family:var(--f-body); font-size:56px; line-height:1; text-transform:uppercase; letter-spacing:-.01em; }
  .dh-q { font-family:var(--f-light); font-size:19px; line-height:1.3; margin-top:10px; max-width:680px; }

  .scorecard { display:flex; flex-direction:column; gap:2px; }
  .sc-row { display:grid; gap:2px; align-items:stretch; cursor:pointer;
            transition:max-height var(--tx) var(--ease), opacity var(--tx) var(--ease), margin var(--tx) var(--ease); max-height:120px; }
  .sc-row.header { cursor:default; }
  .stage.focus .sc-row.collapse { max-height:0; opacity:0; margin:0; pointer-events:none; overflow:hidden; }

  .hc { padding:11px 10px; display:flex; flex-direction:column; gap:5px; border-radius:8px; min-width:0; }
  .hc.lab { background:transparent; }
  .hc.comp { background:#161616; }
  .hc.client { background:var(--client); }
  .hc .wm { line-height:0; }
  .hc .stype { font-family:var(--f-light); font-size:11px; letter-spacing:.14em; color:var(--t5); }
  .hc .bn { font-family:var(--f-light); font-size:14px; color:var(--t2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hc.client .bn { color:#000; }
  .hc .hs { font-family:var(--f-title); font-style:italic; font-size:31px; color:var(--t2); }
  .hc.client .hs { color:#000; font-size:31px; }
  .hc .hs .suf { font-size:.5em; }

  .lab-cell { background:var(--cell); padding:14px 12px; display:flex; align-items:center; gap:10px;
              border-left:3px solid transparent; border-radius:8px; transition:background .14s, border-color .14s; }
  .sc-row:not(.header):hover .lab-cell { background:#2a2a2a; }
  .sc-row:not(.header):hover .score-cell.comp   { background:#222; }
  .sc-row:not(.header):hover .score-cell.client { background:#222; }
  .lab-in { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
  .ind-name { font-family:var(--f-light); font-style:normal; font-size:14px; color:var(--t1); line-height:1.15; }
  .ind-src  { font-family:var(--f-light); font-size:11px; color:var(--t4); }

  /* more-info / less-info pill with arrow */
  .ex-pill { flex-shrink:0; appearance:none; border:1px solid #333; background:#1c1c1c; border-radius:7px;
             display:inline-flex; align-items:center; gap:7px; padding:5px 10px; cursor:pointer; color:var(--t3);
             font-family:var(--f-light); font-size:11px; letter-spacing:.08em; text-transform:uppercase; white-space:nowrap;
             transition:background .14s, color .14s, border-color .14s; }
  .sc-row:hover .ex-pill { background:#262626; color:var(--t1); border-color:#444; }
  .ex-pill .chev { font-size:9px; transition:transform .22s var(--ease); display:inline-block; }
  .sc-row.promoted .ex-pill { background:var(--client); border-color:var(--client); color:#000; }
  .sc-row.promoted .ex-pill .chev { transform:rotate(180deg); }

  .score-cell { padding:14px 10px; display:flex; align-items:center; border-radius:8px;
                transition:background .14s, box-shadow .14s, padding .2s var(--ease); }
  .score-cell.comp   { background:var(--cell); }
  .score-cell.client { background:var(--cell-client); }
  .sc-val { font-family:var(--f-title); font-style:italic; font-size:21px; transition:font-size .2s var(--ease); }
  .score-cell.client .sc-val { font-size:28px; }
  .sc-val .suf { font-size:.5em; color:#7c7c7c; }
  .cell-brand { display:none; font-family:var(--f-light); font-size:9px; letter-spacing:.03em; color:var(--t5);
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }

  /* promoted (sticky header) — keeps SCORES, adds brand names, lights selected */
  .sc-row.promoted { position:sticky; top:0; z-index:20; background:var(--card); max-height:none; }
  .sc-row.promoted .lab-cell { background:var(--row-sel-bg); border-left-color:var(--client); }
  .sc-row.promoted .hc { padding-top:8px; padding-bottom:8px; }
  .sc-row.promoted .score-cell { flex-direction:column; align-items:flex-start; justify-content:center; gap:2px; padding:7px 10px; }
  .sc-row.promoted .score-cell .cell-brand { display:block; }
  .sc-row.promoted .score-cell.client .cell-brand { color:#000; opacity:.65; }
  .sc-row.promoted .sc-val { font-size:18px; }
  .sc-row.promoted .score-cell.client .sc-val { font-size:20px; }
  .score-cell.sel { box-shadow:0 0 0 2px var(--client) inset; }
  .score-cell.client.sel { box-shadow:0 0 0 2px #fff inset; }

  .drawer { grid-column:1 / -1; overflow:hidden; max-height:0; opacity:0; cursor:default;
            transition:max-height var(--tx) var(--ease), opacity var(--tx) var(--ease); }
  .drawer.open { opacity:1; }
  .drawer-inner { background:#0c0c0c; border:1px solid var(--divider); border-radius:10px; margin-top:2px; overflow:hidden; }

  .drawer-tb { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:10px; padding:9px 12px; background:#0c0c0c; border-bottom:1px solid var(--divider); }
  .seg { display:flex; background:#111; border-radius:8px; padding:3px; gap:2px; }
  .seg button { appearance:none; border:none; height:26px; padding:0 12px; font-size:10px; font-family:var(--f-light); letter-spacing:.1em; text-transform:uppercase; cursor:pointer; background:transparent; color:#555; border-radius:6px; transition:background .14s, color .14s; }
  .seg button.active { background:#2e2e2e; color:var(--t1); box-shadow:0 1px 2px rgba(0,0,0,.5); }
  .tb-meta { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .sel-pill { font-family:var(--f-light); font-size:10px; letter-spacing:.04em; color:var(--t4); display:flex; align-items:center; gap:6px; }
  .sel-pill .sw { width:8px; height:8px; border-radius:2px; }
  .sel-pill b { font-family:var(--f-body); font-weight:400; color:var(--t2); }
  .chart-chip { font-family:var(--f-light); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--t5); }
  .chart-chip b { color:var(--t3); font-family:var(--f-body); font-weight:400; }

  .drawer-body { display:grid; height:356px; }
  .drawer-body.mode-split    { grid-template-columns:minmax(0,.92fr) minmax(0,1.08fr); }
  .drawer-body.mode-chart    { grid-template-columns:1fr; }
  .drawer-body.mode-examples { grid-template-columns:1fr; }

  .pane-chart { padding:14px 16px 12px; border-right:1px solid var(--divider); min-width:0; display:flex; flex-direction:column; overflow:hidden; }
  .mode-chart .pane-chart, .mode-examples .pane-chart { border-right:none; }
  .pane-chart .ttl { font-family:var(--f-light); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--t5); margin-bottom:3px; flex-shrink:0; }
  .pane-chart .sub { font-family:var(--f-light); font-size:10px; color:var(--t6); margin-bottom:10px; flex-shrink:0; }
  .pane-chart .plot { flex:1; min-height:0; position:relative; }
  .pane-chart svg { width:100%; height:100%; display:block; overflow:visible; }

  .ban-ed { height:100%; display:flex; flex-direction:column; justify-content:center; gap:14px; }
  .ban-ed .hero { font-family:var(--f-title); font-style:italic; font-size:54px; line-height:.92; color:var(--t1); }
  .ban-ed .hero .u { font-size:.42em; color:var(--t4); }
  .ban-ed .cap { font-family:var(--f-light); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--t5); margin-top:7px; }
  .ban-ed .second { font-family:var(--f-title); font-style:italic; font-size:28px; color:var(--t3); }
  .ban-ed .second .u { font-size:.5em; color:var(--t5); }

  .scale { height:100%; display:flex; flex-direction:column; justify-content:center; gap:10px; }
  .scale .srow { display:flex; align-items:center; gap:10px; }
  .scale .snm { font-family:var(--f-light); font-size:11px; width:72px; text-align:right; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scale .strack { position:relative; flex:1; height:8px; background:#1a1a1a; border-radius:999px; }
  .scale .stick { position:absolute; top:-3px; width:2px; height:14px; background:#262626; border-radius:2px; }
  .scale .sdot { position:absolute; top:-3px; width:14px; height:14px; border-radius:50%; transform:translateX(-7px); border:2px solid #0c0c0c; }
  .scale .sval { font-family:var(--f-title); font-style:italic; font-size:15px; width:30px; flex-shrink:0; }

  .media { position:relative; border:1px solid var(--frame-border); border-radius:8px; overflow:hidden; background:#000; }
  .media.hero::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--client); z-index:2; }
  .media iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .phm { position:absolute; inset:0; display:flex; flex-direction:column; gap:5px; align-items:center; justify-content:center; text-align:center; padding:10px;
         background:repeating-linear-gradient(135deg,#1b1b1b,#1b1b1b 9px,#161616 9px,#161616 18px); font-family:var(--f-light); font-size:10px; color:var(--t6); }
  .phm .ic { font-size:20px; opacity:.5; }
  .thumb-ph { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .thumb-ph .ph-glyph { width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13);
                        display:flex; align-items:center; justify-content:center; font-size:13px; color:#d7d7d7; }
  .thumb-ph .ph-glyph.c { background:rgba(233,148,162,.16); border-color:rgba(233,148,162,.4); color:var(--client); }
  .thumb-ph .ph-cap { font-family:var(--f-light); font-size:9px; color:var(--t4); letter-spacing:.03em; max-width:88%; text-align:center;
                      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .web { position:absolute; inset:0; display:grid; grid-template-columns:104px 1fr; background:#161616; text-decoration:none; }
  .web .thumb { background:linear-gradient(135deg,#3a2a30,#161616 70%); display:flex; align-items:flex-end; padding:8px; }
  .web .thumb span { font-family:var(--f-light); font-size:9px; color:#9a8a90; }
  .web .meta { padding:11px 13px; overflow:hidden; }
  .web .src { font-family:var(--f-light); font-size:10px; color:var(--client); }
  .web .t { font-family:var(--f-body); font-size:12px; margin:3px 0; line-height:1.3; }
  .web .d { font-family:var(--f-light); font-size:11px; color:var(--t3); line-height:1.35; }
  .trends { position:absolute; inset:0; background:#121212; }
  .trends .tbadge { position:absolute; top:7px; left:9px; font-family:var(--f-light); font-size:9px; color:var(--t3); background:rgba(0,0,0,.55); padding:2px 7px; border-radius:4px; z-index:2; }
  .trends svg { position:absolute; inset:0; width:100%; height:100%; }

  .pane-ex { padding:12px 14px; min-width:0; display:flex; flex-direction:column; overflow:hidden; }
  .ex-frame { display:flex; align-items:center; gap:8px; margin-bottom:9px; flex-shrink:0; }
  .src-badge { font-family:var(--f-light); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--t2); background:#222; border-radius:999px; padding:2px 8px; }
  .ex-illnote { font-family:var(--f-light); font-size:10px; color:var(--t5); font-style:italic; }
  .lay { flex:1; min-height:0; display:flex; flex-direction:column; }
  .hline { display:flex; align-items:center; gap:8px; margin-bottom:7px; flex-shrink:0; }
  .hbrand { font-family:var(--f-body); font-size:13px; color:var(--t1); }
  .role-tag { font-family:var(--f-light); font-size:10px; color:var(--t2); background:#2a2a2a; border-radius:999px; padding:2px 8px; }
  .role-tag.client { color:#000; background:var(--client); }
  .role-tag.exemplar { color:#000; background:#cfcfcf; }
  .lay .media { flex:1; min-height:0; }
  .own { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; flex-shrink:0; }
  .own .chip { display:inline-flex; align-items:baseline; gap:4px; background:#1a1a1a; border:1px solid #242424; border-radius:6px; padding:3px 8px; }
  .own .chip .v { font-family:var(--f-body); font-size:11px; color:var(--t2); }
  .own .chip .k { font-family:var(--f-light); font-size:10px; color:var(--t5); }
  .react { font-family:var(--f-body); font-size:11.5px; color:var(--t3); line-height:1.42; margin-top:8px; flex-shrink:0;
           display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .react .l { font-family:var(--f-light); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--t6); display:block; margin-bottom:2px; }
  .brand-strip { display:flex; gap:6px; overflow-x:auto; margin-top:9px; padding-bottom:2px; flex-shrink:0; }
  .brand-strip::-webkit-scrollbar { height:5px; } .brand-strip::-webkit-scrollbar-thumb { background:#222; border-radius:3px; }
  .bt2 { flex:0 0 auto; appearance:none; border:1px solid #262626; background:#161616; border-radius:7px; padding:5px 9px; cursor:pointer; display:flex; flex-direction:column; gap:1px; min-width:82px; transition:border-color .14s; }
  .bt2:hover { border-color:#3a3a3a; }
  .bt2[aria-current="true"] { border-color:var(--client); box-shadow:0 0 0 1px var(--client) inset; }
  .bt2 .n { font-family:var(--f-body); font-size:11px; color:var(--t2); white-space:nowrap; }
  .bt2.client .n { color:var(--client); }
  .bt2 .s { font-family:var(--f-light); font-size:9px; color:var(--t5); white-space:nowrap; }
  .bt2.empty .s { color:#444; font-style:italic; }
  .no-art { flex:1; min-height:0; display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center; text-align:center; border:1px dashed #2a2a2a; border-radius:8px; }
  .no-art .h { font-family:var(--f-body); font-size:12px; color:var(--t3); }
  .no-art .d { font-family:var(--f-light); font-size:11px; color:var(--t6); max-width:250px; line-height:1.4; }
  .market-note { font-family:var(--f-light); font-size:11px; color:var(--t5); font-style:italic; line-height:1.5; margin-top:9px; flex-shrink:0; }

  /* CAROUSEL — one brand, many examples */
  .lay-car { flex:1; min-height:0; display:flex; flex-direction:column; }
  .lay-car .media { flex:1; min-height:0; }
  .lay-car .cap { font-family:var(--f-light); font-size:11px; color:var(--t4); margin-top:7px; line-height:1.4; flex-shrink:0;
                  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .filmstrip { display:flex; gap:7px; overflow-x:auto; margin-top:9px; padding-bottom:3px; flex-shrink:0; }
  .filmstrip::-webkit-scrollbar { height:5px; } .filmstrip::-webkit-scrollbar-thumb { background:#222; border-radius:3px; }
  .fthumb { flex:0 0 110px; appearance:none; border:1px solid #262626; background:#161616; border-radius:7px; overflow:hidden; cursor:pointer; padding:0; transition:border-color .14s; }
  .fthumb:hover { border-color:#3a3a3a; }
  .fthumb[aria-current="true"] { border-color:var(--client); box-shadow:0 0 0 1px var(--client) inset; }
  .fthumb .ft-t { aspect-ratio:16/9; position:relative; }
  .fthumb .ft-c { padding:4px 7px; font-family:var(--f-light); font-size:9px; color:var(--t4); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:left; }

  /* GRID — 7-12 examples across brands */
  .ex-grid { flex:1; min-height:0; display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); grid-auto-rows:min-content; gap:8px; overflow:hidden; align-content:start; }
  .gcard { border:1px solid #232323; background:#151515; border-radius:9px; overflow:hidden; display:flex; flex-direction:column; cursor:pointer; transition:border-color .14s, opacity .14s; }
  .gcard.dim { opacity:.4; }
  .gcard.hit { border-color:var(--client); box-shadow:0 0 0 1px var(--client) inset; opacity:1; }
  .gcard .gt { aspect-ratio:16/9; position:relative; }
  .gcard .gb { padding:6px 9px; display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .gcard .gbrand { font-family:var(--f-body); font-size:11px; color:var(--t2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gcard.client .gbrand { color:var(--client); }
  .gcard .gstat { font-family:var(--f-light); font-size:10px; color:var(--t5); white-space:nowrap; flex-shrink:0; }
  .gmore { border:1px dashed #2a2a2a; border-radius:9px; display:flex; align-items:center; justify-content:center; font-family:var(--f-light); font-size:11px; color:var(--t5); min-height:70px; }

  /* MOSAIC — many brands × many examples */
  .lay-mos { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
  .mos-head { display:flex; align-items:baseline; gap:10px; margin-bottom:8px; flex-shrink:0; }
  .mos-head .big { font-family:var(--f-title); font-style:italic; font-size:28px; color:var(--t1); }
  .mos-head .lab { font-family:var(--f-light); font-size:11px; color:var(--t4); }
  .mosaic { flex:1; min-height:0; display:grid; grid-template-columns:repeat(auto-fill,minmax(72px,1fr)); grid-auto-rows:72px; gap:5px; overflow:hidden; align-content:start; }
  .mtile { border:1px solid #202020; border-radius:6px; overflow:hidden; position:relative; cursor:pointer; transition:opacity .14s, border-color .14s; }
  .mtile.dim { opacity:.3; }
  .mtile.hit { border-color:var(--client); box-shadow:0 0 0 1px var(--client) inset; opacity:1; }
  .mtile .mt-lab { position:absolute; left:0; right:0; bottom:0; padding:2px 5px; font-family:var(--f-light); font-size:8px; color:var(--t3); background:linear-gradient(transparent,rgba(0,0,0,.75)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mtile.client .mt-lab { color:var(--client); }

  /* 16:9 video wrapper — youtube iframes sit inside this; aspect locked by padding-top */
  .yt-wrap { position:relative; width:100%; padding-top:56.25%; }
  /* video media box must not flex-stretch — intrinsic 16:9 from .yt-wrap determines height */
  .lay .media.video, .lay-car .media.video { flex:none; }

  #ver-badge { position:absolute; bottom:6px; right:10px; font-family:var(--f-light); font-size:10px; color:var(--t6); pointer-events:none; z-index:9; letter-spacing:.03em; }
</style>
</head>
<body>
<div id="ex-root">
<div id="ver-badge"></div>
  <div class="stage" id="stage">
    <div id="tv-inner">
      <div class="detail-header" id="detailHeader" style="display:none">
        <div class="dh-title" id="dhTitle"></div>
        <div class="dh-q" id="dhQ"></div>
      </div>
      <div class="scorecard" id="scorecard"></div>

/* ── media ── */
function mediaFill(m,name){
  if(m.type==="youtube"&&m.id&&m.id!=="REPLACE_ID") return '<div class="yt-wrap"><iframe src="https://www.youtube-nocookie.com/embed/'+encodeURIComponent(m.id)+'" title="'+esc(name)+'" allow="encrypted-media;picture-in-picture" allowfullscreen loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe></div>';
  if(m.type==="youtube") return thumbPh(name,"video",m.note||"video");
  if(m.type==="webpage"){ var w=m.web; return '<a class="web" href="'+esc(w.url)+'" target="_blank" rel="noopener noreferrer"><div class="thumb"><span>og:image</span></div><div class="meta"><div class="src">'+esc(w.source)+'</div><div class="t">'+esc(w.title)+'</div><div class="d">'+esc(w.desc)+'</div></div></a>'; }
  if(m.type==="trends"&&m.live) return '<div class="trends" data-trends-live data-q="'+esc(m.query)+'" data-geo="'+esc(m.geo||"")+'" data-time="'+esc(m.time||"today 12-m")+'"><span class="tbadge">Google Trends · live</span>'+trendsInner(m.data)+'</div>';
  if(m.type==="trends") return trendsSVG(m.data);
  return thumbPh(name, /search|impression/i.test(m.note||"")?"search":/funnel|source|report|case/i.test(m.note||"")?"link":"post", m.note||"post");
}
/* media div wrapper — adds "video" class when the content is a live youtube embed so flex
   sizing can be suppressed and the 16:9 .yt-wrap determines the height */
function mediaWrap(m, name, cls){
  var isVid=m.type==="youtube"&&m.id&&m.id!=="REPLACE_ID";
  return '<div class="media'+(cls?" "+cls:"")+(isVid?" video":"")+'">'
    + mediaFill(m,name) + '</div>';
}
/* placeholder content thumbnail — reads as a real (illustrative) artifact, client-tinted */
function thumbPh(name, kind, label){
  var isC = (name===BNAME[CLIENT]);
  var bg = isC ? "linear-gradient(135deg,#3a2a30,#191215)" : "linear-gradient(135deg,#262120,#15110d)";
  var glyph = kind==="video"?"&#9658;" : kind==="search"?"&#9906;" : kind==="link"?"&#128279;" : "&#9788;";
  return '<div class="thumb-ph" style="background:'+bg+'"><span class="ph-glyph'+(isC?" c":"")+'">'+glyph+'</span>'
    + (label?'<span class="ph-cap">'+esc(label)+'</span>':'') + '</div>';
}
/* Live Google Trends embed — official widget, no token (the search/market unlock).
   The sparkline renders immediately as a fallback; the real widget replaces it on load.
   Phase note: refresh the embed_loader build from a fresh Trends "Embed" snippet if it 404s. */
function trendsInner(data){ var W=240,H=120,p=10,max=Math.max.apply(null,data),min=Math.min.apply(null,data),rng=(max-min)||1;
  var pts=data.map(function(v,i){ var x=p+i*((W-2*p)/(data.length-1)); var y=H-p-((v-min)/rng)*(H-2*p); return x.toFixed(1)+","+y.toFixed(1); });
  var area="M"+pts[0]+" L"+pts.join(" L")+" L"+(W-p)+","+(H-p)+" L"+p+","+(H-p)+" Z", line="M"+pts.join(" L");
  return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" class="tfallback"><path d="'+area+'" fill="rgba(233,148,162,0.10)"/><path d="'+line+'" fill="none" stroke="#e994a2" stroke-width="2" stroke-linejoin="round"/></svg>'; }
function hydrateTrends(scope){
  (scope||document).querySelectorAll('[data-trends-live]').forEach(function(el){
    if(el.getAttribute("data-hydrated")) return; el.setAttribute("data-hydrated","1");
    var q=el.getAttribute("data-q"), geo=el.getAttribute("data-geo")||"", time=el.getAttribute("data-time")||"today 12-m";
    function call(){ try{
      var fb=el.querySelector(".tfallback"); if(fb) fb.remove();
      window.trends.embed.renderExploreWidget("TIMESERIES",
        {comparisonItem:[{keyword:q,geo:geo,time:time}],category:0,property:""},
        {exploreQuery:"q="+encodeURIComponent(q)+(geo?"&geo="+geo:"")+"&date="+encodeURIComponent(time),guestPath:"https://trends.google.com:443/trends/embed/"});
      var ifr=el.querySelector("iframe"); if(ifr){ ifr.style.position="absolute"; ifr.style.inset="0"; ifr.style.width="100%"; ifr.style.height="100%"; ifr.style.border="0"; }
    }catch(e){ /* keep the sparkline fallback */ } }
    if(window.trends&&window.trends.embed){ var s0=document.createElement("script"); s0.text=";"; el.appendChild(s0); call(); }
    else { var s=document.createElement("script"); s.src="https://ssl.gstatic.com/trends_nrtr/3700/embed_loader.js"; s.onload=call; s.onerror=function(){}; el.appendChild(s); }

function trendsSVG(data){

  return '<div class="trends"><span class="tbadge">Google Trends</span><svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><path d="'+area+'" fill="rgba(233,148,162,0.10)"/><path d="'+line+'" fill="none" stroke="#e994a2" stroke-width="2" stroke-linejoin="round"/></svg></div>';

/* ── examples (format suits the content) ── */
var carIdx={};   /* carousel feature index per indicator */

function examplesPane(ind){
  var layout=detectLayout(ind);

  return frameRow(s.source)+'<div class="lay"><div class="hline"><span class="hbrand">Category</span><span class="role-tag">market</span></div>'
    +mediaWrap(s.media,"category","hero")+ownChips(s.own)
    +'<div class="market-note">'+esc(ind.note||"")+'</div></div>';
}

  var hero=pickExample(ind);

    +'<div class="d">The chart still scores this brand. Example artifacts are collected per brand and can be sparse — select another, or this lands in a later pass.</div></div>'+brandStrip(ind)+'</div>';
  return frameRow(hero.source)+'<div class="lay"><div class="hline"><span class="hbrand">'+esc(BNAME[hero.brand])+'</span><span class="role-tag '+esc(hero.role)+'">'+esc(hero.role)+'</span></div>'
    +'<div class="media hero">'+mediaFill(hero.media,BNAME[hero.brand])+'</div>'+ownChips(hero.own)
    +'<div class="react"><span class="l">Characterised · illustrative</span>'+esc(hero.react)+'</div>'+brandStrip(ind)+'</div>';

    +'<div class="d">This indicator collects a run of artifacts for one brand. The chart still scores every brand — select '+esc(BNAME[CLIENT])+' to browse the set.</div></div></div>';
  var fk=carIdx[ind.id]||0; if(fk>=list.length) fk=0;
  var feat=list[fk];
  var strip=list.map(function(e,i){ return '<button class="fthumb" data-feat="'+i+'" aria-current="'+(i===fk)+'"><div class="ft-t">'+mediaFill(e.media,"ex")+'</div><div class="ft-c">'+esc((e.own[0]&&e.own[0].v)||("clip "+(i+1)))+'</div></button>'; }).join("");
  return frameRow(feat.source)+'<div class="lay-car"><div class="hline" style="margin-bottom:7px"><span class="hbrand">'+esc(BNAME[feat.brand])+'</span><span class="role-tag '+esc(feat.role)+'">'+esc(feat.role)+'</span><span class="ex-illnote" style="margin-left:auto">'+list.length+' artifacts</span></div>'

    +'<div class="cap">'+esc(feat.react)+'</div><div class="filmstrip">'+strip+'</div></div>';

/* ───────────────────────────────────────────────────────────────────────────
   DATA SOURCES — two layers, joined by (run_id, business_id, indicator_id)
   ── Scores + chart metric: INDICATORS[].scores / .metric
      (Phase B: read from the scores worksheet → _scoreModel, exactly like the
       live extension's fetchAndCacheData. Same source the retired table used.)
   ── Examples: INDICATORS[].examples loaded via loadExamples() from EXAMPLES_DATA (examples_data.js).
      Schema: see EXAMPLES_CONTRACT.md — flat rows, one per (run_id, business_id, indicator_id, brand).
      Real embeds (YouTube ids, live Trends) preserved from Phase-2A one-time pull.
   ── loadExamples() is the single SWAP SEAM. Real swap = replace its body with a
      getSummaryDataAsync read of SCORER_EXAMPLES_VIEW mapping columns → the same flat row;
      filter/group/latest-wins logic below is unchanged.
   ─────────────────────────────────────────────────────────────────────────── */
function loadExamples(runId, businessId){
  // PHASE A: flat EXAMPLES_DATA array (examples_data.js).
  // PHASE B: replace this body with getSummaryDataAsync(SCORER_EXAMPLES_VIEW) → map to same row shape.
  var rows = EXAMPLES_DATA;
  var filtered = [];
  for(var i=0; i<rows.length; i++){
    if(rows[i].run_id===runId && rows[i].business_id===businessId) filtered.push(rows[i]);
  }
  // group by indicator_id; latest-wins per (indicator_id, brand, example_id)
  var grouped = {};
  for(var j=0; j<filtered.length; j++){
    var r=filtered[j];
    var indId=r.indicator_id;
    if(!grouped[indId]) grouped[indId]={};
    var key=(r.brand||'')+'\x7c'+r.example_id;
    grouped[indId][key]=r;
  }
  var result={}, ids=Object.keys(grouped);
  for(var k=0; k<ids.length; k++){
    var id=ids[k], subKeys=Object.keys(grouped[id]), arr=[];
    for(var m=0; m<subKeys.length; m++) arr.push(grouped[id][subKeys[m]]);
    result[id]=arr;
  }
  return result;
}

/* ════════════════════════════════════════════════════════════════════════════
   TABLEAU DATA LAYER — transplanted from the old charts extension (donor).
   Two reads: (1) scores worksheet → fetchScoreData → buildScoreModel; (2) raw
   worksheet → fetchRawData → _rawData. Boot calls both; buildIndicatorsFromModel
   merges them: raw agg vals + series for covered indicators, score mirror for
   brand-incomplete ones. The LIVE read can only be confirmed in Tableau Desktop;
   the sample-data fallback (below) renders the standalone preview here.
   ════════════════════════════════════════════════════════════════════════════ */
var DATA = (function(){
  var DEFAULTS = {
    scoreWorksheet:'', scoreField:'Score', clientBrand:'ILLY',
    parameter:'Select Client Brand', indicatorIdField:'indicator_id',
    nameField:'Display Name', sourceField:'Source',
    subcategoryIdField:'subcategory_id', brandField:'Brand Name Upper',
    categoryField:'category_id',
    worksheet:'', valueField:'SUM(Raw Value)', yearField:'Year',
    monthField:'Month', quarterField:'Quarter', periodField:''
  };
  var CONFIG = Object.assign({}, DEFAULTS);
  var _dashboard=null, _subgroup=null, _subcategoryName=null;
  var _rawData=[];

  // ── subgroup resolver: name-derived, validates against actual data ──
  // Precedence: in-extension selection (future) → parameter (future) → dashboard.name (live)
  // subcatIds is a plain object { id: true } built from metric rows in the score data.
  function resolveSubgroup(subcatIds){
    // Branch 1: in-extension selection (future) — not wired
    // Branch 2: parameter (future) — not wired
    // Branch 3: dashboard.name — validated against subcategory_ids present in the data
    if(!_dashboard || !_dashboard.name) return null;
    var name = _dashboard.name.trim().toLowerCase();
    return (subcatIds && subcatIds[name]) ? name : null;
  }

  function toYearMonth(year, month){
    return Math.round(year)+'-'+String(Math.round(month)).padStart(2,'0');
  }
  // INDICATOR_AGG: seam for future Google-Sheet single source. Interim = all-average.
  var INDICATOR_AGG = {};
  function metricAgg(id){ return INDICATOR_AGG[id]||'avg'; }
  function aggregate(pts, id){
    var agg = metricAgg(id);
    var vals = pts.filter(function(p){
      if(p.value===null||isNaN(p.value)) return false;
      if(id==='svt'&&p.value===0) return false;
      return true;
    });
    if(!vals.length) return null;
    var sum = vals.reduce(function(acc,p){ return acc+p.value; },0);
    return agg==='sum' ? sum : sum/vals.length;
  }
  var BRAND_ALIASES = { "PEET'S COFFEE":'PEETS', "PEET'S":'PEETS' };
  var COMPETITOR_ORDER = ['NESPRESSO','STARBUCKS','PEETS','LAVAZZA'];
  var METRIC_LABELS = {
    tam:'Total Addressable Market (TAM)', cagr:'Compound Annual Growth Rate (CAGR)', mcon:'Market Concentration',
    svt:'Search Volume and Trends', sop:'Share of Preference', cra:'Conversion Rate Analysis',
    bss:'Branded Search Share', dvtr:'Distinctive Verbal Tone Recognition',
    sstsr:'Scroll-stop / Thumb-stop Ratio', eqr:'Engagement Quality Ratio',
    sov:'Share of Voice (SOV)', vom:'Velocity of Mentions', nps:'Brand Loyalty / NPS',
    ba:'Brand Affinity', ebl:'Brand Engagement', bt:'Brand Trust'
  };
  // donor METRIC_CHARTS defaults → the prototype's six house forms
  var METRIC_CHARTS = {
    tam:['ban_editorial'], cagr:['ban_editorial'], mcon:['ban_editorial'],
    svt:['line-straight'], vom:['line-straight'],
    sop:['scale-figma'], dvtr:['scale-figma'], nps:['scale-figma'], bt:['scale-figma'],
    sstsr:['vbar'], eqr:['vbar'], ebl:['vbar'],
    sov:['treemap'], bss:['treemap'],
    cra:['hbar'], ba:['hbar']
  };
  var MARKET_IDS = { tam:1, cagr:1, mcon:1 };
  var BAN_FMT = {
    tam:  { prefix:'$', suffix:'B',   cap:'Total addressable market' },
    cagr: { prefix:'',  suffix:'%',   cap:'Category CAGR' },
    mcon: { prefix:'',  suffix:' HHI', cap:'Market concentration index' },
  };
  function resolveChart(id){
    var c = (METRIC_CHARTS[id] && METRIC_CHARTS[id][0]) || 'hbar';
    if(/^ban/.test(c)) return 'ban_editorial';
    if(/^scale/.test(c)) return 'scale-figma';
    if(c==='treemap') return 'treemap';
    if(/^line/.test(c)) return 'line-straight';
    if(c==='vbar') return 'vbar';
    return 'hbar';
  }

  // ── donor: buildScoreModel (verbatim) ──
  function buildScoreModel(rawRows, clientBrand, subgroup){
    var sub = subgroup ? subgroup.trim().toLowerCase() : '';
    var rows = rawRows.filter(function(r){
      var sc = r.subcategory_id ? r.subcategory_id.trim().toLowerCase() : '';
      return (!sub || sc === sub) && r.indicator_id !== 'overall' &&
             (r.category_id !== 'coffee_general') &&
             r.score !== null && r.score !== undefined && !isNaN(r.score);
    });
    if(!rows.length) return null;
    var brandSet={}; rows.forEach(function(r){ brandSet[r.brand]=true; });
    var allBrandKeys=Object.keys(brandSet);
    var client = clientBrand ? clientBrand.toUpperCase() : '';
    var ordered=[];
    if(client && brandSet[client]) ordered.push(client);
    COMPETITOR_ORDER.forEach(function(k){ if(brandSet[k] && ordered.indexOf(k)===-1) ordered.push(k); });
    allBrandKeys.forEach(function(k){ if(ordered.indexOf(k)===-1) ordered.push(k); });
    var indMap={}, indOrder=[];
    rows.forEach(function(r){
      if(!indMap[r.indicator_id]){
        indMap[r.indicator_id]={ id:r.indicator_id, name:METRIC_LABELS[r.indicator_id]||r.name||r.indicator_id, source:r.source, scores:{} };
        indOrder.push(r.indicator_id);
      }
      indMap[r.indicator_id].scores[r.brand]=r.score;
    });
    var indRows=indOrder.map(function(id){ return indMap[id]; });
    if(!indRows.length) return null;
    return { brands:ordered, rows:indRows };
  }

  // ── donor: fetchScoreData (verbatim score read) ──
  // Resolve the score worksheet WITHOUT config: explicit CONFIG.scoreWorksheet
  // override if set, otherwise auto-detect the worksheet whose columns include
  // brand + indicator + score. No settings dialog / no hard-coded name needed.
  // normalise a column name, stripping a Tableau aggregation wrapper
  // (e.g. AVG(Score) / SUM(Score) → score) so aggregated measures still match.
  function _normField(s){
    return String(s).replace(/^[A-Za-z]+\((.*)\)$/,'$1').toLowerCase().replace(/[\s_]+/g,'');
  }
  function _hasCol(cols, field){
    var nf=_normField(field);
    return cols.some(function(c){ return _normField(c.fieldName)===nf; });
  }
  async function pickScoreWorksheet(){
    if(!_dashboard) return null;
    var sheets = _dashboard.worksheets || [];
    if(CONFIG.scoreWorksheet){
      var named = sheets.find(function(w){ return w.name===CONFIG.scoreWorksheet; });
      if(named){ console.log('[scoreWorksheet] using configured sheet:', named.name); return named; }
      console.warn('[scoreWorksheet] configured sheet not found — auto-detecting:', CONFIG.scoreWorksheet);
    }
    for(var i=0;i<sheets.length;i++){
      try{
        var probe = await sheets[i].getSummaryDataAsync({ maxRows:1 });
        if(_hasCol(probe.columns,CONFIG.brandField) &&
           _hasCol(probe.columns,CONFIG.indicatorIdField) &&
           _hasCol(probe.columns,CONFIG.scoreField)){
          console.log('[scoreWorksheet] auto-detected:', sheets[i].name);
          return sheets[i];
        }
      }catch(e){ /* worksheet not readable from this extension — skip */ }
    }
    console.warn('[scoreWorksheet] no worksheet has brand+indicator+score columns. Sheets on dashboard:',
      sheets.map(function(w){ return w.name; }).join(', '));
    return null;
  }

  async function fetchScoreData(){
    var ws = await pickScoreWorksheet();
    if(!ws) return null;
    try {
      var dt = await ws.getSummaryDataAsync({ maxRows:5000 });
      var cols=dt.columns, dataRows=dt.data;
      function colIdx(name){
        var nf=_normField(name);
        return cols.findIndex(function(c){ return _normField(c.fieldName)===nf; });
      }
      var brandIdx=colIdx(CONFIG.brandField), indIdx=colIdx(CONFIG.indicatorIdField),
          nameIdx=colIdx(CONFIG.nameField), sourceIdx=colIdx(CONFIG.sourceField),
          subcatIdx=colIdx(CONFIG.subcategoryIdField), scoreIdx=colIdx(CONFIG.scoreField),
          catIdx=colIdx(CONFIG.categoryField), levelIdx=colIdx('level'),
          subcatNameIdx=colIdx('subcategory_name');
      if(nameIdx===-1) nameIdx=colIdx('Indicator Name');
      if(brandIdx===-1 || indIdx===-1 || scoreIdx===-1){
        console.warn('[scoreWorksheet] required columns missing. Available:',
          cols.map(function(c){return c.fieldName;}).join(', ')); return null;
      }
      var normalised = dataRows.map(function(row){
        var sc=parseFloat(row[scoreIdx].value);
        var rawBrand=String(row[brandIdx].formattedValue||row[brandIdx].value||'').trim().toUpperCase();
        return {
          brand: BRAND_ALIASES[rawBrand]||rawBrand,
          indicator_id: indIdx!==-1 ? (row[indIdx].value||'') : '',
          name: nameIdx!==-1 ? (row[nameIdx].formattedValue||row[nameIdx].value||'') : '',
          source: sourceIdx!==-1 ? (row[sourceIdx].formattedValue||row[sourceIdx].value||'') : '',
          subcategory_id: subcatIdx!==-1 ? (row[subcatIdx].value||row[subcatIdx].formattedValue||'') : '',
          category_id: catIdx!==-1 ? (row[catIdx].value||'') : '',
          level: levelIdx!==-1 ? String(row[levelIdx].value||'').toLowerCase() : 'metric',
          score: isNaN(sc) ? null : sc
        };
      }).filter(function(r){ return r.level==='metric'; });
      var subcatSet = {};
      normalised.forEach(function(r){
        if(r.subcategory_id) subcatSet[r.subcategory_id.trim().toLowerCase()] = true;
      });
      _subgroup = resolveSubgroup(subcatSet);
      _subcategoryName = null;
      if(_subgroup && subcatNameIdx !== -1){
        var nameRow = dataRows.find(function(row){
          var sc = subcatIdx !== -1 ? (row[subcatIdx].value||row[subcatIdx].formattedValue||'') : '';
          return sc.trim().toLowerCase() === _subgroup;
        });
        if(nameRow) _subcategoryName = nameRow[subcatNameIdx].formattedValue||nameRow[subcatNameIdx].value||null;
      }
      return buildScoreModel(normalised, CONFIG.clientBrand, _subgroup);
    } catch(e){ console.error('[scoreWorksheet] read failed:', e); return null; }
  }

  // ── raw worksheet auto-detect: brand + indicator + value columns ──
  async function pickRawWorksheet(){
    if(!_dashboard) return null;
    var sheets = _dashboard.worksheets||[];
    if(CONFIG.worksheet){
      var named = sheets.find(function(w){ return w.name===CONFIG.worksheet; });
      if(named){ console.log('[rawWorksheet] using configured:', named.name); return named; }
      console.warn('[rawWorksheet] configured sheet not found — auto-detecting:', CONFIG.worksheet);
    }
    for(var i=0;i<sheets.length;i++){
      try{
        var probe = await sheets[i].getSummaryDataAsync({ maxRows:1 });
        if(_hasCol(probe.columns,CONFIG.brandField) &&
           _hasCol(probe.columns,CONFIG.indicatorIdField) &&
           _hasCol(probe.columns,CONFIG.valueField)){
          console.log('[rawWorksheet] auto-detected:', sheets[i].name);
          return sheets[i];
        }
      }catch(e){ /* worksheet not readable from this extension — skip */ }
    }
    console.warn('[rawWorksheet] no worksheet found with brand+indicator+value columns.');
    return null;
  }

  async function fetchRawData(){
    _rawData = [];
    var ws = await pickRawWorksheet();
    if(!ws) return;
    try{
      var dt = await ws.getSummaryDataAsync({ maxRows:5000 });
      var cols=dt.columns, rows=dt.data;
      function colIdx(name){
        var nf=_normField(name);
        return cols.findIndex(function(c){ return _normField(c.fieldName)===nf; });
      }
      var brandIdx=colIdx(CONFIG.brandField), valueIdx=colIdx(CONFIG.valueField),
          indIdx=colIdx(CONFIG.indicatorIdField), catIdx=colIdx(CONFIG.categoryField),
          yearIdx=colIdx(CONFIG.yearField), monthIdx=colIdx(CONFIG.monthField),
          quarterIdx=colIdx(CONFIG.quarterField),
          periodIdx=CONFIG.periodField ? colIdx(CONFIG.periodField) : -1;
      if(brandIdx===-1||valueIdx===-1||indIdx===-1){
        console.warn('[rawWorksheet] required columns missing.'); return;
      }
      _rawData = rows.map(function(row){
        var rawVal=row[valueIdx].value;
        var isVNull = !rawVal||rawVal==='%null%'||rawVal==='Null';
        var val = isVNull ? null : parseFloat(rawVal);
        var rawBrand=String(row[brandIdx].formattedValue||row[brandIdx].value||'').trim().toUpperCase();
        var cat = catIdx!==-1 ? (row[catIdx].value||'') : '';
        var rawY = yearIdx!==-1 ? row[yearIdx].value : null;
        var isYNull = !rawY||rawY==='%null%'||rawY==='Null';
        var year = isYNull ? null : parseFloat(rawY);
        var month  = monthIdx!==-1  ? parseFloat(row[monthIdx].value)  : null;
        var quarter= quarterIdx!==-1 ? parseFloat(row[quarterIdx].value): null;
        var period = null;
        if(periodIdx!==-1){
          var pRaw=row[periodIdx].value||row[periodIdx].formattedValue||'';
          if(pRaw&&pRaw!=='%null%'&&pRaw!=='Null') period=String(pRaw).trim();
        }
        if(!period){
          period = (year&&month&&!isNaN(year)&&!isNaN(month))
            ? toYearMonth(year,month)
            : (year&&quarter&&!isNaN(year)&&!isNaN(quarter))
              ? (year+'-Q'+quarter)
              : null;
        }
        return {
          brand: BRAND_ALIASES[rawBrand]||rawBrand,
          value: (isVNull||isNaN(val)) ? null : val,
          indicator: row[indIdx].value||'',
          category: cat,
          period: period
        };
      }).filter(function(r){ return r.value!==null&&r.category!=='coffee_general'; });
    }catch(e){ console.error('[rawWorksheet] read failed:', e); }
  }

  // buildSeries: per-brand period points for one indicator, using cached _rawData.
  // Returns { BRAND: [{period, value}] } — all brands initialised, coffee_general absent.
  function buildSeries(indicatorId, brands){
    var result = {};
    brands.forEach(function(b){ result[b]=[]; });
    _rawData.forEach(function(r){
      if(r.indicator!==indicatorId) return;
      if(result[r.brand]!==undefined) result[r.brand].push({period:r.period, value:r.value});
    });
    return result;
  }

  // ── adapter: score model → the prototype's INDICATORS shape ──
  // rawByIndicator: { indicatorId: buildSeries result } — omitted in sample path.
  // Non-market: uses raw agg vals+series if every brand has ≥1 usable period; else score mirror.
  function buildIndicatorsFromModel(model, rawByIndicator){
    return model.rows.map(function(r){
      if(MARKET_IDS[r.id]){
        var bfmt = BAN_FMT[r.id] || {};
        var mser = rawByIndicator && rawByIndicator[r.id];
        var mval = null;
        if(mser){
          var mbkeys = Object.keys(mser);
          for(var mi=0; mi<mbkeys.length && mval===null; mi++){
            var mpts = mser[mbkeys[mi]];
            if(mpts && mpts.length){
              var msorted = mpts.slice().sort(function(a,b){ return (b.period||'') > (a.period||'') ? -1 : 1; });
              for(var mj=0; mj<msorted.length && mval===null; mj++){
                if(msorted[mj].value !== null) mval = msorted[mj].value;
              }
            }
          }
        }
        var mheadline = [];
        if(mval !== null){
          var mdecs = INDICATOR_DECIMALS[r.id] !== undefined ? INDICATOR_DECIMALS[r.id] : 1;
          mheadline = [{ n: (bfmt.prefix||'') + mval.toFixed(mdecs), u: (bfmt.suffix||'').trim(), c: bfmt.cap||r.name }];
        }
        return {
          id:r.id, name:r.name, src:(r.source?('+'+r.source):''),
          cls:'', chart:resolveChart(r.id), kind:'market',
          scores:r.scores, metric:{unit:'',market:true,headline:mheadline}
        };
      }
      var ser = rawByIndicator && rawByIndicator[r.id];
      var aggVals = {};
      var canUseRaw = ser && model.brands.every(function(b){
        var a = aggregate(ser[b]||[], r.id);
        if(a===null) return false;
        aggVals[b] = a;
        return true;
      });
      if(canUseRaw){
        return {
          id:r.id, name:r.name, src:(r.source?('+'+r.source):''),
          cls:'', chart:resolveChart(r.id), kind:'brand',
          scores:r.scores, metric:{unit:'', vals:aggVals, series:ser}
        };
      }
      return {
        id:r.id, name:r.name, src:(r.source?('+'+r.source):''),
        cls:'', chart:resolveChart(r.id), kind:'brand',
        scores:r.scores, metric:{unit:'/5', vals:r.scores}
      };
    });
  }

  return { CONFIG:CONFIG, DEFAULTS:DEFAULTS, resolveChart:resolveChart,
           buildScoreModel:buildScoreModel, fetchScoreData:fetchScoreData,
           fetchRawData:fetchRawData, buildSeries:buildSeries,
           buildIndicatorsFromModel:buildIndicatorsFromModel,
           setDashboard:function(d){ _dashboard=d; },
           getSubgroup:function(){ return _subgroup; },
           getSubcategoryName:function(){ return _subcategoryName; } };
})();

/* ── boot: real data in Tableau, sample data in standalone preview ──────────── */
function boot(){
  try{
    if(window.tableau && tableau.extensions && tableau.extensions.initializeAsync){
      tableau.extensions.initializeAsync({ configure:function(){} }).then(async function(){
        var dash = tableau.extensions.dashboardContent.dashboard;
        DATA.setDashboard(dash);
        var settings = tableau.extensions.settings;
        Object.keys(DATA.DEFAULTS).forEach(function(k){ var v=settings.get(k); if(v) DATA.CONFIG[k]=v; });
        try{
          var params = await dash.getParametersAsync();
          params.forEach(function(p){ if(p.name===DATA.CONFIG.parameter && p.currentValue && p.currentValue.value) DATA.CONFIG.clientBrand=p.currentValue.value; });
        }catch(e){}
        var model = await DATA.fetchScoreData();
        if(model && model.rows && model.rows.length){
          await DATA.fetchRawData();
          var rawByIndicator = {};
          model.rows.forEach(function(r){ rawByIndicator[r.id] = DATA.buildSeries(r.id, model.brands); });
          INDICATORS = DATA.buildIndicatorsFromModel(model, rawByIndicator);
          BRANDS = model.brands;
          CLIENT = (DATA.CONFIG.clientBrand||model.brands[0]||'').toUpperCase();
          var _exMap=loadExamples(RUN_ID,BUSINESS_ID);
          INDICATORS.forEach(function(ind){ var rows=_exMap[ind.id]||[];
            if(ind.kind==='market'){ ind.sources=rows.map(rowToExample); ind.note=(rows[0]&&rows[0].market_note)||''; ind.examples=[]; }
            else { ind.examples=rows.map(rowToExample); } });
          var subgroupName = DATA.getSubcategoryName();
          if(DATA.getSubgroup() && subgroupName){
            document.getElementById('dhTitle').innerHTML = subgroupName.trim().toUpperCase().split(/\s+/).join('<br>');
            var clientDisp = BNAME[CLIENT]||CLIENT;
            document.getElementById('dhQ').textContent = 'Is there a clear market opportunity for '+clientDisp+' and a clear demand for the product / service?';
            document.getElementById('detailHeader').style.display = '';
          }
        } else {
          console.warn('[boot] no score model — using sample data. Set CONFIG.scoreWorksheet.');
        }
        buildScorecard();
      }, function(){ buildScorecard(); /* preview fallback */ });
      return;
    }
  }catch(e){ console.warn('[boot]', e); }
  buildScorecard(); /* standalone preview — sample INDICATORS */
}
boot();
document.getElementById('ver-badge').textContent=VERSION;
</script>
